    function fmtAmerican(x) {
      const n = Number(x);
      if (!isFinite(n) || n === 0) return '—';
      const v = Math.round(n);
      return (v > 0) ? ('+' + String(v)) : String(v);
    }

    function fmtSigned(x, nd=0) {
      const n = Number(x);
      if (!isFinite(n)) return '—';
      const v = Number(n);
      const s = (v > 0) ? '+' : '';
      return s + v.toFixed(nd);
    }

    function _renderMove(obj, kind='price') {
      if (!obj) return '';
      const isLine = (String(kind || '').toLowerCase() === 'line');
      const hasFiniteVal = (v) => {
        if (v === null || v === undefined) return false;
        const s = String(v).trim();
        if (!s.length) return false;
        const n = Number(v);
        return isFinite(n);
      };
      const cur = obj.cur;
      const dOpen = obj.d_open;
      const dPrev = obj.d_prev;
      const hasCur = hasFiniteVal(cur);
      const hasDOpen = hasFiniteVal(dOpen);
      const hasDPrev = hasFiniteVal(dPrev);
      const hasD = hasDOpen || hasDPrev;
      if (!hasD) return '';
      const curTxt = isLine ? fmt(cur, 1) : fmtAmerican(cur);
      const doTxt = isLine ? fmtSigned(dOpen, 1) : fmtSigned(dOpen, 0);
      const dpTxt = isLine ? fmtSigned(dPrev, 1) : fmtSigned(dPrev, 0);
      const deltaParts = [];
      if (hasDOpen) deltaParts.push(`o ${doTxt}`);
      if (hasDPrev) deltaParts.push(`p ${dpTxt}`);
      if (!deltaParts.length) return '';
      if (!hasCur) return deltaParts.join(' · ');
      return `${curTxt} (${deltaParts.join(', ')})`;
    }

    function applyOddsMovementToCards(payload) {
      if (!payload || !payload.ok || !Array.isArray(payload.games)) return;
      const byKey = new Map();
      for (const g of (payload.games || [])) {
        const k = normKey(g && g.key);
        if (k) byKey.set(k, g);
      }

      for (const card of document.querySelectorAll('.card.game-card[data-game-key]')) {
        const k = normKey(card.dataset.gameKey);
        const g = byKey.get(k);
        if (!g) continue;

        try {
          const mlEl = card.querySelector('[data-role="odds-move-ml"]');
          if (mlEl) {
            const a = (g.ml && g.ml.away) ? g.ml.away : null;
            const h = (g.ml && g.ml.home) ? g.ml.home : null;
            const parts = [];
            const at = a ? _renderMove(a, 'price') : '';
            const ht = h ? _renderMove(h, 'price') : '';
            if (at) parts.push('A ' + at);
            if (ht) parts.push('H ' + ht);
            mlEl.textContent = parts.length ? ('Move: ' + parts.join(' · ')) : '';
          }

          const totEl = card.querySelector('[data-role="odds-move-total"]');
          if (totEl) {
            const line = (g.total && g.total.line) ? g.total.line : null;
            const over = (g.total && g.total.over) ? g.total.over : null;
            const under = (g.total && g.total.under) ? g.total.under : null;
            const parts = [];
            const lt = line ? _renderMove(line, 'line') : '';
            const ot = over ? _renderMove(over, 'price') : '';
            const ut = under ? _renderMove(under, 'price') : '';
            if (lt) parts.push('Line ' + lt);
            if (ot) parts.push('O ' + ot);
            if (ut) parts.push('U ' + ut);
            totEl.textContent = parts.length ? ('Move: ' + parts.join(' · ')) : '';
          }

          const plEl = card.querySelector('[data-role="odds-move-pl"]');
          if (plEl) {
            const a = (g.puckline && g.puckline['away_+1.5']) ? g.puckline['away_+1.5'] : null;
            const h = (g.puckline && g.puckline['home_-1.5']) ? g.puckline['home_-1.5'] : null;
            const parts = [];
            const at = a ? _renderMove(a, 'price') : '';
            const ht = h ? _renderMove(h, 'price') : '';
            if (at) parts.push('A+1.5 ' + at);
            if (ht) parts.push('H-1.5 ' + ht);
            plEl.textContent = parts.length ? ('Move: ' + parts.join(' · ')) : '';
          }
        } catch (e) {}
      }
    }

    function renderPropsCardsStrip(payload) {
      const strip = $('propsStrip');
      const label = $('propsStripLabel');
      if (!strip) return;

      strip.innerHTML = '';
      if (label) label.textContent = '';

      if (!payload || !payload.ok || !Array.isArray(payload.cards) || !payload.cards.length) return;
      if (label) label.textContent = 'Top props';

      const frag = document.createDocumentFragment();
      for (const c of (payload.cards || [])) {
        try {
          const player = String(c && c.player || '').trim();
          if (!player) continue;
          const team = toUpper(c && c.team);
          const opp = toUpper(c && c.opp);
          const market = toUpper(c && c.market);
          const side = String(c && c.side || '').trim();
          const book = String(c && c.book || '').trim();

          const ln = (c && c.line !== undefined && c.line !== null && isFinite(Number(c.line))) ? fmt(c.line, 1)
            : ((c && c.line !== undefined && c.line !== null && String(c.line).trim() !== '') ? String(c.line).trim() : '—');
          const pr = (c && c.price !== undefined && c.price !== null && isFinite(Number(c.price))) ? fmtAmerican(c.price)
            : ((c && c.price !== undefined && c.price !== null && String(c.price).trim() !== '') ? String(c.price).trim() : '—');
          const evTxt = (c && isFinite(Number(c.ev))) ? ('EV ' + (100 * Number(c.ev)).toFixed(1) + '%') : 'EV —';

          const headshot = String(c && c.headshot_url || '').trim();
          const teamLogo = String(c && c.team_logo || '').trim();
          const drivers = String(c && c.drivers || '').trim();

          const mvLine = (c && c.movement && c.movement.line) ? _renderMove(c.movement.line, 'line') : '';
          const mvPrice = (c && c.movement && c.movement.price) ? _renderMove(c.movement.price, 'price') : '';
          const whoImg = headshot
            ? `<img class="p-img" src="${escHtml(headshot)}" alt="${escHtml(player)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none';" />`
            : (teamLogo
              ? `<img class="p-img is-fallback" src="${escHtml(teamLogo)}" alt="${escHtml(team || player)}" loading="lazy" />`
              : `<div class="p-img" style="display:none;"></div>`);
          const subPrefix = teamLogo
            ? `<img class="p-team-logo" src="${escHtml(teamLogo)}" alt="${escHtml(team)}" loading="lazy" />`
            : '';

          const item = document.createElement('div');
          item.className = 'p-item';
          item.innerHTML = `
            <div class="p-head">
              <div class="p-who">
                ${whoImg}
                <div style="min-width:0;">
                  <div class="p-name">${escHtml(player)}</div>
                  <div class="p-sub p-subline">${subPrefix}<span>${escHtml(team)}${opp ? ` vs ${escHtml(opp)}` : ''}${book ? ` · ${escHtml(book)}` : ''}</span></div>
                </div>
              </div>
              <span class="pill">${escHtml(evTxt)}</span>
            </div>
            <div class="p-line">${escHtml(market)} ${escHtml(side)} ${escHtml(ln)} <span class="muted">@ ${escHtml(pr)}</span></div>
            ${mvLine ? `<div class="p-move">Line ${escHtml(mvLine)}</div>` : ''}
            ${mvPrice ? `<div class="p-move">Price ${escHtml(mvPrice)}</div>` : ''}
            ${drivers ? `<div>${renderDriverPills(drivers, 2, false)}</div>` : ''}
          `;
          frag.appendChild(item);
        } catch (e) {}
      }
      strip.appendChild(frag);
    }

    function propsStripSignature(payload) {
      try {
        return JSON.stringify((payload && Array.isArray(payload.cards)) ? payload.cards : []);
      } catch (e) {
        return '';
      }
    }

    async function maybeRefreshPropsStrip(date) {
      try {
        const payload = await fetchJson(`/v1/props-cards/${encodeURIComponent(date)}?top=12`, { timeoutMs: 12000 });
        const sig = propsStripSignature(payload);
        if (!sig || sig === lastPropsStripSignature) return payload;
        renderPropsCardsStrip(payload);
        lastPropsStripSignature = sig;
        return payload;
      } catch (e) {
        return null;
      }
    }

    function _findCardByGameKey(gameKey) {
      const k = normKey(gameKey);
      for (const el of document.querySelectorAll('.card[data-game-key]')) {
        if (normKey(el.dataset.gameKey) === k) return el;
      }
      return null;
    }

    function _setScoreboardStripLayout(strip, nItems) {
      if (!strip) return;
      const n = Math.max(0, Number(nItems || 0));
      if (!n) {
        try { strip.style.removeProperty('--sb-cols'); } catch (e) {}
        try { strip.style.removeProperty('--sb-rows'); } catch (e) {}
        return;
      }

      // Keep these in sync with the CSS above.
      const gapPx = 10;
      const baselineMinCardPx = document.documentElement.classList.contains('compact-card') ? 236 : 260;

      let cols = 1;
      try {
        const w = Number(strip.clientWidth || strip.getBoundingClientRect().width || 0);
        const maxCols = Math.max(1, Math.floor((w + gapPx) / (baselineMinCardPx + gapPx)));
        cols = Math.max(1, Math.min(n, maxCols));
      } catch (e) {
        cols = Math.min(n, 3);
      }

      try { strip.style.setProperty('--sb-cols', String(Math.max(1, cols))); } catch (e) {}
    }

    function buildScoreboardStrip(preds) {
      const strip = $('scoreboardStrip');
      if (!strip) return;
      strip.innerHTML = '';

      function _dispState(s) {
        try {
          return gameStatusInfo(s).text;
        } catch (e) {
          return String(s || '').trim();
        }
      }

      function _fmtStartLocal(p) {
        try {
          const t = startTimeMs(p);
          if (!isFinite(Number(t))) return '';
          const d = new Date(Number(t));
          // Browser-local time. Include a short timezone name so users don't confuse ET/CT/etc.
          // (Some browsers may show a GMT offset instead of CST/CDT; that's still unambiguous.)
          const fmt = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
          return String(fmt.format(d));
        } catch (e) {
          return '';
        }
      }

      const frag = document.createDocumentFragment();
      for (const p of (preds || [])) {
        const k = keyForGame(p);
        // Compact strip should show full team names (not 2-3 letter abbreviations).
        const a = String(p && p.away || '').trim() || toUpper(p && p.away_abbr);
        const h = String(p && p.home || '').trim() || toUpper(p && p.home_abbr);
        const state = _dispState(p && p.game_state);
        const awayLogo = (p && p.away_logo) ? String(p.away_logo) : '';
        const homeLogo = (p && p.home_logo) ? String(p.home_logo) : '';
        const startLocal = _fmtStartLocal(p);
        const timeLine = (startLocal || state || '—');

        const aEl = document.createElement('a');
        aEl.href = '#';
        aEl.className = 'cards-strip-card s-item';
        aEl.dataset.gameKey = k;
        const info = currentSlateInfoByKey.get(normKey(k));
        aEl.dataset.hasOfficial = info && info.hasOfficial ? '1' : '0';
        aEl.dataset.hasProps = info && info.hasProps ? '1' : '0';
        aEl.dataset.cardStatus = info && info.status ? String(info.status) : state;
        try { aEl.dataset.awayName = String(p && p.away || '').trim(); } catch (e) {}
        try { aEl.dataset.homeName = String(p && p.home || '').trim(); } catch (e) {}
        try { if (awayLogo) aEl.dataset.awayLogo = awayLogo; } catch (e) {}
        try { if (homeLogo) aEl.dataset.homeLogo = homeLogo; } catch (e) {}
        try {
          const pk = (p && (p.gamePk ?? p.game_pk ?? p.nhl_game_pk ?? p.nhlGamePk ?? p.game_id ?? p.gameId));
          if (pk !== undefined && pk !== null && String(pk).trim() !== '') aEl.dataset.gamePk = String(pk).trim();
        } catch (e) {}
        aEl.innerHTML = `
          <div class="s-time">${timeLine}</div>
          <div class="s-teamline">
            <div class="lhs">${awayLogo ? `<img class="team-logo" src="${awayLogo}" alt="${a || ''}" />` : ''}<div class="nm">${a || '—'}</div></div>
            <div class="pts" data-role="away-pts"></div>
          </div>
          <div class="s-teamline">
            <div class="lhs">${homeLogo ? `<img class="team-logo" src="${homeLogo}" alt="${h || ''}" />` : ''}<div class="nm">${h || '—'}</div></div>
            <div class="pts" data-role="home-pts"></div>
          </div>
          <div class="s-sig" data-role="sig-1"></div>
          <div class="s-sig" data-role="sig-2"></div>

        aEl.addEventListener('click', (ev) => {
          ev.preventDefault();
          const card = _findCardByGameKey(k);
          if (card && card.scrollIntoView) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        frag.appendChild(aEl);
      }
      strip.appendChild(frag);
      try { _setScoreboardStripLayout(strip, (preds || []).length); } catch (e) {}
    }

    function syncSlateStatusesFromLive(mapByKey, mapByPk) {
      currentSlateCards = (currentSlateCards || []).map((entry) => {
        let liveGame = null;
        try {
          const pk = String(entry && entry.gamePk != null ? entry.gamePk : '').trim();
          if (pk && mapByPk && mapByPk.has(pk)) liveGame = mapByPk.get(pk);
        } catch (e) {}
        if (!liveGame) {
          try {
            const key = normKey(entry && entry.key ? entry.key : '');
            if (key && mapByKey && mapByKey.get) liveGame = mapByKey.get(key) || null;
          } catch (e) {}
        }
        const statusInfo = gameStatusInfo(liveGame && liveGame.gameState ? liveGame.gameState : entry && entry.status ? entry.status : '');
        return {
          ...entry,
          status: statusInfo.text,
        };
      });
      currentSlateInfoByKey = new Map(currentSlateCards.map((entry) => [normKey(entry.key), entry]));
      renderSlateSourceMeta(currentSlateCards, currentSlateNSims);
      renderSlateFilters(currentSlateCards);
    }

    (function() {
      let raf = 0;
      window.addEventListener('resize', () => {
        try { if (raf) cancelAnimationFrame(raf); } catch (e) {}
        raf = requestAnimationFrame(() => {
          raf = 0;
          const strip = $('scoreboardStrip');
          if (!strip) return;
          const n = strip.querySelectorAll('.s-item').length;
          _setScoreboardStripLayout(strip, n);
        });
      });
    })();

    function _pickSignalForTag(signals) {
      if (!Array.isArray(signals) || !signals.length) return null;
      // Prefer game-scoped signals; fallback to top overall.
      const g = signals.find(s => String(s && s.scope || '').toLowerCase() === 'game');
      return g || signals[0];
    }

    function _isBetOrWatchSignal(s) {
      try {
        const a = String(s && s.action || '').toUpperCase();
        return a === 'BET' || a === 'WATCH';
      } catch (e) {
        return false;
      }
    }

    function _filterGameBetWatchSignals(signals) {
      const arr = Array.isArray(signals) ? signals : [];
      return arr.filter(s => {
        try {
          const scope = String(s && s.scope || '').toLowerCase();
          if (scope !== 'game') return false;
          return _isBetOrWatchSignal(s);
        } catch (e) {
          return false;
        }
      });
    }

    function _signalLineText(sig) {
      try {
        if (!sig) return '';
        const action = String(sig.action || '').toUpperCase();
        const label = String(sig.label || '').trim();
        if (!label) return '';

        function _prettyDriverTag(t) {
          try {
            const s = String(t || '').trim();
            if (!s) return '';
            if (s === 'pace:up') return 'pace ↑';
            if (s === 'pace:down') return 'pace ↓';
            if (s === 'goalie:weak') return 'goalie weak';
            if (s === 'goalie:strong') return 'goalie strong';
            if (s === 'manpower:pp_home') return 'PP home';
            if (s === 'manpower:pp_away') return 'PP away';
            if (s === 'score:tied') return 'score tied';
            if (s === 'score:home_leading') return 'home leading';
            if (s === 'score:away_leading') return 'away leading';
            if (s === 'empty_net:home') return 'home EN';
            if (s === 'empty_net:away') return 'away EN';
            return s.replace(/_/g, ' ');
          } catch (e) {
            return '';
          }
        }

        const bits = [];
        // Live-lens drivers (compact): human driver_tags only; avoid EV/edge/price/time.
        try {
          const tags = Array.isArray(sig.driver_tags) ? sig.driver_tags : [];
          const keep = tags
            .map(_prettyDriverTag)
            .filter(Boolean)
            .filter(x => {
              const s = String(x || '').toLowerCase();
              return !(s.startsWith('market:') || s.startsWith('edge:') || s.startsWith('gate:') || s.startsWith('prob_source:') || s.startsWith('guard:'));
            })
            .slice(0, 4);
          if (keep.length) bits.push(keep.join(' · '));
        } catch (e) {}
        // Stat-based context when present (e.g., PLAYER_SHOTS signals)
        try {
          const shots = Number(sig.shots);
          const toi = Number(sig.toi_min);
          if (isFinite(shots) && isFinite(toi)) bits.push(`${Math.round(shots)} shots · ${toi.toFixed(1)} TOI`);
        } catch (e) {}
        try {
          const need = Number(sig.need);
          if (isFinite(need)) bits.push(`need ${Math.round(need)}`);
        } catch (e) {}
        // If live odds are missing, keep the explicit note
        try {
          const note = String(sig.note || '').trim();
          if (note) bits.push(note);
        } catch (e) {}

        const reason = bits.filter(Boolean).join(' · ');
        const prefix = (action === 'BET') ? 'BET' : ((action === 'WATCH') ? 'WATCH' : action);
        return reason ? `${prefix} ${label} — ${reason}` : `${prefix} ${label}`;
      } catch (e) {
        return '';
      }
    }

    function _pickTopSignals(signals, maxN=3) {
      const arr = Array.isArray(signals) ? signals.slice() : [];
      function rank(s) {
        const a = String(s && s.action || '').toUpperCase();
        // Desired compact ordering:
        // 1) Game BET signals
        // 2) Game WATCH signals
        let group = 9;
        if (a === 'BET') group = 0;
        else if (a === 'WATCH') group = 1;
        let edgeAbs = 0;
        try { const e = Number(s && s.edge); if (isFinite(e)) edgeAbs = Math.abs(e); } catch (e) {}
        let p = 0;
        try { const pm = Number(s && s.p_model); if (isFinite(pm)) p = pm; } catch (e) {}
        return [group, -edgeAbs, -p];
      }
      arr.sort((x, y) => {
        const rx = rank(x), ry = rank(y);
        for (let i = 0; i < Math.max(rx.length, ry.length); i++) {
          const dx = rx[i] ?? 0, dy = ry[i] ?? 0;
          if (dx < dy) return -1;
          if (dx > dy) return 1;
        }
        return 0;
      });
      return arr.slice(0, Math.max(0, maxN));
    }

    function _compactSignalText(sig) {
      try {
        if (!sig) return '';
        const action = String(sig.action || '').toUpperCase();
        const label = String(sig.label || '').trim();
        if (!label) return '';
        const prefix = (action === 'BET') ? 'BET' : ((action === 'WATCH') ? 'WATCH' : '');
        return prefix ? `${prefix} · ${label}` : '';
      } catch (e) {
        return '';
      }
    }

    function _signalClass(signals) {
      try {
        if (!Array.isArray(signals) || !signals.length) return '';
        const anyBet = signals.some(s => String(s && s.action || '').toUpperCase() === 'BET');
        if (anyBet) return 'bet';
        const anyWatch = signals.some(s => String(s && s.action || '').toUpperCase() === 'WATCH');
        if (anyWatch) return 'watch';
      } catch (e) {}
      return '';
    }

    function updateScoreboardStripFromLive(mapByKey, mapByPk) {
      const strip = $('scoreboardStrip');
      if (!strip) return;
      for (const item of strip.querySelectorAll('.s-item[data-game-key]')) {
        const k = normKey(item.dataset.gameKey);
        let g = null;
        try {
          const pk = String(item.dataset.gamePk || '').trim();
          if (pk && mapByPk && mapByPk.has(pk)) g = mapByPk.get(pk);
        } catch (e) {}
        if (!g) g = (mapByKey && mapByKey.get) ? (mapByKey.get(k) || null) : null;

        try {
          const aPtsEl = item.querySelector('[data-role="away-pts"]');
          const hPtsEl = item.querySelector('[data-role="home-pts"]');
          const st = String(g && g.gameState ? g.gameState : '').trim();
          const up = String(st || '').toUpperCase();
          const sc = (g && g.score) ? g.score : null;
          const ag = sc && sc.away !== undefined && sc.away !== null ? sc.away : null;
          const hg = sc && sc.home !== undefined && sc.home !== null ? sc.home : null;
          const show = (ag !== null && hg !== null) && (isLiveState(st) || up.includes('FINAL') || up.includes('POST') || up.includes('END'));
          if (aPtsEl) aPtsEl.textContent = show ? String(ag) : '';
          if (hPtsEl) hPtsEl.textContent = show ? String(hg) : '';
        } catch (e) {}

        try {
          const itemStatus = gameStatusInfo(g && g.gameState ? g.gameState : item.dataset.cardStatus || '', {
            periodDisp: g && g.period_disp ? g.period_disp : '',
          });
          item.dataset.cardStatus = itemStatus.text;
        } catch (e) {}

        item.classList.remove('live', 'bet', 'watch');
        if (!g) continue;

        try {
          if (isLiveState(g.gameState)) item.classList.add('live');
        } catch (e) {}

        try {
          const gameSigs = _filterGameBetWatchSignals(g.signals);
          const cls = _signalClass(gameSigs);
          if (cls) item.classList.add(cls);
          // Render up to 3 signal lines with reasons (line 4/5/6)
          const sigs = _pickTopSignals(gameSigs, 2);
          const sigEls = [
            item.querySelector('[data-role="sig-1"]'),
            item.querySelector('[data-role="sig-2"]'),
          ];
          for (let i = 0; i < sigEls.length; i++) {
            const el = sigEls[i];
            if (!el) continue;
            const s = sigs[i] || null;
            el.classList.remove('bet','watch');
            if (!s) { el.textContent = ''; continue; }
            const act = String(s.action || '').toUpperCase();
            if (act === 'BET') el.classList.add('bet');
            else if (act === 'WATCH') el.classList.add('watch');
            el.textContent = _signalLineText(s);
          }
        } catch (e) {}

        try {
          const stEl = item.querySelector('.s-time');
          const per = (g && g.period !== undefined && g.period !== null) ? g.period : null;
          const perDisp = (g && (g.period_disp !== undefined && g.period_disp !== null)) ? String(g.period_disp).trim() : '';
          const clk = g && g.clock ? String(g.clock) : '';
          const intermission = !!(g && g.intermission);
          const st = String(g && g.gameState ? g.gameState : '').trim();
          const statusInfo = gameStatusInfo(st, { periodDisp: perDisp });
          if (stEl) {
            if (statusInfo.isLive) {
              stEl.textContent = formatLiveClockText(st, per, clk, perDisp, intermission);
            } else {
              // Preserve scheduled start time from initial render if present.
              const existing = String(stEl.textContent || '').trim();
              const next = statusInfo.text;
              if (!existing || existing === '—') stEl.textContent = (next || '—');
              else if (statusInfo.isFinal) stEl.textContent = 'Final';
            }
          }
        } catch (e) {}
      }
    }

    function isLiveState(s) {
      return !!gameStatusInfo(s).isLive;
    }

    function isFinalLikeState(s) {
      return !!gameStatusInfo(s).isFinal;
    }

    function scoreInfoFromGame(game) {
      try {
        const row = game || {};
        const nested = row && row.score ? row.score : null;
        const awayRaw = (nested && nested.away !== undefined && nested.away !== null)
          ? nested.away
          : (row.awayScore ?? row.away_score ?? row.away_goals ?? null);
        const homeRaw = (nested && nested.home !== undefined && nested.home !== null)
          ? nested.home
          : (row.homeScore ?? row.home_score ?? row.home_goals ?? null);
        const away = (awayRaw !== null && awayRaw !== undefined && String(awayRaw).trim() !== '') ? Number(awayRaw) : null;
        const home = (homeRaw !== null && homeRaw !== undefined && String(homeRaw).trim() !== '') ? Number(homeRaw) : null;
        return {
          away: Number.isFinite(away) ? away : null,
          home: Number.isFinite(home) ? home : null,
        };
      } catch (e) {
        return { away: null, home: null };
      }
    }

    function formatPeriodLabel(period, gameState) {
      try {
        const st = String(gameState || '').toUpperCase();
        const p = (period !== null && period !== undefined) ? Number(period) : NaN;
        if (!isFinite(p) || p <= 0) return '—';
        if (st.includes('SO')) return 'SO';
        if (p >= 4) return 'OT';
        if (p === 1) return '1st';
        if (p === 2) return '2nd';
        if (p === 3) return '3rd';
        return `P${p}`;
      } catch (e) {
        return '—';
      }
    }

    function normalizePeriodDisplayLabel(periodDisp, period, gameState) {
      const raw = String(periodDisp || '').trim();
      if (!raw) return formatPeriodLabel(period, gameState);
      const up = raw.toUpperCase();
      if (up === 'P1') return '1st';
      if (up === 'P2') return '2nd';
      if (up === 'P3') return '3rd';
      if (up === 'P4' || up === 'OT') return 'OT';
      if (up === 'P5' || up === 'SO') return 'SO';
      if (up === 'FINAL') return 'Final';
      return raw;
    }

    function formatLiveClockText(gameState, period, clock, periodDisp, intermission) {
      const lbl = normalizePeriodDisplayLabel(periodDisp, period, gameState);
      const clk = String(clock || '').trim();
      const isIntermission = Boolean(intermission)
        || /(?:^|\b)(INT|INTERMISSION)(?:\b|$)/i.test(String(periodDisp || '').trim())
        || String(gameState || '').toUpperCase().includes('INTERMISSION');
      if (isIntermission) {
        if (!lbl || lbl === '—') return 'INT';
        return /(?:^|\b)(INT|INTERMISSION)(?:\b|$)/i.test(lbl) ? lbl : `${lbl} INT`;
      }
      if (!clk) return `${lbl}`.trim();
      return `${lbl} ${clk} left`.trim();
    }

    function renderLens(game) {
      const lens = (game && game.lens) ? game.lens : {};
      const score = (game && game.score) ? game.score : {};
      const st = String((game && (game.gameState || game.game_state || game.state)) || '').trim();
      const per = game && game.period !== undefined ? game.period : null;
      const perDisp = (game && (game.period_disp !== undefined && game.period_disp !== null)) ? String(game.period_disp).trim() : '';
      const intermission = !!(game && game.intermission);
      const clock = game && game.clock ? String(game.clock) : '';

      const totals = (lens && lens.totals) ? lens.totals : null;
      const periods = (lens && lens.periods) ? lens.periods : null;
      const goalies = (lens && lens.goalies) ? lens.goalies : null;
      const players = (lens && lens.players) ? lens.players : null;

      const lines = [];
      const liveText = formatLiveClockText(st, per, clock, perDisp, intermission);
      const headline = `${liveText || `P${per || '—'} ${clock || ''}`.trim()} · Score ${score.away ?? '—'}-${score.home ?? '—'}`;
      lines.push(`<div class="v"><strong>${headline}</strong></div>`);

      // Live linescore (1P/2P/3P/Total)
      try {
        const awayAbbr = game && game.away ? String(game.away) : '';
        const homeAbbr = game && game.home ? String(game.home) : '';

        const byP = { 1: { a: null, h: null }, 2: { a: null, h: null }, 3: { a: null, h: null } };
        if (periods && Array.isArray(periods)) {
          for (const p of periods) {
            const pn = Number(p && p.period);
            if (![1,2,3].includes(pn)) continue;
            byP[pn] = {
              a: (p.away && p.away.goals !== undefined) ? p.away.goals : null,
              h: (p.home && p.home.goals !== undefined) ? p.home.goals : null,
            };
          }
        }
        const awayRow = {
          p1: byP[1].a,
          p2: byP[2].a,
          p3: byP[3].a,
          total: (totals && totals.away) ? totals.away.goals : null,
        };
        const homeRow = {
          p1: byP[1].h,
          p2: byP[2].h,
          p3: byP[3].h,
          total: (totals && totals.home) ? totals.home.goals : null,
        };
        lines.push(renderLinescoreHtml('Live line score', awayAbbr, homeAbbr, awayRow, homeRow, false));
      } catch (e) {
        // ignore
      }

      // Live player boxscore (skaters)
      try {
        const _shotVal = (r) => {
          const v = (r && (r.s ?? r.sog ?? r.shots ?? r.shots_on_goal));
          return (v === null || v === undefined) ? null : Number(v);
        };
        const renderLivePlayersTable = (title, arr) => {
          const rows = (arr || []).slice();
          rows.sort((a,b) => (Number(b.p)||0) - (Number(a.p)||0) || (Number(_shotVal(b))||0) - (Number(_shotVal(a))||0));
          const body = rows.slice(0, 18).map(r => {
            const shots = (r && (r.s ?? r.sog ?? r.shots ?? r.shots_on_goal));
            return `
              <tr>
                <td class="player">${r.name ?? '—'}</td>
                <td>${r.pos ?? '—'}</td>
                <td>${r.g ?? '—'}</td>
                <td>${r.a ?? '—'}</td>
                <td>${r.p ?? '—'}</td>
                <td>${shots ?? '—'}</td>
                <td>${r.blk ?? '—'}</td>
                <td>${r.toi ?? '—'}</td>
              </tr>
            `;
          }).join('');
          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Player</th>
                <th class="sortable" data-sort-type="text">Pos</th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        const renderLiveGoaliesTable = (title, arr) => {
          const rows = (arr || []).slice();
          const body = rows.slice(0, 2).map(r => {
            const svPct = (r && r.sv_pct !== undefined && r.sv_pct !== null && isFinite(Number(r.sv_pct)))
              ? (100 * Number(r.sv_pct)).toFixed(1) + '%'
              : '—';
            return `
              <tr>
                <td class="player">${(r && r.name) ? r.name : '—'}</td>
                <td>${(r && r.saves !== undefined) ? r.saves : '—'}</td>
                <td>${(r && r.shots_against !== undefined) ? r.shots_against : '—'}</td>
                <td>${svPct}</td>
              </tr>
            `;
          }).join('');
          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Goalie</th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="num">SA</th>
                <th class="sortable" data-sort-type="pct">SV%</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        // Redundant in Live Lens view: we show merged Sim vs Live tables instead.
      } catch (e) {
        // ignore
      }

      if (totals && (totals.away || totals.home)) {
        const a = totals.away || {};
        const h = totals.home || {};
        const bits = [];
        if (a.sog !== undefined || h.sog !== undefined) bits.push(`SOG <span class="mono">${a.sog ?? '—'}-${h.sog ?? '—'}</span>`);
        if (a.faceoff_win_pct !== undefined || h.faceoff_win_pct !== undefined) bits.push(`FO% <span class="mono">${fmt(a.faceoff_win_pct,1)}-${fmt(h.faceoff_win_pct,1)}</span>`);
        if (a.pp !== undefined || h.pp !== undefined) bits.push(`PP <span class="mono">${a.pp ?? '—'} / ${h.pp ?? '—'}</span>`);
        if (bits.length) lines.push(`<div class="v">${bits.join(' · ')}</div>`);
      }

      if (periods && Array.isArray(periods) && periods.length) {
        const parts = periods.slice(0, 4).map(p => {
          const pn = p.period ?? '—';
          const a = (p.away || {});
          const h = (p.home || {});
          const seg = [];
          if (a.goals !== undefined || h.goals !== undefined) seg.push(`G ${a.goals ?? '—'}-${h.goals ?? '—'}`);
          if (a.sog !== undefined || h.sog !== undefined) seg.push(`SOG ${a.sog ?? '—'}-${h.sog ?? '—'}`);
          return `P${pn} (${seg.join(', ') || '—'})`;
        });
        lines.push(`<div class="v muted">By period: ${parts.join(' · ')}</div>`);
      }

      if (goalies) {
        const ga = (goalies.away && goalies.away[0]) ? goalies.away[0] : null;
        const gh = (goalies.home && goalies.home[0]) ? goalies.home[0] : null;
        if (ga || gh) {
          const gBits = [];
          if (ga) gBits.push(`Away G: ${ga.name ?? '—'} ${ga.saves ?? '—'}/${ga.shots_against ?? '—'} (${fmt((ga.sv_pct ?? null)*100,1)}%)`);
          if (gh) gBits.push(`Home G: ${gh.name ?? '—'} ${gh.saves ?? '—'}/${gh.shots_against ?? '—'} (${fmt((gh.sv_pct ?? null)*100,1)}%)`);
          lines.push(`<div class="v">${gBits.join(' · ')}</div>`);
        }
      }

      return `<div class="k">Live lens</div>${lines.join('')}`;
    }

    function renderLiveBoxscoresOnly(game, pred=null) {
      try {
        const lens = (game && game.lens) ? game.lens : {};
        const totals = lens && lens.totals ? lens.totals : null;
        const periods = lens && Array.isArray(lens.periods) ? lens.periods : [];
        const goalies = lens && lens.goalies ? lens.goalies : {};
        const players = lens && lens.players ? lens.players : {};
        const awayLabel = predTeamAbbr(pred || game || {}, 'away') || String((game && game.away) || (pred && pred.away) || 'Away').trim() || 'Away';
        const homeLabel = predTeamAbbr(pred || game || {}, 'home') || String((game && game.home) || (pred && pred.home) || 'Home').trim() || 'Home';
        const stateText = String((game && (game.gameState || game.game_state)) || '').toUpperCase();
        const liveLabel = stateText && isFinalLikeState(stateText) ? 'Final' : 'Live';

        if (!totals && !periods.length && !((players && (players.away || players.home)) || (goalies && (goalies.away || goalies.home)))) {
          return `<div class="k">${liveLabel} box</div><div class="v muted">Live or final box is unavailable.</div>`;
        }

        const byP = { 1: { a: null, h: null }, 2: { a: null, h: null }, 3: { a: null, h: null } };
        for (const periodRow of periods) {
          const pn = Number(periodRow && periodRow.period);
          if (![1, 2, 3].includes(pn)) continue;
          byP[pn] = {
            a: (periodRow.away && periodRow.away.goals !== undefined) ? periodRow.away.goals : null,
            h: (periodRow.home && periodRow.home.goals !== undefined) ? periodRow.home.goals : null,
          };
        }

        const awayRow = {
          p1: byP[1].a,
          p2: byP[2].a,
          p3: byP[3].a,
          total: (totals && totals.away) ? totals.away.goals : null,
        };
        const homeRow = {
          p1: byP[1].h,
          p2: byP[2].h,
          p3: byP[3].h,
          total: (totals && totals.home) ? totals.home.goals : null,
        };

        const shotValue = (row) => {
          const value = row && (row.s ?? row.sog ?? row.shots ?? row.shots_on_goal);
          return value === null || value === undefined ? null : Number(value);
        };

        const renderLivePlayersTable = (title, arr) => {
          const rows = Array.isArray(arr) ? arr.slice() : [];
          rows.sort((a, b) => (Number(b.p) || 0) - (Number(a.p) || 0) || (Number(shotValue(b)) || 0) - (Number(shotValue(a)) || 0));
          const body = rows.slice(0, 18).map((row) => `
              <tr>
                <td class="player">${row.name ?? '—'}</td>
                <td>${row.pos ?? '—'}</td>
                <td>${row.g ?? '—'}</td>
                <td>${row.a ?? '—'}</td>
                <td>${row.p ?? '—'}</td>
                <td>${shotValue(row) ?? '—'}</td>
                <td>${row.blk ?? '—'}</td>
                <td>${row.toi ?? '—'}</td>
              </tr>
            `).join('');
          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Player</th>
                <th class="sortable" data-sort-type="text">Pos</th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        const renderLiveGoaliesTable = (title, arr) => {
          const rows = Array.isArray(arr) ? arr.slice() : [];
          const body = rows.slice(0, 2).map((row) => {
            const svPct = (row && row.sv_pct !== undefined && row.sv_pct !== null && isFinite(Number(row.sv_pct)))
              ? (100 * Number(row.sv_pct)).toFixed(1) + '%'
              : '—';
            return `
              <tr>
                <td class="player">${row && row.name ? row.name : '—'}</td>
                <td>${row && row.saves !== undefined ? row.saves : '—'}</td>
                <td>${row && row.shots_against !== undefined ? row.shots_against : '—'}</td>
                <td>${svPct}</td>
              </tr>
            `;
          }).join('');
          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Goalie</th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="num">SA</th>
                <th class="sortable" data-sort-type="pct">SV%</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        const out = [];
        out.push(`<div class="k">${liveLabel} box</div>`);
        out.push(renderLinescoreHtml(`${liveLabel} line score`, awayLabel, homeLabel, awayRow, homeRow, false));
        out.push(renderLivePlayersTable(`Skaters (${awayLabel})`, players && players.away ? players.away : []));
        out.push(renderLivePlayersTable(`Skaters (${homeLabel})`, players && players.home ? players.home : []));
        out.push(renderLiveGoaliesTable(`Goalies (${awayLabel})`, goalies && goalies.away ? goalies.away : []));
        out.push(renderLiveGoaliesTable(`Goalies (${homeLabel})`, goalies && goalies.home ? goalies.home : []));
        return out.join('');
      } catch (e) {
        return `<div class="k">Live box</div><div class="v muted">Live or final box is unavailable.</div>`;
      }
    }

    function normName(s) {
      return String(s || '').trim().toLowerCase().replace(/[\.'’]/g,'').replace(/\s+/g,' ');
    }

    function getPlayerId(x) {
      try {
        if (!x) return null;
        const cand = ['player_id','playerId','playerID','id','nhl_player_id','nhlPlayerId'];
        for (const k of cand) {
          const v = x[k];
          if (v === null || v === undefined || v === '') continue;
          const n = parseInt(String(v), 10);
          if (isFinite(n)) return n;
        }
      } catch (e) {}
      return null;
    }

    function nameKey(s) {
      const n = normName(s);
      if (!n) return '';
      const parts = n.split(' ').filter(Boolean);
      if (parts.length < 2) return n;
      const first = parts[0];
      const last = parts[parts.length - 1];
      const fi = first ? first[0] : '';
      return (fi && last) ? (fi + ' ' + last) : n;
    }

    function renderMergedSimLive(game, simRows) {
      try {
        const lens = (game && game.lens) ? game.lens : {};
        const players = (lens && lens.players) ? lens.players : null;
        const goalies = (lens && lens.goalies) ? lens.goalies : null;
        const gameState = String((game && (game.gameState || game.game_state)) ? (game.gameState || game.game_state) : '').toUpperCase();
        const liveLabel = (gameState.includes('FINAL')) ? 'Final' : 'Live';
        const away = String(game && game.away ? game.away : '').trim();
        const home = String(game && game.home ? game.home : '').trim();

        const sim = Array.isArray(simRows) ? simRows : [];
        const simSkaters = sim
          .filter(r => r && Number(r.period) === 0)
          .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
          .filter(r => String(r.player || '').trim() && String(r.player || '').toUpperCase() !== 'TEAM')
          .filter(r => {
            const saves = Number(r.saves);
            return !(isFinite(saves) && saves > 0);
          });

        const simGoalies = sim
          .filter(r => r && Number(r.period) === 0)
          .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
          .filter(r => String(r.player || '').trim() && String(r.player || '').toUpperCase() !== 'TEAM')
          .filter(r => {
            const saves = Number(r.saves);
            return isFinite(saves) && saves > 0;
          });

        const buildSimMap = (teamAbbr) => {
          const t = String(teamAbbr || '').toUpperCase();
          const byId = new Map();
          const byKey = new Map();
          const byFull = new Map();
          for (const r of simSkaters) {
            if (String(r.team || '').toUpperCase() !== t) continue;
            const pid = getPlayerId(r);
            const full = normName(r.player);
            const key = nameKey(r.player);
            if (pid !== null && pid !== undefined) byId.set(pid, r);
            if (key) byKey.set(key, r);
            if (full) byFull.set(full, r);
          }
          return { byId, byKey, byFull };
        };

        const buildSimGoalieMap = (teamAbbr) => {
          const t = String(teamAbbr || '').toUpperCase();
          const byId = new Map();
          const byKey = new Map();
          const byFull = new Map();
          for (const r of simGoalies) {
            if (String(r.team || '').toUpperCase() !== t) continue;
            const pid = getPlayerId(r);
            const full = normName(r.player);
            const key = nameKey(r.player);
            if (pid !== null && pid !== undefined) byId.set(pid, r);
            if (key) byKey.set(key, r);
            if (full) byFull.set(full, r);
          }
          return { byId, byKey, byFull };
        };

        const simAway = buildSimMap(away);
        const simHome = buildSimMap(home);
        const simGAway = buildSimGoalieMap(away);
        const simGHome = buildSimGoalieMap(home);

        const renderMergedSkaters = (title, liveArr, simMap) => {
          const live = Array.isArray(liveArr) ? liveArr.slice() : [];
          const rows = [];
          const seenIds = new Set();
          const seenKeys = new Set();

          const n0 = (x) => {
            const v = Number(x);
            return (isFinite(v) ? v : 0);
          };
          const n0i = (x) => {
            const v = parseInt(String(x ?? ''), 10);
            return (isFinite(v) ? v : 0);
          };
          const toiToSec = (s) => {
            try {
              const t = String(s || '').trim();
              if (!t || t === '—') return 0;
              const m = t.split(':');
              if (m.length !== 2) return 0;
              const mm = parseInt(m[0], 10);
              const ss = parseInt(m[1], 10);
              if (!isFinite(mm) || !isFinite(ss)) return 0;
              return 60 * mm + ss;
            } catch (e) {
              return 0;
            }
          };
          const fmtToi = (sec) => {
            const s = Math.max(0, Math.round(Number(sec) || 0));
            const mm = Math.floor(s / 60);
            const ss = s % 60;
            return `${mm}:${String(ss).padStart(2,'0')}`;
          };

          // Prefer ordering by live points then shots
          live.sort((a,b) => (Number(b.p)||0)-(Number(a.p)||0) || (Number((b && (b.s ?? b.sog ?? b.shots)) )||0)-(Number((a && (a.s ?? a.sog ?? a.shots)) )||0));
          for (const r of live) {
            const pid = getPlayerId(r);
            const k = nameKey(r && r.name);
            const full = normName(r && r.name);
            if (!pid && !k && !full) continue;
            let s = null;
            if (pid !== null && pid !== undefined) s = (simMap.byId && simMap.byId.get(pid)) || null;
            if (!s && k) s = (simMap.byKey && simMap.byKey.get(k)) || null;
            if (!s && full) s = (simMap.byFull && simMap.byFull.get(full)) || null;
            rows.push({ live: r, sim: s });
            if (pid !== null && pid !== undefined) seenIds.add(pid);
            if (k) seenKeys.add(k);
          }
          // Add sim-only players (if live list is missing them)
          try {
            const byId = simMap.byId || new Map();
            const byKey = simMap.byKey || new Map();
            const byFull = simMap.byFull || new Map();
            if (byId.size) {
              for (const [pid, s] of byId.entries()) {
                if (seenIds.has(pid)) continue;
                rows.push({ live: null, sim: s });
              }
            } else {
              for (const [k2, s] of byKey.entries()) {
                if (seenKeys.has(k2)) continue;
                rows.push({ live: null, sim: s });
              }
              if (!rows.length) {
                for (const [_k3, s] of byFull.entries()) {
                  rows.push({ live: null, sim: s });
                }
              }
            }
          } catch (e) {}

          const body = rows.slice(0, 20).map(x => {
            const lp = x.live || {};
            const sp = x.sim || {};
            const liveName = lp.name || sp.player || '—';
            const pos = lp.pos || sp.pos || sp.position || '—';
            const ltoi = lp.toi || '—';
            const stoi = (isFinite(Number(sp.toi_sec)))
              ? `${Math.floor(Number(sp.toi_sec)/60)}:${String(Math.floor(Number(sp.toi_sec)%60)).padStart(2,'0')}`
              : '—';
            const lshots = (lp && (lp.s ?? lp.sog ?? lp.shots ?? lp.shots_on_goal));
            return `
              <tr>
                <td class="player">${liveName}</td>
                <td>${pos}</td>
                <td>${lp.g ?? '—'}</td>
                <td>${lp.a ?? '—'}</td>
                <td>${lp.p ?? '—'}</td>
                <td>${lshots ?? '—'}</td>
                <td>${lp.blk ?? '—'}</td>
                <td>${ltoi}</td>
                <td>${fmt(Number(sp.goals),2)}</td>
                <td>${fmt(Number(sp.assists),2)}</td>
                <td>${fmt(Number(sp.points),2)}</td>
                <td>${fmt(Number(sp.shots),2)}</td>
                <td>${fmt(Number(sp.blocks),2)}</td>
                <td>${stoi}</td>
              </tr>
            `;
          }).join('');

          // Totals row (sanity check: player totals should roughly match team/game totals)
          try {
            let lg = 0, la = 0, lp0 = 0, ls = 0, lblk = 0, ltoiSec = 0;
            let sg = 0, sa = 0, sp0 = 0, ss = 0, sblk = 0, stoiSec = 0;
            for (const x of rows) {
              const lpR = x.live || {};
              const spR = x.sim || {};
              const lshots = (lpR && (lpR.s ?? lpR.sog ?? lpR.shots ?? lpR.shots_on_goal));
              lg += n0i(lpR.g);
              la += n0i(lpR.a);
              lp0 += n0i(lpR.p);
              ls += n0i(lshots);
              lblk += n0i(lpR.blk);
              ltoiSec += toiToSec(lpR.toi);

              sg += n0(spR.goals);
              sa += n0(spR.assists);
              sp0 += n0(spR.points);
              ss += n0(spR.shots);
              sblk += n0(spR.blocks);
              stoiSec += n0(spR.toi_sec);
            }

            var totalsRow = `
              <tr>
                <td class="player">TEAM TOTAL</td>
                <td>—</td>
                <td>${lg}</td>
                <td>${la}</td>
                <td>${lp0}</td>
                <td>${ls}</td>
                <td>${lblk}</td>
                <td>${fmtToi(ltoiSec)}</td>
                <td>${fmt(sg,2)}</td>
                <td>${fmt(sa,2)}</td>
                <td>${fmt(sp0,2)}</td>
                <td>${fmt(ss,2)}</td>
                <td>${fmt(sblk,2)}</td>
                <td>${fmtToi(stoiSec)}</td>
              </tr>
            `;
          } catch (e) {
            var totalsRow = '';
          }

          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Player</th>
                <th class="sortable" data-sort-type="text">Pos</th>
                <th colspan="6">${liveLabel}</th>
                <th colspan="6">Sim (proj)</th>
              </tr>
              <tr>
                <th></th><th></th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
              <tfoot>${totalsRow || ''}</tfoot>
            </table>
          `;
        };

        const renderMergedGoalies = (title, liveArr, simMap) => {
          const live = Array.isArray(liveArr) ? liveArr.slice(0,2) : [];
          const rows = [];
          const seenIds = new Set();
          const n0i = (x) => {
            const v = parseInt(String(x ?? ''), 10);
            return (isFinite(v) ? v : 0);
          };
          const n0 = (x) => {
            const v = Number(x);
            return (isFinite(v) ? v : 0);
          };
          const fmtToi = (sec) => {
            const s = Math.max(0, Math.round(Number(sec) || 0));
            const mm = Math.floor(s / 60);
            const ss = s % 60;
            return `${mm}:${String(ss).padStart(2,'0')}`;
          };
          for (const r of live) {
            const pid = getPlayerId(r);
            const k = nameKey(r && r.name);
            const full = normName(r && r.name);
            let s = null;
            if (pid !== null && pid !== undefined) s = (simMap.byId && simMap.byId.get(pid)) || null;
            if (!s && k) s = (simMap.byKey && simMap.byKey.get(k)) || null;
            if (!s && full) s = (simMap.byFull && simMap.byFull.get(full)) || null;
            rows.push({ live: r, sim: s });
            if (pid !== null && pid !== undefined) seenIds.add(pid);
          }
          try {
            const byId = simMap.byId || new Map();
            const byKey = simMap.byKey || new Map();
            const byFull = simMap.byFull || new Map();
            if (byId.size) {
              for (const [pid, s] of byId.entries()) {
                if (seenIds.has(pid)) continue;
                rows.push({ live: null, sim: s });
              }
            } else {
              for (const [_k2, s] of byKey.entries()) {
                rows.push({ live: null, sim: s });
              }
              if (!rows.length) {
                for (const [_k3, s] of byFull.entries()) {
                  rows.push({ live: null, sim: s });
                }
              }
            }
          } catch (e) {}

          const body = rows.slice(0, 2).map(x => {
            const lg = x.live || {};
            const sg = x.sim || {};
            const nm = lg.name || sg.player || '—';
            const svPct = (lg && lg.sv_pct !== undefined && lg.sv_pct !== null && isFinite(Number(lg.sv_pct)))
              ? (100 * Number(lg.sv_pct)).toFixed(1) + '%'
              : '—';
            const stoi = (isFinite(Number(sg.toi_sec)))
              ? `${Math.floor(Number(sg.toi_sec)/60)}:${String(Math.floor(Number(sg.toi_sec)%60)).padStart(2,'0')}`
              : '—';
            return `
              <tr>
                <td class="player">${nm}</td>
                <td>${lg.saves ?? '—'}</td>
                <td>${lg.shots_against ?? '—'}</td>
                <td>${svPct}</td>
                <td>${fmt(Number(sg.saves),2)}</td>
                <td>${stoi}</td>
              </tr>
            `;
          }).join('');

          // Totals row (sanity check)
          try {
            let lsv = 0, lsa = 0;
            let ssv = 0, stoiSec = 0;
            for (const x of rows) {
              const lg = x.live || {};
              const sg = x.sim || {};
              lsv += n0i(lg.saves);
              lsa += n0i(lg.shots_against);
              ssv += n0(sg.saves);
              stoiSec += n0(sg.toi_sec);
            }
            const lsvpct = (lsa > 0) ? ((100 * (lsv / lsa)).toFixed(1) + '%') : '—';
            var totalsRow = `
              <tr>
                <td class="player">TEAM TOTAL</td>
                <td>${lsv}</td>
                <td>${lsa || '—'}</td>
                <td>${lsvpct}</td>
                <td>${fmt(ssv,2)}</td>
                <td>${fmtToi(stoiSec)}</td>
              </tr>
            `;
          } catch (e) {
            var totalsRow = '';
          }

          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Goalie</th>
                <th colspan="3">${liveLabel}</th>
                <th colspan="2">Sim (proj)</th>
              </tr>
              <tr>
                <th></th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="num">SA</th>
                <th class="sortable" data-sort-type="pct">SV%</th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
              <tfoot>${totalsRow || ''}</tfoot>
            </table>
          `;
        };

        const out = [];
        out.push(`<div class="k">Sim vs ${liveLabel}</div>`);
        // Always attempt to render merged tables. If live stats are missing, the table
        // still shows sim-only rows so the Live Lens card isn't empty pre-live.
        out.push(renderMergedSkaters(`Skaters (${away || 'Away'})`, (players && players.away) ? players.away : [], simAway));
        out.push(renderMergedSkaters(`Skaters (${home || 'Home'})`, (players && players.home) ? players.home : [], simHome));
        out.push(renderMergedGoalies(`Goalies (${away || 'Away'})`, (goalies && goalies.away) ? goalies.away : [], simGAway));
        out.push(renderMergedGoalies(`Goalies (${home || 'Home'})`, (goalies && goalies.home) ? goalies.home : [], simGHome));
        return out.join('');
      } catch (e) {
        return '';
      }
    }

    function renderOdds(oddsGame) {
      if (!oddsGame) return '';
      const ml = oddsGame.ml || {};
      const tot = oddsGame.total || {};
      const pl = oddsGame.puckline || {};

      function hasVal(x) {
        return x !== null && x !== undefined && x !== '';
      }

      const rows = [];

      // Core game markets
      {
        const parts = [];
        if (hasVal(ml.away) && hasVal(ml.home)) {
          parts.push(`ML <span class="mono">A ${ml.away} (${ml.away_book || '—'})</span> · <span class="mono">H ${ml.home} (${ml.home_book || '—'})</span>`);
        }
        if (hasVal(tot.line) && (hasVal(tot.over) || hasVal(tot.under))) {
          parts.push(`Total <span class="mono">${fmt(tot.line,1)}</span> O ${tot.over ?? '—'} (${tot.over_book || '—'}) / U ${tot.under ?? '—'} (${tot.under_book || '—'})`);
        }
        const plAway = pl['away_+1.5'];
        const plAwayBook = pl['away_+1.5_book'];
        const plHome = pl['home_-1.5'];
        const plHomeBook = pl['home_-1.5_book'];
        if (hasVal(plAway) && hasVal(plHome)) {
          parts.push(`PL A+1.5 ${plAway} (${plAwayBook || '—'}) · H-1.5 ${plHome} (${plHomeBook || '—'})`);
        }
        if (parts.length) rows.push(`<span class="muted">Game:</span> ${parts.join(' · ')}`);
      }

      // Regulation 3-way (1X2)
      {
        const r = oddsGame.reg_3way || null;
        if (r && (hasVal(r.home) || hasVal(r.draw) || hasVal(r.away))) {
          rows.push(`<span class="muted">Reg 1X2:</span> <span class="mono">H ${r.home ?? '—'} (${r.home_book || '—'})</span> · <span class="mono">D ${r.draw ?? '—'} (${r.draw_book || '—'})</span> · <span class="mono">A ${r.away ?? '—'} (${r.away_book || '—'})</span>`);
        }
      }

      function renderPeriodRow(lbl, blk) {
        if (!blk) return '';
        const parts = [];
        const mlp = blk.ml || null;
        const totp = blk.total || null;
        const spr = blk.spread || null;
        const tw = blk.three_way || null;

        if (mlp && (hasVal(mlp.home) || hasVal(mlp.away))) {
          parts.push(`ML <span class="mono">H ${mlp.home ?? '—'} (${mlp.home_book || '—'})</span> · <span class="mono">A ${mlp.away ?? '—'} (${mlp.away_book || '—'})</span>`);
        }
        if (totp && hasVal(totp.line) && (hasVal(totp.over) || hasVal(totp.under))) {
          parts.push(`Tot <span class="mono">${fmt(totp.line,1)}</span> O ${totp.over ?? '—'} (${totp.over_book || '—'}) / U ${totp.under ?? '—'} (${totp.under_book || '—'})`);
        }
        if (spr && (hasVal(spr.home) || hasVal(spr.away)) && (hasVal(spr.home_point) || hasVal(spr.away_point))) {
          const hp = hasVal(spr.home_point) ? fmt(spr.home_point,1) : '—';
          const ap = hasVal(spr.away_point) ? fmt(spr.away_point,1) : '—';
          parts.push(`Spr <span class="mono">H ${hp} ${spr.home ?? '—'} (${spr.home_book || '—'})</span> · <span class="mono">A ${ap} ${spr.away ?? '—'} (${spr.away_book || '—'})</span>`);
        }
        if (tw && (hasVal(tw.home) || hasVal(tw.draw) || hasVal(tw.away))) {
          parts.push(`3W <span class="mono">H ${tw.home ?? '—'} (${tw.home_book || '—'})</span> · <span class="mono">D ${tw.draw ?? '—'} (${tw.draw_book || '—'})</span> · <span class="mono">A ${tw.away ?? '—'} (${tw.away_book || '—'})</span>`);
        }
        if (!parts.length) return '';
        return `<span class="muted">${lbl}:</span> ${parts.join(' · ')}`;
      }

      function renderPeriodTotalsOnlyRow(lbl, totp) {
        if (!totp) return '';
        const parts = [];
        if (hasVal(totp.line) && (hasVal(totp.over) || hasVal(totp.under))) {
          parts.push(`Tot <span class="mono">${fmt(totp.line,1)}</span> O ${totp.over ?? '—'} (${totp.over_book || '—'}) / U ${totp.under ?? '—'} (${totp.under_book || '—'})`);
        }
        if (!parts.length) return '';
        return `<span class="muted">${lbl}:</span> ${parts.join(' · ')}`;
      }

      // Per-period markets
      {
        const pls = oddsGame.period_lines || null;
        let anyPeriod = false;
        if (pls) {
          const p1 = renderPeriodRow('P1', pls.p1 || null);
          const p2 = renderPeriodRow('P2', pls.p2 || null);
          const p3 = renderPeriodRow('P3', pls.p3 || null);
          if (p1) { rows.push(p1); anyPeriod = true; }
          if (p2) { rows.push(p2); anyPeriod = true; }
          if (p3) { rows.push(p3); anyPeriod = true; }
        }

        // Fallback: some feeds only provide per-period totals even when ML/spreads/3W are missing.
        if (!anyPeriod) {
          const pt = oddsGame.period_totals || null;
          if (pt) {
            const t1 = renderPeriodTotalsOnlyRow('P1', pt.p1 || null);
            const t2 = renderPeriodTotalsOnlyRow('P2', pt.p2 || null);
            const t3 = renderPeriodTotalsOnlyRow('P3', pt.p3 || null);
            if (t1) rows.push(t1);
            if (t2) rows.push(t2);
            if (t3) rows.push(t3);
          }
        }
      }

      if (!rows.length) return '';
      return `<div class="v"><span class="muted">Live lines:</span>${rows.map(r => `<div class="rowline">${r}</div>`).join('')}</div>`;
    }

    function renderTopLiveContext(game) {
      try {
        const g = (game && game.guidance) ? game.guidance : null;
        const parts = [];

        try {
          const st = String((game && (game.gameState || game.game_state || game.state)) || '').trim();
          if (isLiveState(st)) {
            const per = (game && game.period !== undefined && game.period !== null) ? game.period : null;
            const perDisp = (game && (game.period_disp !== undefined && game.period_disp !== null)) ? String(game.period_disp).trim() : '';
            const clk = (game && game.clock) ? String(game.clock).trim() : '';
            const intermission = !!(game && game.intermission);
            const t = formatLiveClockText(st, per, clk, perDisp, intermission);
            if (t && t !== '—') parts.push(t);
          }
        } catch (e) {
          // ignore
        }

        if (g && g.manpower) {
          let mp = String(g.manpower);
          if (g.pp_team) {
            const side = String(g.pp_team).toUpperCase() === 'HOME' ? 'H' : 'A';
            mp += ` ${side}PP`;
            if (g.pp_sec_remaining_est !== null && g.pp_sec_remaining_est !== undefined && isFinite(Number(g.pp_sec_remaining_est))) {
              const rem = Math.max(0, Math.round(Number(g.pp_sec_remaining_est)));
              const mm = Math.floor(rem / 60);
              const ss = rem % 60;
              mp += ` ${mm}:${String(ss).padStart(2,'0')}`;
            }
          }
          parts.push(mp);
        }

        if (g && (g.away_empty_net || g.home_empty_net)) {
          const en = [];
          if (g.away_empty_net) en.push('A-EN');
          if (g.home_empty_net) en.push('H-EN');
          parts.push(en.join('/'));
        }

        if (g && ((g.away_att_l5 !== null && g.away_att_l5 !== undefined) || (g.home_att_l5 !== null && g.home_att_l5 !== undefined))) {
          const aa5 = (g.away_att_l5 !== null && g.away_att_l5 !== undefined && isFinite(Number(g.away_att_l5))) ? String(Math.round(Number(g.away_att_l5))) : '—';
          const ha5 = (g.home_att_l5 !== null && g.home_att_l5 !== undefined && isFinite(Number(g.home_att_l5))) ? String(Math.round(Number(g.home_att_l5))) : '—';
          parts.push(`AttL5 A${aa5}/H${ha5}`);
        }

        if (g && ((g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined) || (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined))) {
          const ax = (g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined && isFinite(Number(g.away_xg_proxy_l10))) ? fmt(Number(g.away_xg_proxy_l10), 2) : '—';
          const hx = (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined && isFinite(Number(g.home_xg_proxy_l10))) ? fmt(Number(g.home_xg_proxy_l10), 2) : '—';
          parts.push(`xG10 A${ax}/H${hx}`);
        }

        // Faceoffs (possession proxy)
        try {
          if (!g) throw new Error('no_guidance');
          const aT10 = (g.away_fo_taken_l10 !== null && g.away_fo_taken_l10 !== undefined && isFinite(Number(g.away_fo_taken_l10))) ? Number(g.away_fo_taken_l10) : null;
          const hT10 = (g.home_fo_taken_l10 !== null && g.home_fo_taken_l10 !== undefined && isFinite(Number(g.home_fo_taken_l10))) ? Number(g.home_fo_taken_l10) : null;
          const use10 = ((aT10 !== null && aT10 > 0) || (hT10 !== null && hT10 > 0));

          const aW = use10
            ? ((g.away_fo_wins_l10 !== null && g.away_fo_wins_l10 !== undefined && isFinite(Number(g.away_fo_wins_l10))) ? Number(g.away_fo_wins_l10) : null)
            : ((g.away_fo_wins !== null && g.away_fo_wins !== undefined && isFinite(Number(g.away_fo_wins))) ? Number(g.away_fo_wins) : null);
          const hW = use10
            ? ((g.home_fo_wins_l10 !== null && g.home_fo_wins_l10 !== undefined && isFinite(Number(g.home_fo_wins_l10))) ? Number(g.home_fo_wins_l10) : null)
            : ((g.home_fo_wins !== null && g.home_fo_wins !== undefined && isFinite(Number(g.home_fo_wins))) ? Number(g.home_fo_wins) : null);

          const aT = use10
            ? aT10
            : ((g.away_fo_taken !== null && g.away_fo_taken !== undefined && isFinite(Number(g.away_fo_taken))) ? Number(g.away_fo_taken) : null);
          const hT = use10
            ? hT10
            : ((g.home_fo_taken !== null && g.home_fo_taken !== undefined && isFinite(Number(g.home_fo_taken))) ? Number(g.home_fo_taken) : null);

          const aP = use10
            ? ((g.away_fo_pct_l10 !== null && g.away_fo_pct_l10 !== undefined && isFinite(Number(g.away_fo_pct_l10))) ? Number(g.away_fo_pct_l10) : null)
            : ((g.away_fo_pct !== null && g.away_fo_pct !== undefined && isFinite(Number(g.away_fo_pct))) ? Number(g.away_fo_pct) : null);
          const hP = use10
            ? ((g.home_fo_pct_l10 !== null && g.home_fo_pct_l10 !== undefined && isFinite(Number(g.home_fo_pct_l10))) ? Number(g.home_fo_pct_l10) : null)
            : ((g.home_fo_pct !== null && g.home_fo_pct !== undefined && isFinite(Number(g.home_fo_pct))) ? Number(g.home_fo_pct) : null);

          if ((aT !== null && aT > 0) || (hT !== null && hT > 0)) {
            const scope = use10 ? 'FO10' : 'FO';
            const aTxt = (aW !== null && aT !== null) ? `${Math.round(aW)}/${Math.round(aT)}` : '—';
            const hTxt = (hW !== null && hT !== null) ? `${Math.round(hW)}/${Math.round(hT)}` : '—';
            const aPct = (aP !== null) ? `${fmt(aP, 0)}%` : '—';
            const hPct = (hP !== null) ? `${fmt(hP, 0)}%` : '—';
            parts.push(`${scope} A${aTxt} (${aPct})/H${hTxt} (${hPct})`);
          }
        } catch (e) {
          // ignore
        }

        if (!parts.length) return '';
        return `<span class="muted">Live context:</span> ${parts.join(' · ')}`;
      } catch (e) {
        return '';
      }
    }

    function renderGuidance(game) {
      const g = (game && game.guidance) ? game.guidance : null;
      if (!g) return '';
      const notes = Array.isArray(g.notes) ? g.notes.filter(x => String(x || '').trim()) : [];
      const lean = String(g.lean_total || 'neutral').toUpperCase();

      const st = String((game && (game.gameState || game.game_state || game.state)) || '').trim();
      const per = (game && game.period !== undefined && game.period !== null) ? game.period : null;
      const perDisp = (game && (game.period_disp !== undefined && game.period_disp !== null)) ? String(game.period_disp).trim() : '';
      const intermission = !!(game && game.intermission);
      const clock = (game && game.clock) ? String(game.clock) : '';
      const score = (game && game.score) ? game.score : {};
      const awayScore = (score && score.away !== undefined && score.away !== null) ? score.away : '—';
      const homeScore = (score && score.home !== undefined && score.home !== null) ? score.home : '—';

      const sigs = (game && Array.isArray(game.signals)) ? game.signals : [];
      const betSigs = sigs.filter(s => String((s||{}).action||'').toUpperCase() === 'BET');
      const watchSigs = sigs.filter(s => String((s||{}).action||'').toUpperCase() === 'WATCH');

      const bits = [];
      if (g.goal_pace_60 !== null && g.goal_pace_60 !== undefined) bits.push(`Goal pace/60 ${fmt(g.goal_pace_60, 1)}`);
      if (g.sog_pace_60 !== null && g.sog_pace_60 !== undefined) bits.push(`SOG pace/60 ${fmt(g.sog_pace_60, 0)}`);
      if (g.total_goals !== null && g.total_goals !== undefined && g.live_total_line !== null && g.live_total_line !== undefined) {
        bits.push(`Total ${g.total_goals} vs line ${fmt(g.live_total_line, 1)}`);
      }

      const hasModel = (g.p_over !== null && g.p_over !== undefined) || (g.p_under !== null && g.p_under !== undefined);
      const hasEdge = (g.edge_over !== null && g.edge_over !== undefined) || (g.edge_under !== null && g.edge_under !== undefined);
      const pOver = (g.p_over !== null && g.p_over !== undefined) ? Number(g.p_over) : null;
      const pUnder = (g.p_under !== null && g.p_under !== undefined) ? Number(g.p_under) : null;
      const pPush = (g.p_push !== null && g.p_push !== undefined) ? Number(g.p_push) : null;
      const eOver = (g.edge_over !== null && g.edge_over !== undefined) ? Number(g.edge_over) : null;
      const eUnder = (g.edge_under !== null && g.edge_under !== undefined) ? Number(g.edge_under) : null;

      const totalGoals = (g.total_goals !== null && g.total_goals !== undefined && isFinite(Number(g.total_goals))) ? Number(g.total_goals) : null;
      const liveLine = (g.live_total_line !== null && g.live_total_line !== undefined && isFinite(Number(g.live_total_line))) ? Number(g.live_total_line) : null;
      const remMin = (g.remaining_min !== null && g.remaining_min !== undefined && isFinite(Number(g.remaining_min))) ? Number(g.remaining_min) : null;
      const muRem = (g.mu_remaining !== null && g.mu_remaining !== undefined && isFinite(Number(g.mu_remaining))) ? Number(g.mu_remaining) : null;

      const lines = [];
      lines.push(`<div class="k">Live guidance</div>`);
      if (per !== null || clock || (awayScore !== '—' && homeScore !== '—')) {
        const headBits = [];
        const liveText = formatLiveClockText(st, per, clock, perDisp, intermission);
        if (liveText && liveText !== '—') headBits.push(liveText);
        headBits.push(`Score ${awayScore}-${homeScore}`);
        if (totalGoals !== null) headBits.push(`Total ${totalGoals}`);
        lines.push(`<div class="v"><strong>${headBits.join(' · ')}</strong></div>`);
      }
      lines.push(`<div class="v"><span class="muted">Lean:</span> <strong>${lean}</strong>${bits.length ? ' · ' + bits.join(' · ') : ''}</div>`);

      // Make the total situation explicit (needs / allows) + a simple projection.
      try {
        if (liveLine !== null && totalGoals !== null) {
          const isInt = Math.abs(liveLine - Math.round(liveLine)) < 1e-9;
          const overWinTotal = isInt ? (Math.round(liveLine) + 1) : (Math.floor(liveLine) + 1);
          const underWinTotal = isInt ? (Math.round(liveLine) - 1) : Math.floor(liveLine);
          const overNeeds = Math.max(0, overWinTotal - totalGoals);
          const underAllows = (underWinTotal - totalGoals);
          const tBits = [];
          tBits.push(`Line ${fmt(liveLine, 1)}`);
          tBits.push(`Over needs ${overNeeds}${overNeeds === 1 ? ' goal' : ' goals'}+`);
          if (underAllows >= 0) {
            tBits.push(`Under allows ${underAllows}${underAllows === 1 ? ' more goal' : ' more goals'}`);
          } else {
            tBits.push(`Under likely dead`);
          }
          if (remMin !== null) {
            tBits.push(`Remaining ${fmt(remMin, 1)}m`);
            if (remMin > 0 && overNeeds > 0) {
              tBits.push(`Need pace ${(60.0 * overNeeds / remMin).toFixed(1)}/60`);
            }
          }
          lines.push(`<div class="v"><span class="muted">Total situation:</span> ${tBits.join(' · ')}</div>`);
        }
        if (totalGoals !== null && muRem !== null) {
          const projFinal = totalGoals + muRem;
          lines.push(`<div class="v"><span class="muted">Projection:</span> remaining ${fmt(muRem, 2)} → final ${fmt(projFinal, 2)}</div>`);
        }
      } catch (e) {
        // ignore
      }

      // Play-by-play context (best-effort): manpower/PP, empty net, and pressure.
      try {
        if (g.manpower) {
          let mp = `Manpower ${String(g.manpower)}`;
          if (g.pp_team) {
            mp += ` · ${String(g.pp_team).toUpperCase()} PP`;
            if (g.pp_sec_remaining_est !== null && g.pp_sec_remaining_est !== undefined && isFinite(Number(g.pp_sec_remaining_est))) {
              const rem = Math.max(0, Math.round(Number(g.pp_sec_remaining_est)));
              const mm = Math.floor(rem / 60);
              const ss = rem % 60;
              mp += ` (est ${mm}:${String(ss).padStart(2,'0')})`;
            }
          }
          lines.push(`<div class="v"><span class="muted">Context:</span> ${mp}</div>`);
        }

        if (g.home_empty_net || g.away_empty_net) {
          const en = [];
          if (g.away_empty_net) en.push('Away EN');
          if (g.home_empty_net) en.push('Home EN');
          lines.push(`<div class="v"><span class="muted">Context:</span> Empty net ${en.join(' / ')}</div>`);
        }

        if ((g.away_att_l5 !== null && g.away_att_l5 !== undefined) || (g.home_att_l5 !== null && g.home_att_l5 !== undefined)) {
          const aa5 = (g.away_att_l5 !== null && g.away_att_l5 !== undefined && isFinite(Number(g.away_att_l5))) ? String(Math.round(Number(g.away_att_l5))) : '—';
          const ha5 = (g.home_att_l5 !== null && g.home_att_l5 !== undefined && isFinite(Number(g.home_att_l5))) ? String(Math.round(Number(g.home_att_l5))) : '—';
          lines.push(`<div class="v"><span class="muted">Pressure:</span> Attempts last5 A ${aa5} / H ${ha5}</div>`);
        }

        if ((g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined) || (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined)) {
          const ax = (g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined && isFinite(Number(g.away_xg_proxy_l10))) ? fmt(Number(g.away_xg_proxy_l10), 2) : '—';
          const hx = (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined && isFinite(Number(g.home_xg_proxy_l10))) ? fmt(Number(g.home_xg_proxy_l10), 2) : '—';
          lines.push(`<div class="v"><span class="muted">Pressure:</span> xG proxy last10 A ${ax} / H ${hx}</div>`);
        }

        // Faceoffs
        try {
          const aT10 = (g.away_fo_taken_l10 !== null && g.away_fo_taken_l10 !== undefined && isFinite(Number(g.away_fo_taken_l10))) ? Number(g.away_fo_taken_l10) : null;
          const hT10 = (g.home_fo_taken_l10 !== null && g.home_fo_taken_l10 !== undefined && isFinite(Number(g.home_fo_taken_l10))) ? Number(g.home_fo_taken_l10) : null;
          const use10 = ((aT10 !== null && aT10 > 0) || (hT10 !== null && hT10 > 0));

          const aW = use10
            ? ((g.away_fo_wins_l10 !== null && g.away_fo_wins_l10 !== undefined && isFinite(Number(g.away_fo_wins_l10))) ? Number(g.away_fo_wins_l10) : null)
            : ((g.away_fo_wins !== null && g.away_fo_wins !== undefined && isFinite(Number(g.away_fo_wins))) ? Number(g.away_fo_wins) : null);
          const hW = use10
            ? ((g.home_fo_wins_l10 !== null && g.home_fo_wins_l10 !== undefined && isFinite(Number(g.home_fo_wins_l10))) ? Number(g.home_fo_wins_l10) : null)
            : ((g.home_fo_wins !== null && g.home_fo_wins !== undefined && isFinite(Number(g.home_fo_wins))) ? Number(g.home_fo_wins) : null);

          const aT = use10
            ? aT10
            : ((g.away_fo_taken !== null && g.away_fo_taken !== undefined && isFinite(Number(g.away_fo_taken))) ? Number(g.away_fo_taken) : null);
          const hT = use10
            ? hT10
            : ((g.home_fo_taken !== null && g.home_fo_taken !== undefined && isFinite(Number(g.home_fo_taken))) ? Number(g.home_fo_taken) : null);

          const aP = use10
            ? ((g.away_fo_pct_l10 !== null && g.away_fo_pct_l10 !== undefined && isFinite(Number(g.away_fo_pct_l10))) ? Number(g.away_fo_pct_l10) : null)
            : ((g.away_fo_pct !== null && g.away_fo_pct !== undefined && isFinite(Number(g.away_fo_pct))) ? Number(g.away_fo_pct) : null);
          const hP = use10
            ? ((g.home_fo_pct_l10 !== null && g.home_fo_pct_l10 !== undefined && isFinite(Number(g.home_fo_pct_l10))) ? Number(g.home_fo_pct_l10) : null)
            : ((g.home_fo_pct !== null && g.home_fo_pct !== undefined && isFinite(Number(g.home_fo_pct))) ? Number(g.home_fo_pct) : null);

          if ((aT !== null && aT > 0) || (hT !== null && hT > 0)) {
            const scope = use10 ? 'last10' : 'overall';
            const aTxt = (aW !== null && aT !== null) ? `${Math.round(aW)}/${Math.round(aT)}` : '—';
            const hTxt = (hW !== null && hT !== null) ? `${Math.round(hW)}/${Math.round(hT)}` : '—';
            const aPct = (aP !== null) ? `${fmt(aP, 0)}%` : '—';
            const hPct = (hP !== null) ? `${fmt(hP, 0)}%` : '—';
            lines.push(`<div class="v"><span class="muted">Possession:</span> Faceoffs ${scope} A ${aTxt} (${aPct}) / H ${hTxt} (${hPct})</div>`);
          }
        } catch (e) {
          // ignore
        }
      } catch (e) {
        // ignore
      }

      // Signals (WATCH/BET)
      try {
        const renderSigPill = (s) => {
          const act = String((s||{}).action || 'WATCH').toUpperCase();
          const cls = (act === 'BET') ? 'bet pos' : 'bet';
          const label = String((s||{}).label || '').trim() || 'Signal';
          const p = (s && s.p_model !== undefined && s.p_model !== null && isFinite(Number(s.p_model))) ? pct(Number(s.p_model)) : null;
          const edge = (s && s.edge !== undefined && s.edge !== null && isFinite(Number(s.edge))) ? (Number(s.edge) >= 0 ? '+' : '') + fmt(100*Number(s.edge), 1) + '%' : null;
          const price = (s && s.price !== undefined && s.price !== null) ? String(s.price) : null;
          const fair = (s && s.fair_price_american !== undefined && s.fair_price_american !== null) ? String(s.fair_price_american) : null;
          const maxp = (s && s.target_max_price_american !== undefined && s.target_max_price_american !== null) ? String(s.target_max_price_american) : null;

          const meta = [];
          if (p) meta.push(`p ${p}`);
          if (edge) meta.push(`edge ${edge}`);
          if (price) meta.push(`live ${price}`);
          if (fair) meta.push(`fair ${fair}`);
          if (maxp) meta.push(`max ${maxp}`);

          const metaTxt = meta.length ? ` <span class="muted">(${meta.join(' · ')})</span>` : '';
          return `<span class="${cls}">${act}: ${label}</span>${metaTxt}`;
        };

        const shown = [];
        for (const s of betSigs.slice(0, 6)) shown.push(renderSigPill(s));
        for (const s of watchSigs.slice(0, Math.max(0, 6 - shown.length))) shown.push(renderSigPill(s));
        if (shown.length) {
