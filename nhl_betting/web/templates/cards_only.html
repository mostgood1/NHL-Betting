<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NHL Game Cards</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    html.light {
      --cards-bg: #eef3f8;
      --cards-bg-alt: #f7fafc;
      --cards-surface: rgba(255, 255, 255, 0.92);
      --cards-surface-strong: rgba(255, 255, 255, 0.98);
      --cards-line: rgba(36, 64, 91, 0.12);
      --cards-line-strong: rgba(36, 64, 91, 0.22);
      --cards-text: #102133;
      --cards-text-soft: #28445f;
      --cards-text-dim: #5a748d;
      --cards-shadow: 0 20px 55px rgba(21, 40, 61, 0.12);
    }

    body.cards-body {
      color: var(--cards-text);
    }

    .cards-hero {
      display: grid;
      gap: 14px;
      width: 100%;
    }

    .cards-title-block {
      display: grid;
      gap: 8px;
    }

    .cards-kicker,
    .cards-section-kicker,
    .section-title,
    .tile .k,
    .live-lens .k,
    .props-strip .p-sub,
    .scoreboard-strip .s-time {
      color: var(--cards-text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .cards-kicker {
      margin-bottom: 6px;
    }

    #pageTitle {
      margin: 0;
    }

    .cards-header-actions,
    .topbar,
    .date-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-control-card,
    .scoreboard-strip,
    .props-strip,
    .tile,
    .live-lens,
    .sim-block,
    .merged-block {
      border: 1px solid var(--cards-line);
      background: linear-gradient(180deg, rgba(13, 27, 43, 0.9), rgba(8, 18, 30, 0.96));
      box-shadow: var(--cards-shadow);
    }

    html.light .cards-control-card,
    html.light .scoreboard-strip,
    html.light .props-strip,
    html.light .tile,
    html.light .live-lens,
    html.light .sim-block,
    html.light .merged-block,
    html.light .scoreboard-strip .s-item,
    html.light .props-strip .p-item {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 252, 0.98));
    }

    .cards-control-card {
      padding: 14px 16px;
      border-radius: 20px;
    }

    .cards-control-card--inline {
      display: grid;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 20px;
    }

    .cards-control-surface {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.9fr);
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--cards-line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(13, 27, 43, 0.92), rgba(8, 18, 30, 0.98));
      box-shadow: var(--cards-shadow);
      align-items: start;
    }

    html.light .cards-control-surface {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(247, 250, 252, 0.98));
    }

    .cards-control-main,
    .cards-control-summary {
      display: grid;
      gap: 10px;
      align-content: start;
      min-width: 0;
    }

    .cards-control-summary {
      padding: 14px;
      border: 1px solid rgba(132, 166, 196, 0.10);
      border-radius: 22px;
      background: rgba(7, 16, 28, 0.58);
    }

    html.light .cards-control-summary {
      background: rgba(255, 255, 255, 0.78);
    }

    .cards-actions-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-actions-row > .cards-control-card--inline {
      flex: 1 1 460px;
      min-width: min(100%, 420px);
    }

    header .btn {
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(132, 166, 196, 0.18);
      background: rgba(8, 18, 30, 0.86);
      color: var(--cards-text);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    header .btn:hover {
      border-color: rgba(154, 243, 222, 0.22);
      background: rgba(10, 21, 34, 0.96);
      transform: translateY(-1px);
    }

    html.light header .btn {
      background: rgba(255, 255, 255, 0.92);
    }

    .topbar--compact {
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-control-card--inline .cards-filters {
      gap: 10px;
      align-items: center;
    }

    .date-picker--inline {
      gap: 8px;
      flex-wrap: nowrap;
    }

    .date-picker--inline label {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .date-picker label {
      color: var(--cards-text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .date-input {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--cards-line-strong);
      border-radius: 999px;
      color: var(--cards-text);
      background: rgba(4, 12, 20, 0.72);
      font-size: 12px;
      font-weight: 700;
    }

    .date-picker--inline .date-input {
      min-width: 180px;
      min-height: 46px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: rgba(6, 16, 27, 0.86);
    }

    html.light .date-input {
      background: rgba(255, 255, 255, 0.92);
    }

    .spacer {
      flex: 1;
    }

    .muted {
      color: var(--cards-text-dim);
      font-size: 12px;
    }

    #status:empty {
      display: none;
    }

    .cards-section-heading {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 20px 0 10px;
    }

    .cards-section-heading h2 {
      margin: 2px 0 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(20px, 2.2vw, 28px);
      line-height: 1;
    }

    .cards-section-heading--compact {
      align-items: center;
    }

    .props-strip-label {
      margin: 0;
      text-align: right;
    }

    .props-strip-label:empty,
    .live-clock:empty,
    .live-score:empty,
    .live-ctx-top:empty,
    .lens-card-tag:empty,
    .driver-pill:empty,
    .scoreboard-strip:empty,
    .props-strip:empty,
    .live-guidance-body:empty,
    .live-odds-body:empty,
    .live-lens-body:empty {
      display: none;
    }

    .scoreboard-strip {
      --sb-gap: 12px;
      --sb-pad: 12px;
      --sb-item-min-h: 160px;
      display: grid;
      grid-template-columns: repeat(var(--sb-cols, 1), minmax(280px, 1fr));
      gap: var(--sb-gap);
      max-height: calc((var(--sb-item-min-h) * 2) + var(--sb-gap) + (var(--sb-pad) * 2));
      overflow-x: hidden;
      overflow-y: auto;
      padding: var(--sb-pad);
      border-radius: 24px;
      align-content: start;
    }

    .scoreboard-strip::-webkit-scrollbar,
    .props-strip::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .scoreboard-strip::-webkit-scrollbar-thumb,
    .props-strip::-webkit-scrollbar-thumb {
      background: rgba(132, 166, 196, 0.26);
      border-radius: 999px;
    }

    .scoreboard-strip .s-item {
      min-height: var(--sb-item-min-h);
      display: grid;
      gap: 10px;
      align-content: start;
      padding: 12px;
      border: 1px solid var(--cards-line);
      border-radius: 18px;
      text-decoration: none;
      color: var(--cards-text);
      background: linear-gradient(180deg, rgba(16, 34, 52, 0.94), rgba(9, 20, 31, 0.98));
      transition: transform 0.16s ease, border-color 0.16s ease;
    }

    .scoreboard-strip .s-item:hover {
      transform: translateY(-1px);
      border-color: rgba(154, 243, 222, 0.28);
    }

    .scoreboard-strip .s-item.live {
      border-color: rgba(78, 205, 196, 0.42);
      background: linear-gradient(180deg, rgba(16, 65, 77, 0.96), rgba(8, 28, 39, 0.98));
    }

    .scoreboard-strip .s-item.bet {
      border-color: rgba(104, 224, 162, 0.4);
      background: linear-gradient(180deg, rgba(18, 61, 41, 0.96), rgba(9, 25, 18, 0.98));
    }

    .scoreboard-strip .s-item.watch {
      border-color: rgba(255, 191, 105, 0.4);
      background: linear-gradient(180deg, rgba(78, 53, 18, 0.96), rgba(28, 19, 8, 0.98));
    }

    .scoreboard-strip .s-score {
      color: var(--cards-text-dim);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    .scoreboard-strip .s-teamline {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.15;
    }

    .scoreboard-strip .s-teamline .lhs {
      display: flex;
      align-items: start;
      gap: 8px;
      min-width: 0;
    }

    .scoreboard-strip .s-teamline .nm {
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .scoreboard-strip .s-teamline .pts {
      min-width: 18px;
      margin-left: 10px;
      text-align: right;
      font-size: 17px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .scoreboard-strip .team-logo {
      width: 17px;
      height: 17px;
      margin-top: 1px;
    }

    .scoreboard-strip .s-sig {
      color: var(--cards-text-soft);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.28;
      overflow-wrap: anywhere;
    }

    .props-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 12px;
      border-radius: 24px;
    }

    .props-strip .p-item {
      flex: 0 0 300px;
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--cards-line);
      border-radius: 18px;
      color: var(--cards-text);
      background: linear-gradient(180deg, rgba(16, 34, 52, 0.94), rgba(9, 20, 31, 0.98));
    }

    .cards-source-meta,
    .cards-filters,
    .cards-prop-filter-pills,
    .cards-prop-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-source-meta {
      margin: 0;
    }

    .cards-source-meta-pill,
    .cards-filter-pill,
    .cards-prop-filter-pill,
    .cards-prop-button {
      border: 1px solid var(--cards-line);
      border-radius: 999px;
      background: rgba(8, 18, 30, 0.78);
      color: var(--cards-text-soft);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
    }

    html.light .cards-source-meta-pill,
    html.light .cards-filter-pill,
    html.light .cards-prop-filter-pill,
    html.light .cards-prop-button {
      background: rgba(255, 255, 255, 0.92);
    }

    .cards-source-meta-pill,
    .cards-filter-pill,
    .cards-prop-filter-pill {
      min-height: 40px;
      padding: 10px 16px;
    }

    .cards-source-meta-pill.is-live,
    .cards-filter-pill.is-active,
    .cards-prop-filter-pill.is-active,
    .cards-prop-button.is-selected {
      color: #06131c;
      border-color: transparent;
      background: linear-gradient(135deg, #9af3de, #ffd166);
    }

    .cards-source-meta-pill.is-soft {
      color: var(--cards-text-dim);
      border-color: rgba(132, 166, 196, 0.12);
      background: rgba(8, 18, 30, 0.62);
    }

    .cards-filter-pill,
    .cards-prop-filter-pill,
    .cards-prop-button {
      cursor: pointer;
    }

    .cards-filter-pill:disabled,
    .cards-prop-filter-pill:disabled,
    .cards-prop-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .cards-prop-filter-shell,
    .cards-prop-groups {
      display: grid;
      gap: 14px;
    }

    .cards-prop-filter-group,
    .cards-prop-group {
      display: grid;
      gap: 8px;
    }

    .cards-prop-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .cards-prop-button {
      min-width: 220px;
      padding: 12px 14px;
      text-align: left;
      display: grid;
      gap: 4px;
    }

    .cards-prop-button strong,
    .cards-prop-button span {
      display: block;
    }

    .cards-prop-button .cards-subcopy {
      color: inherit;
      opacity: 0.84;
      font-size: 11px;
    }

    .props-strip .p-item:hover {
      border-color: rgba(154, 243, 222, 0.26);
    }

    .props-strip .p-head,
    .props-strip .p-who,
    .props-strip .p-subline {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .props-strip .p-head {
      justify-content: space-between;
      align-items: start;
    }

    .props-strip .p-img {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border: 1px solid var(--cards-line);
      border-radius: 999px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.03);
    }

    .props-strip .p-img.is-fallback {
      border-radius: 12px;
      object-fit: contain;
      padding: 5px;
    }

    .props-strip .p-name,
    .card-title .match,
    .team .name {
      font-family: "Space Grotesk", sans-serif;
    }

    .props-strip .p-name {
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .props-strip .p-team-logo {
      width: 14px;
      height: 14px;
      flex: 0 0 14px;
    }

    .props-strip .p-line,
    .props-strip .p-move {
      font-size: 12px;
      font-weight: 600;
    }

    .lens-card-tag,
    .driver-pill,
    .pill,
    .bet,
    .model-pill,
    .rec-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--cards-line-strong);
      background: rgba(4, 12, 20, 0.6);
      color: var(--cards-text-soft);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    html.light .lens-card-tag,
    html.light .driver-pill,
    html.light .pill,
    html.light .bet,
    html.light .model-pill,
    html.light .rec-pill {
      background: rgba(240, 245, 250, 0.92);
    }

    .pill input[type="checkbox"] {
      margin: 0;
      accent-color: #4ecdc4;
    }

    .pill.active,
    .lens-card-tag.watch {
      border-color: rgba(78, 205, 196, 0.42);
      color: var(--cards-text);
    }

    .lens-card-tag.bet,
    .bet.pos,
    .rec-pill.ok {
      border-color: rgba(104, 224, 162, 0.4);
      color: #bdf4d4;
      background: rgba(14, 54, 34, 0.66);
    }

    .bet.neg,
    .rec-pill.bad {
      border-color: rgba(255, 107, 107, 0.4);
      color: #ffd1d1;
      background: rgba(68, 21, 21, 0.66);
    }

    .rec-pill.push {
      color: var(--cards-text-soft);
    }

    .driver-pills,
    .bets,
    .markets-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: start;
    }

    .driver-pills.inline {
      display: inline-flex;
      margin-left: 6px;
      vertical-align: middle;
    }

    .card {
      gap: 14px;
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      text-align: center;
    }

    .card-title .match {
      font-size: 18px;
      font-weight: 700;
      color: var(--cards-text);
    }

    .final-score {
      display: none;
    }

    .final-score.show {
      display: inline-flex;
    }

    .card .row.matchup {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      justify-items: center;
    }

    .card .team.side {
      width: 100%;
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .card .team-line {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card .team-line .lhs {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .team .name {
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      text-align: left;
    }

    .team .sub,
    .tile .v,
    .live-lens .v,
    .live-lens .rowline,
    .book-badge {
      color: var(--cards-text-soft);
      font-size: 12px;
    }

    .team-pts-big,
    .live-score {
      font-size: clamp(30px, 3vw, 38px);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .team-pts-big:empty {
      display: none;
    }

    .vs {
      color: var(--cards-text-dim);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .tile,
    .live-lens,
    .sim-block,
    .merged-block {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 18px;
    }

    .tile .v strong {
      font-size: 14px;
      color: var(--cards-text);
    }

    .markets-row .market {
      flex: 1 1 220px;
      min-width: 220px;
      display: grid;
      gap: 6px;
    }

    .bet .ev,
    .ev-badge,
    .mark,
    .rec-conf {
      font-weight: 900;
    }

    .empty {
      padding: 20px 0 28px;
    }

    .live-lens .mono,
    table.linescore th,
    table.linescore td,
    table.boxscore th,
    table.boxscore td {
      font-variant-numeric: tabular-nums;
    }

    .card.live-edge-ok {
      border-color: rgba(104, 224, 162, 0.34);
    }

    .card.live-edge-warn {
      border-color: rgba(78, 205, 196, 0.32);
    }

    table.linescore,
    table.boxscore {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
    }

    table.linescore th,
    table.linescore td,
    table.boxscore th,
    table.boxscore td {
      border: 1px solid var(--cards-line);
      padding: 6px 8px;
      font-size: 12px;
    }

    table.linescore th,
    table.boxscore th {
      color: var(--cards-text);
      background: rgba(4, 12, 20, 0.46);
      text-align: center;
    }

    table.linescore td,
    table.boxscore td {
      text-align: center;
      color: var(--cards-text-soft);
    }

    table.linescore td.team,
    table.boxscore td.player {
      text-align: left;
      color: var(--cards-text);
      font-weight: 700;
    }

    table.linescore td.total,
    table.boxscore tfoot td {
      font-weight: 700;
    }

    table.boxscore th.sortable {
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    header .btn:disabled,
    header button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .compact-card .cards {
      gap: 8px;
    }

    .compact-card .card {
      padding: 10px;
      gap: 10px;
      border-radius: 20px;
    }

    .compact-card .card-title .match {
      font-size: 14px;
    }

    .compact-card .pill,
    .compact-card .bet,
    .compact-card .driver-pill,
    .compact-card .lens-card-tag {
      min-height: 24px;
      padding: 0 8px;
      font-size: 10px;
    }

    .compact-card .team .name {
      font-size: 16px;
    }

    .compact-card .team .sub,
    .compact-card .tile .v,
    .compact-card .live-lens .v {
      font-size: 11px;
    }

    .compact-card .team-logo {
      width: 28px;
      height: 28px;
    }

    .compact-card .team-pts-big {
      font-size: 24px;
    }

    .compact-card .vs {
      font-size: 14px;
    }

    .compact-card .tile,
    .compact-card .live-lens,
    .compact-card .sim-block,
    .compact-card .merged-block {
      padding: 9px;
      gap: 6px;
    }

    .compact-card .tile .k,
    .compact-card .live-lens .k,
    .compact-card .section-title,
    .compact-card .cards-kicker,
    .compact-card .cards-section-kicker {
      font-size: 10px;
    }

    .compact-card .markets-row {
      gap: 8px;
    }

    .compact-card .markets-row .market {
      min-width: 188px;
    }

    .compact-card .scoreboard-strip {
      --sb-gap: 8px;
      --sb-pad: 8px;
      --sb-item-min-h: 138px;
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      max-height: none;
      border-radius: 20px;
    }

    .compact-card .scoreboard-strip .s-item {
