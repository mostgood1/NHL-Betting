<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NHL Betting – Cards</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    /* Minimal layout additions; reuse existing palette from style.css */
    header .header-inner { flex-wrap: wrap; }
    .topbar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; width:100%; }
    .date-picker { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .date-picker label { color:#9fb0ff; font-size:12px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; }
    .date-input { background:#0f1530; border:1px solid #25316a; color:#cfe0ff; padding:7px 10px; border-radius:10px; font-weight:700; font-size:12px; }
    .spacer { flex:1; }
    .muted { color:#9fb0ff; font-size:12px; }

    /* NBA-style compact scoreboard strip + card tags */
    .scoreboard-strip {
      display:grid;
      gap:8px;
      grid-template-columns: repeat(var(--sb-cols, 1), minmax(0, 1fr));
      grid-template-rows: repeat(var(--sb-rows, 1), auto);
      overflow-x:hidden;
      padding:10px 0;
      margin: 8px 0 12px;
      border-top: 1px solid #25316a;
      border-bottom: 1px solid #25316a;
      background: #0b1020;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .scoreboard-strip:empty { display:none; }
    .scoreboard-strip .s-item {
      min-width: 0;
      background:#0f1530;
      border:1px solid #25316a;
      border-radius:12px;
      padding:8px 10px;
      text-decoration:none;
      color:#cfe0ff;
      display:grid;
      gap:4px;
    }
    .scoreboard-strip .s-item:hover { border-color:#3a4aa6; }
    .scoreboard-strip .s-item.live { border-color:#3a4aa6; }
    .scoreboard-strip .s-item.bet { background:#0f2d1b; border-color:#1e7a45; color:#a7f3c6; }
    .scoreboard-strip .s-item.watch { background:#152055; border-color:#3a4aa6; color:#e8eaf6; }
    .scoreboard-strip .s-time { color:#9fb0ff; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; }
    .scoreboard-strip .s-score { color:#cfe0ff; font-size:11px; font-weight:900; letter-spacing:0.2px; }
    .scoreboard-strip .s-score:empty { display:none; }
    .scoreboard-strip .s-teamline { display:flex; align-items:center; gap:8px; font-weight:900; font-size:12px; letter-spacing:0.2px; justify-content:space-between; }
    .scoreboard-strip .s-teamline .lhs { display:flex; align-items:center; gap:8px; min-width:0; }
    .scoreboard-strip .s-teamline .nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .scoreboard-strip .s-teamline .pts { font-variant-numeric: tabular-nums; margin-left:10px; }
    .scoreboard-strip .team-logo { width:18px; height:18px; object-fit:contain; }
    .scoreboard-strip .s-sig {
      font-size:11px;
      font-weight:800;
      white-space:normal;
      overflow:visible;
      text-overflow:clip;
      overflow-wrap:anywhere;
      opacity: 0.95;
    }
    .scoreboard-strip .s-sig:empty { display:none; }
    .scoreboard-strip .s-sig.bet { color:#a7f3c6; }
    .scoreboard-strip .s-sig.watch { color:#e8eaf6; }
    .lens-card-tag {
      display:inline-flex;
      align-items:center;
      padding:3px 8px;
      border-radius:999px;
      border:1px solid #25316a;
      background:#0f1530;
      color:#cfe0ff;
      font-size:11px;
      font-weight:900;
      letter-spacing:0.2px;
      white-space:nowrap;
      max-width: 360px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .lens-card-tag:empty { display:none; }
    .lens-card-tag.bet { background:#0f2d1b; border-color:#1e7a45; color:#a7f3c6; }
    .lens-card-tag.watch { background:#152055; border-color:#3a4aa6; color:#e8eaf6; }

    /* Driver pills (compact tag chips) */
    .driver-pills { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .driver-pills.inline { display:inline-flex; margin-top:0; margin-left:6px; vertical-align:middle; }
    .driver-pill {
      display:inline-flex;
      align-items:center;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid #25316a;
      background:#0b1020;
      color:#cfe0ff;
      font-size:11px;
      font-weight:800;
      letter-spacing:0.2px;
      white-space:nowrap;
      max-width: 360px;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .driver-pill:empty { display:none; }

    .card { gap: 12px; }
    .card-title { display:flex; align-items:baseline; justify-content:center; gap:10px; flex-wrap:wrap; text-align:center; }
    .card-title .match { font-weight:900; font-size:16px; color:#f5f7ff; }
    .pill { display:inline-flex; align-items:center; gap:6px; padding:3px 8px; border-radius:999px; background:#0f1530; border:1px solid #25316a; color:#c9d3ff; font-size:11px; font-weight:700; }
    .pill.active { background:#152055; border-color:#3a4aa6; color:#e8eaf6; }
    .pill:hover { border-color:#3a4aa6; }
    .view-toggle { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .live-clock:empty { display:none; }
    .live-score:empty { display:none; }
    .final-score { display:none; }
    .final-score.show { display:inline-flex; }

    #pageTitle { margin:0; }
    #empty { display:none; }

    /* Center the top matchup section within each card */
    .card .row.matchup { justify-items: center; }
    .card .team.side { justify-items: center; }
    .card .team-line { display:flex; align-items:center; justify-content:space-between; width:100%; }
    .card .team-line .lhs { display:flex; align-items:center; gap:8px; min-width:0; }
    .card .team .name { text-align: left; }
    .team-pts-big { font-size: 28px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; }
    .team-pts-big:empty { display:none; }

    .grid-3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
    .tile { background:#0f1530; border:1px solid #25316a; border-radius:10px; padding:10px; display:grid; gap:6px; }
    .tile .k { color:#9fb0ff; font-size:11px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; }
    .tile .v { font-variant-numeric: tabular-nums; font-size:12px; color:#e8eaf6; }
    .tile .v strong { font-size:14px; }

    .markets-row { display:flex; flex-wrap:wrap; gap:12px; align-items:flex-start; }
    .markets-row .market { flex: 1 1 220px; min-width: 220px; display:grid; gap:6px; }

    .bets { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .bet { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; background:#0f1530; border:1px solid #25316a; font-size:12px; }
    .bet .ev { font-weight:900; }
    .bet.pos { background:#0f2d1b; border-color:#1e7a45; color:#a7f3c6; }
    .bet.neg { background:#2a1620; border-color:#7a1e49; color:#ffd5e6; }

    .live-ctx-top:empty { display:none; }

    .empty { padding: 18px 0; }

    .live-lens { background:#0f1530; border:1px solid #25316a; border-radius:10px; padding:10px; display:grid; gap:6px; }
    .live-lens .k { color:#9fb0ff; font-size:11px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; }
    .live-lens .v { font-variant-numeric: tabular-nums; font-size:12px; color:#e8eaf6; }
    .live-lens .rowline { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    .live-lens .mono { font-variant-numeric: tabular-nums; }

    /* Live lens box only appears when live data is available. */
    .live-guidance-body:empty { display:none; }
    .live-odds-body:empty { display:none; }
    .live-lens-body:empty { display:none; }

    .sim-block { background:#0f1530; border:1px solid #25316a; border-radius:10px; padding:10px; display:grid; gap:10px; }

    .merged-block { background:#0f1530; border:1px solid #25316a; border-radius:10px; padding:10px; display:grid; gap:10px; }
    .section-title { color:#9fb0ff; font-size:11px; font-weight:800; letter-spacing:0.3px; text-transform:uppercase; }
    table.linescore, table.boxscore { width:100%; border-collapse: collapse; }
    table.linescore th, table.linescore td, table.boxscore th, table.boxscore td { border:1px solid #25316a; padding:4px 6px; font-size:12px; font-variant-numeric: tabular-nums; }
    table.linescore th, table.boxscore th { color:#cfe0ff; background:#0b1020; text-align:center; }
    table.linescore td { text-align:center; }
    table.linescore td.team { text-align:left; font-weight:900; }
    table.linescore td.total { font-weight:900; }
    table.boxscore td { text-align:center; }
    table.boxscore td.player { text-align:left; }
    table.boxscore th.sortable { cursor:pointer; -webkit-user-select:none; user-select:none; }
    table.boxscore tfoot td { font-weight:700; }
    table.boxscore tfoot td.player { font-weight:700; }

    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: 1fr; }
    }
  </style>
  <script>
    (function() {
      try {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') document.documentElement.classList.add('light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="topbar">
        <h1 id="pageTitle">NHL Betting – Cards</h1>
        <div class="date-picker">
          <label for="datePicker">Date</label>
          <input id="datePicker" class="date-input" type="date" />
        </div>
        <div class="spacer"></div>
        <a id="accuracyLink" class="btn" href="/api/live-lens-accuracy">Accuracy</a>
        <button type="button" id="themeToggle" class="btn" title="Toggle light/dark theme">Toggle Theme</button>
      </div>
      <div class="muted" id="status">Loading…</div>
    </div>
  </header>
  <main>
    <div class="container">
      <div id="scoreboardStrip" class="scoreboard-strip"></div>
      <div id="cards" class="cards"></div>
      <div id="empty" class="empty muted"></div>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    const LIVE_POLL_MS = 20000;
    let currentDate = null;
    let livePollTimer = null;
    let livePollInFlight = false;

    // Pregame props display cap (American odds). Keeps the UI focused on bettable ranges.
    // Hard cap by default: only show props with -125 <= price <= +125.
    const PROPS_AMERICAN_PRICE_MIN = -125;
    const PROPS_AMERICAN_PRICE_MAX = 125;
    // Small EV floor to avoid thin/noisy picks dominating the list.
    const PROPS_EV_MIN = 0.02;

    function setAccuracyHref(d) {
      const base = '/api/live-lens-accuracy';
      if (!d) {
        $('accuracyLink').setAttribute('href', base);
        return;
      }
      const u = new URL(base, window.location.origin);
      u.searchParams.set('date', d);
      $('accuracyLink').setAttribute('href', u.pathname + u.search);
    }

    function pct(x) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return (100 * Number(x)).toFixed(1) + '%';
    }

    function fmt(x, nd=2) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return Number(x).toFixed(nd);
    }

    function fmtInt(x) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return String(Math.round(Number(x)));
    }

    function parseSortValue(txt, type) {
      const s = String(txt || '').trim();
      if (!s || s === '—') return null;
      if (type === 'num') {
        const n = Number(s);
        return isFinite(n) ? n : null;
      }
      if (type === 'pct') {
        const n = Number(s.replace('%',''));
        return isFinite(n) ? n : null;
      }
      if (type === 'toi') {
        // Accept mm:ss or hh:mm:ss
        const parts = s.split(':').map(x => Number(x));
        if (parts.some(x => !isFinite(x))) return null;
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return null;
      }
      return s.toLowerCase();
    }

    function sortBoxscoreTableByHeader(th) {
      const table = th.closest('table');
      if (!table) return;
      if (!table.classList.contains('boxscore')) return;

      const tr = th.parentElement;
      if (!tr) return;
      const headers = Array.from(tr.children || []);
      const idx = headers.indexOf(th);
      if (idx < 0) return;

      const type = String(th.dataset.sortType || 'text');
      const existing = th.dataset.sortDir || '';
      let dir;
      if (!existing) {
        dir = (type === 'text') ? 'asc' : 'desc';
      } else {
        dir = existing === 'asc' ? 'desc' : 'asc';
      }

      table.querySelectorAll('th.sortable').forEach(x => {
        if (x !== th) delete x.dataset.sortDir;
      });
      th.dataset.sortDir = dir;

      const tbody = table.tBodies && table.tBodies[0];
      if (!tbody) return;
      const rows = Array.from(tbody.rows || []).map((r, i) => ({ r, i }));
      const mult = (dir === 'asc') ? 1 : -1;

      rows.sort((a, b) => {
        const ta = a.r.cells[idx] ? a.r.cells[idx].textContent : '';
        const tb = b.r.cells[idx] ? b.r.cells[idx].textContent : '';
        const va = parseSortValue(ta, type);
        const vb = parseSortValue(tb, type);

        const aNull = (va === null || va === undefined);
        const bNull = (vb === null || vb === undefined);
        if (aNull && bNull) return a.i - b.i;
        if (aNull) return 1;
        if (bNull) return -1;

        if (typeof va === 'number' && typeof vb === 'number') {
          const d = (va - vb);
          if (d !== 0) return mult * d;
          return a.i - b.i;
        }
        const sa = String(va);
        const sb = String(vb);
        if (sa < sb) return -1 * mult;
        if (sa > sb) return 1 * mult;
        return a.i - b.i;
      });

      for (const x of rows) tbody.appendChild(x.r);
    }

    document.addEventListener('click', (ev) => {
      const th = ev.target && ev.target.closest ? ev.target.closest('th.sortable') : null;
      if (!th) return;
      sortBoxscoreTableByHeader(th);
    });

    function toUpper(s) {
      return String(s || '').toUpperCase();
    }

    function inferTeamAbbrFromLogoUrl(url) {
      const s = String(url || '').trim();
      if (!s) return '';
      // Common NHL logo pattern: .../svg/NYR_dark.svg or .../svg/NYR.svg
      const m = s.match(/\/([A-Za-z]{2,4})(?:_[^\/]+)?\.(?:svg|png|jpg|jpeg)(?:\?|#|$)/);
      if (!m) return '';
      const ab = toUpper(m[1]);
      return /^[A-Z]{2,4}$/.test(ab) ? ab : '';
    }

    function predTeamAbbr(pred, side) {
      try {
        const direct = toUpper(pred && pred[side + '_abbr']);
        if (direct) return direct;
        const fromLogo = inferTeamAbbrFromLogoUrl(pred && pred[side + '_logo']);
        if (fromLogo) return fromLogo;
        const maybe = toUpper(pred && pred[side]);
        if (maybe && /^[A-Z]{2,4}$/.test(maybe)) return maybe;
      } catch (e) {}
      return '';
    }

    function keyForSimRow(r) {
      const away = String(r.game_away || '').trim();
      const home = String(r.game_home || '').trim();
      return away + ' @ ' + home;
    }

    function sumSim(rows, teamAbbr, period, col) {
      const t = toUpper(teamAbbr);
      let s = 0;
      let any = false;
      for (const r of (rows || [])) {
        if (!r) continue;
        if (toUpper(r.team) !== t) continue;
        if (Number(r.period) !== Number(period)) continue;
        const v = Number(r[col]);
        if (!isFinite(v)) continue;
        s += v;
        any = true;
      }
      return any ? s : null;
    }

    function renderLinescoreHtml(title, awayAbbr, homeAbbr, awayRow, homeRow, isSim=false) {
      const f = isSim ? (x) => fmt(x, 1) : (x) => fmtInt(x);
      const a = awayRow || {};
      const h = homeRow || {};
      return `
        <div class="section-title">${title}</div>
        <table class="linescore">
          <thead>
            <tr><th></th><th>1P</th><th>2P</th><th>3P</th><th>Total</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="team">${awayAbbr || '—'}</td>
              <td>${f(a.p1)}</td>
              <td>${f(a.p2)}</td>
              <td>${f(a.p3)}</td>
              <td class="total">${f(a.total)}</td>
            </tr>
            <tr>
              <td class="team">${homeAbbr || '—'}</td>
              <td>${f(h.p1)}</td>
              <td>${f(h.p2)}</td>
              <td>${f(h.p3)}</td>
              <td class="total">${f(h.total)}</td>
            </tr>
          </tbody>
        </table>
      `;
    }

    function renderSimSkatersTableHtml(title, simRows, teamAbbr) {
      const t = toUpper(teamAbbr);
      const rows = (simRows || [])
        .filter(r => r && Number(r.period) === 0)
        .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
        .filter(r => toUpper(r.team) === t)
        .filter(r => String(r.player || '').trim() && toUpper(r.player) !== 'TEAM')
        .filter(r => {
          const saves = Number(r.saves);
          return !(isFinite(saves) && saves > 0);
        })
        .map(r => ({
          player: r.player,
          pos: r.pos || r.position || r.player_position || r.playerPosition || r.player_pos,
          goals: Number(r.goals),
          assists: Number(r.assists),
          points: Number(r.points),
          shots: Number(r.shots),
          blocks: Number(r.blocks),
          toi_sec: Number(r.toi_sec),
        }));

      rows.sort((a,b) => (b.points - a.points) || (b.shots - a.shots) || (b.toi_sec - a.toi_sec));

      const body = rows.slice(0, 18).map(r => {
        const toi = isFinite(r.toi_sec) ? `${Math.floor(r.toi_sec/60)}:${String(Math.floor(r.toi_sec%60)).padStart(2,'0')}` : '—';
        return `
          <tr>
            <td class="player">${r.player || '—'}</td>
            <td>${r.pos ? String(r.pos) : '—'}</td>
            <td>${fmt(r.goals, 2)}</td>
            <td>${fmt(r.assists, 2)}</td>
            <td>${fmt(r.points, 2)}</td>
            <td>${fmt(r.shots, 2)}</td>
            <td>${fmt(r.blocks, 2)}</td>
            <td>${toi}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="section-title">${title}</div>
        <table class="boxscore">
          <thead><tr>
            <th class="sortable" data-sort-type="text">Player</th>
            <th class="sortable" data-sort-type="text">Pos</th>
            <th class="sortable" data-sort-type="num">G</th>
            <th class="sortable" data-sort-type="num">A</th>
            <th class="sortable" data-sort-type="num">P</th>
            <th class="sortable" data-sort-type="num">S</th>
            <th class="sortable" data-sort-type="num">BLK</th>
            <th class="sortable" data-sort-type="toi">TOI</th>
          </tr></thead>
          <tbody>${body || ''}</tbody>
        </table>
      `;
    }

    function renderSimGoaliesTableHtml(title, simRows, teamAbbr) {
      const t = toUpper(teamAbbr);
      const goalies = (simRows || [])
        .filter(r => r && Number(r.period) === 0)
        .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
        .filter(r => toUpper(r.team) === t)
        .filter(r => String(r.player || '').trim() && toUpper(r.player) !== 'TEAM')
        .filter(r => {
          const saves = Number(r.saves);
          return isFinite(saves) && saves > 0;
        })
        .map(r => ({
          player: r.player,
          pos: r.pos || r.position || r.player_position || r.playerPosition || r.player_pos,
          saves: Number(r.saves),
          toi_sec: Number(r.toi_sec),
        }));

      goalies.sort((a,b) => (b.saves - a.saves) || (b.toi_sec - a.toi_sec));

      const body = goalies.slice(0, 4).map(r => {
        const toi = isFinite(r.toi_sec) ? `${Math.floor(r.toi_sec/60)}:${String(Math.floor(r.toi_sec%60)).padStart(2,'0')}` : '—';
        return `
          <tr>
            <td class="player">${r.player || '—'}</td>
            <td>${r.pos ? String(r.pos) : '—'}</td>
            <td>${fmt(r.saves, 2)}</td>
            <td>${toi}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="section-title">${title}</div>
        <table class="boxscore">
          <thead><tr>
            <th class="sortable" data-sort-type="text">Goalie</th>
            <th class="sortable" data-sort-type="text">Pos</th>
            <th class="sortable" data-sort-type="num">SV</th>
            <th class="sortable" data-sort-type="toi">TOI</th>
          </tr></thead>
          <tbody>${body || ''}</tbody>
        </table>
      `;
    }

    function evClass(ev) {
      const v = Number(ev);
      if (!isFinite(v)) return '';
      return v >= 0 ? 'pos' : 'neg';
    }

    function keyForGame(r) {
      const away = String(r.away || '').trim();
      const home = String(r.home || '').trim();
      return away + ' @ ' + home;
    }

    function startTimeMs(p) {
      try {
        const cand = [
          'commence_time_utc','commence_time','start_time_utc','start_time','start_time_et',
          'game_time_utc','game_time_et','scheduled_start_utc','scheduled_utc','scheduled','scheduled_start'
        ];
        for (const k of cand) {
          const v = p ? p[k] : null;
          if (!v) continue;
          const t = Date.parse(String(v));
          if (isFinite(t)) return t;
        }
      } catch (e) {}
      return null;
    }

    function sortPredsByStart(preds) {
      const arr = (preds || []).slice();
      arr.sort((a, b) => {
        const ta = startTimeMs(a);
        const tb = startTimeMs(b);
        const aNull = (ta === null || ta === undefined);
        const bNull = (tb === null || tb === undefined);
        if (aNull && bNull) return keyForGame(a).localeCompare(keyForGame(b));
        if (aNull) return 1;
        if (bNull) return -1;
        if (ta !== tb) return ta - tb;
        return keyForGame(a).localeCompare(keyForGame(b));
      });
      return arr;
    }

    function getSelectedGameKeyFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search || '');
        const g = String(p.get('game') || '').trim();
        if (!g) return null;
        // Accept AWY@HOME or "AWY @ HOME"
        return g.replace(/\s+/g,' ').replace('@', ' @ ').replace(/\s+@\s+/, ' @ ').trim();
      } catch (e) {
        return null;
      }
    }

    function getRequestedDate() {
      try {
        const p = new URLSearchParams(window.location.search || '');
        const d = (p.get('date') || '').trim();
        return d || null;
      } catch (e) {
        return null;
      }
    }

    function setRequestedDateInUrl(date) {
      try {
        const u = new URL(window.location.href);
        if (date) u.searchParams.set('date', date);
        else u.searchParams.delete('date');
        window.history.replaceState({}, '', u.toString());
      } catch (e) {}
    }

    function normalizePropRec(rec) {
      try {
        const side = toUpper(rec && rec.side);
        const price = (rec && rec.price !== undefined && rec.price !== null) ? rec.price
          : (side === 'OVER' ? (rec && rec.over_price) : (rec && rec.under_price));
        const priceNum = (price !== null && price !== undefined && String(price).trim() !== '') ? Number(price) : NaN;
        const prob = (rec && rec.prob !== undefined && rec.prob !== null) ? Number(rec.prob)
          : ((rec && rec.p_over !== undefined && rec.p_over !== null) ? Number(rec.p_over) : NaN);
        return {
          team: toUpper(rec && rec.team),
          opp: toUpper(rec && rec.opp),
          player: String((rec && rec.player) ? rec.player : '').trim(),
          market: toUpper(rec && rec.market),
          side,
          line: (rec && rec.line !== undefined) ? rec.line : null,
          price,
          priceNum,
          ev: Number((rec && rec.ev !== undefined) ? rec.ev : NaN),
          edgeScore: Number((rec && rec.edge_score !== undefined) ? rec.edge_score : NaN),
          edgeReasons: String((rec && (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason)) ? (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason) : '').trim(),
          prob,
          book: String((rec && rec.book) ? rec.book : '').trim(),
        };
      } catch (e) {
        return { team:'', opp:'', player:'', market:'', side:'', line:null, price:null, priceNum:NaN, ev:NaN, edgeScore:NaN, edgeReasons:'', prob:NaN, book:'' };
      }
    }

    function renderPropsEdgesHtml(title, propsRows) {
      function americanToDecimal(x) {
        const v = Number(x);
        if (!isFinite(v) || v === 0) return NaN;
        return (v > 0) ? (1 + v/100.0) : (1 + 100.0/Math.abs(v));
      }

      // Normalize; prefer edge score, but fallback to EV for older bundles.
      const raw = (propsRows || []).map(normalizePropRec)
        .filter(r => r && r.player && r.market && r.side && (isFinite(r.edgeScore) || isFinite(r.ev)))
        .filter(r => {
          // If EV exists, require a small minimum; otherwise keep row (older artifacts).
          const ev = Number(r.ev);
          return !isFinite(ev) || ev >= PROPS_EV_MIN;
        })
        .filter(r => {
          // Hard display cap: only show bettable price ranges.
          const p = Number(r.priceNum);
          return isFinite(p) && p >= PROPS_AMERICAN_PRICE_MIN && p <= PROPS_AMERICAN_PRICE_MAX;
        });

      // Dedupe: show each prop once by best available price.
      const best = new Map();
      for (const r of raw) {
        const ln = (r.line !== null && r.line !== undefined && String(r.line).trim() !== '') ? String(r.line).trim() : '';
        const key = `${normKey(r.player)}|${toUpper(r.market)}|${toUpper(r.side)}|${ln}`;
        const cur = best.get(key);
        if (!cur) { best.set(key, r); continue; }
        const decNew = americanToDecimal(r.price);
        const decCur = americanToDecimal(cur.price);
        if (isFinite(decNew) && (!isFinite(decCur) || decNew > decCur)) { best.set(key, r); continue; }
        // Tie-break: higher edge score, then EV.
        if (r.edgeScore > cur.edgeScore) { best.set(key, r); continue; }
        if (r.edgeScore === cur.edgeScore && isFinite(r.ev) && (!isFinite(cur.ev) || r.ev > cur.ev)) { best.set(key, r); }
      }
      const rows = Array.from(best.values());
      // Prefer ranking by EV (bettability), then by edge score.
      rows.sort((a,b) => ((isFinite(b.ev) ? b.ev : -1e9) - (isFinite(a.ev) ? a.ev : -1e9)) || ((isFinite(b.edgeScore) ? b.edgeScore : -1e9) - (isFinite(a.edgeScore) ? a.edgeScore : -1e9)));
      const top = rows.slice(0, 4);
      if (!top.length) {
        return `<div class="market"><div class="k">${title}</div><div class="v muted">No props edges available.</div></div>`;
      }
      const body = top.map(r => {
        const edgeTxt = isFinite(r.edgeScore) ? (100 * r.edgeScore).toFixed(0) : '—';
        const evTxt = isFinite(r.ev) ? (100 * r.ev).toFixed(1) + '%' : '—';
        const prTxt = isFinite(r.prob) ? (100 * r.prob).toFixed(1) + '%' : '—';
        const ln = (r.line !== null && r.line !== undefined && String(r.line).trim() !== '') ? String(r.line) : '—';
        const price = (r.price !== null && r.price !== undefined && String(r.price).trim() !== '') ? String(r.price) : '—';
        const book = r.book ? ` (${r.book})` : '';
        const pills = r.edgeReasons ? renderDriverPills(r.edgeReasons, 3, false) : '';
        return `<div class="v"><strong>${r.player}</strong> ${r.market} ${r.side} ${ln} <span class="muted">@ ${price}${book}</span> · <strong>Edge ${edgeTxt}</strong> <span class="muted">(p ${prTxt}${isFinite(r.ev) ? `, EV ${evTxt}` : ''})</span>${pills}</div>`;
      }).join('');
      return `<div class="market"><div class="k">${title}</div>${body}</div>`;
    }

    function normKey(s) {
      return String(s || '').trim().replace(/\s+/g,' ').toLowerCase();
    }

    function normalizeRec(rec) {
      const ev = (rec && rec.ev !== undefined) ? Number(rec.ev) : NaN;
      return {
        market: String(rec.market || ''),
        side: String(rec.side || ''),
        line: (rec && rec.line !== undefined) ? rec.line : null,
        price: rec.price,
        ev,
        edgeReasons: String((rec && (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason)) ? (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason) : '').trim(),
        home: String(rec.home || ''),
        away: String(rec.away || ''),
      };
    }

    function _shortDriversText(s) {
      try {
        const x = String(s || '').trim();
        if (!x) return '';
        // Prefer the first 1-2 clauses; keep compact.
        const parts = x.split(/\s*[;|]\s*|\s*\u00b7\s*|\s*,\s*/).map(p => p.trim()).filter(Boolean);
        const keep = parts.slice(0, 2).join(' · ');
        const out = keep || x;
        return out.length > 90 ? (out.slice(0, 87) + '...') : out;
      } catch (e) {
        return '';
      }
    }

    function escHtml(s) {
      try {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      } catch (e) {
        return '';
      }
    }

    function splitDrivers(s) {
      try {
        const x = String(s || '').trim();
        if (!x) return [];
        const parts = x
          .split(/\s*[;|]\s*|\s*\u00b7\s*|\s*,\s*/)
          .map(p => String(p || '').trim())
          .filter(Boolean);
        const seen = new Set();
        const out = [];
        for (const p of parts) {
          const k = p.toLowerCase();
          if (seen.has(k)) continue;
          seen.add(k);
          out.push(p);
        }
        return out;
      } catch (e) {
        return [];
      }
    }

    function renderDriverPills(s, maxPills=3, inline=false) {
      const parts = splitDrivers(s);
      if (!parts.length) return '';
      const keep = parts.slice(0, Math.max(1, Number(maxPills) || 3));
      const cls = inline ? 'driver-pills inline' : 'driver-pills';
      return `<span class="${cls}">` + keep.map(p => `<span class="driver-pill">${escHtml(p)}</span>`).join('') + `</span>`;
    }

    function _normTeamToken(s) {
      return String(s || '').trim().replace(/\s+/g,' ').toLowerCase();
    }

    function _inferModelProbForRec(pred, rec) {
      try {
        const mkt = toUpper(rec.market);
        const sideRaw = String(rec.side || '');
        const side = _normTeamToken(sideRaw);
        const awayName = _normTeamToken(pred && pred.away);
        const homeName = _normTeamToken(pred && pred.home);

        const mlAway = (pred && pred.p_away_ml !== undefined && pred.p_away_ml !== null) ? Number(pred.p_away_ml) : null;
        const mlHome = (pred && pred.p_home_ml !== undefined && pred.p_home_ml !== null) ? Number(pred.p_home_ml) : null;
        const pOver = (pred && pred.p_over !== undefined && pred.p_over !== null) ? Number(pred.p_over) : null;
        const pUnder = (pred && pred.p_under !== undefined && pred.p_under !== null) ? Number(pred.p_under) : null;
        const pHomePl = (pred && pred['p_home_pl_-1.5'] !== undefined && pred['p_home_pl_-1.5'] !== null) ? Number(pred['p_home_pl_-1.5']) : null;
        const pAwayPl = (pred && pred['p_away_pl_+1.5'] !== undefined && pred['p_away_pl_+1.5'] !== null) ? Number(pred['p_away_pl_+1.5']) : null;

        if (mkt.includes('ML')) {
          if (awayName && side === awayName) return mlAway;
          if (homeName && side === homeName) return mlHome;
          return null;
        }
        if (mkt.includes('TOTAL')) {
          const s = toUpper(sideRaw);
          if (s.includes('OVER')) return pOver;
          if (s.includes('UNDER')) return pUnder;
          return null;
        }
        if (mkt.includes('PL') || mkt.includes('PUCK')) {
          // Side looks like "Team -1.5" or "Team +1.5".
          if (awayName && side.startsWith(awayName)) return pAwayPl;
          if (homeName && side.startsWith(homeName)) return pHomePl;
          return null;
        }
      } catch (e) {}
      return null;
    }

    function renderCard(pred, recsForGame, simForGame, propsAway=null, propsHome=null) {
      const match = keyForGame(pred);
      const state = String(pred.game_state || '').trim();
      const venue = String(pred.venue || '').trim();

      const awayLogo = pred.away_logo ? String(pred.away_logo) : '';
      const homeLogo = pred.home_logo ? String(pred.home_logo) : '';

      const projAway = pred.proj_away_goals;
      const projHome = pred.proj_home_goals;
      const modelTotal = pred.model_total;
      const modelSpread = pred.model_spread;

      const mlAway = pred.p_away_ml;
      const mlHome = pred.p_home_ml;

      const totalLine = pred.total_line_used;
      const pOver = pred.p_over;
      const pUnder = pred.p_under;

      const plLine = pred.pl_line_used;
      const pHomePl = pred['p_home_pl_-1.5'];
      const pAwayPl = pred['p_away_pl_+1.5'];

      // Pick a few best recs to show.
      // We want picks rooted in the model (confidence) first, then EV.
      const recs = (recsForGame || [])
        .map(normalizeRec)
        .filter(r => r.market && isFinite(r.ev));

      const bestByMarket = new Map();
      recs.forEach(r => {
        const m = toUpper(r.market);
        const pModel = _inferModelProbForRec(pred, r);
        const conf = (pModel !== null && pModel !== undefined && isFinite(Number(pModel))) ? Math.abs(Number(pModel) - 0.5) : -1;
        const cur = bestByMarket.get(m);
        if (!cur) {
          bestByMarket.set(m, { ...r, _pModel: pModel, _conf: conf });
          return;
        }
        const curConf = (cur && cur._conf !== undefined) ? Number(cur._conf) : -1;
        const curEv = (cur && cur.ev !== undefined) ? Number(cur.ev) : -Infinity;
        const evv = Number(r.ev);
        if (conf > curConf || (conf === curConf && evv > curEv)) {
          bestByMarket.set(m, { ...r, _pModel: pModel, _conf: conf });
        }
      });
      const preferredOrder = ['ML','TOTAL','PL'];
      const top = preferredOrder
        .map(m => bestByMarket.get(m))
        .filter(Boolean);

      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.gameKey = match;
      try {
        const pk = (pred && (pred.gamePk ?? pred.game_pk ?? pred.nhl_game_pk ?? pred.nhlGamePk ?? pred.game_id ?? pred.gameId));
        if (pk !== undefined && pk !== null && String(pk).trim() !== '') el.dataset.gamePk = String(pk).trim();
      } catch (e) {}
      try {
        const aab = predTeamAbbr(pred, 'away');
        const hab = predTeamAbbr(pred, 'home');
        if (aab) el.dataset.awayAbbr = aab;
        if (hab) el.dataset.homeAbbr = hab;
      } catch (e) {}

      const pills = [];
      if (state) pills.push(`<span class="pill">${state}</span>`);
      if (venue) pills.push(`<span class="pill">${venue}</span>`);

      el.innerHTML = `
        <div class="card-title">
          <span class="match">${match}</span>
          <span class="lens-card-tag" data-role="lens-card-tag"></span>
          <span class="pill active live-score" data-role="live-score"></span>
          <span class="pill active live-clock" data-role="live-clock"></span>
          <span class="pill active final-score" data-role="final-score"></span>
          ${pills.join('')}
        </div>

        <div class="row matchup">
          <div class="team side">
            <div class="team-line">
              <div class="lhs">${awayLogo ? `<img class="team-logo" src="${awayLogo}" alt="${pred.away || ''}" />` : ''}<div class="name">${pred.away || '—'}</div></div>
              <div class="team-pts-big" data-role="away-pts-big"></div>
            </div>
            <div class="score-block">
              <div class="sub">Proj goals: <strong>${fmt(projAway, 2)}</strong></div>
              <div class="sub">ML: <strong>${pct(mlAway)}</strong></div>
            </div>
          </div>
          <div class="vs">@</div>
          <div class="team side">
            <div class="team-line">
              <div class="lhs">${homeLogo ? `<img class="team-logo" src="${homeLogo}" alt="${pred.home || ''}" />` : ''}<div class="name">${pred.home || '—'}</div></div>
              <div class="team-pts-big" data-role="home-pts-big"></div>
            </div>
            <div class="score-block">
              <div class="sub">Proj goals: <strong>${fmt(projHome, 2)}</strong></div>
              <div class="sub">ML: <strong>${pct(mlHome)}</strong></div>
            </div>
          </div>
        </div>

        <div class="tile">
          <div class="markets-row">
            <div class="market">
              <div class="k">Moneyline</div>
              <div class="v">Away ${pct(mlAway)} · Home ${pct(mlHome)}</div>
            </div>
            <div class="market">
              <div class="k">Total</div>
              <div class="v">Line <strong>${fmt(totalLine, 1)}</strong> · O ${pct(pOver)} / U ${pct(pUnder)}</div>
              <div class="v">Model total: ${fmt(modelTotal, 2)}</div>
            </div>
            <div class="market">
              <div class="k">Puck line</div>
              <div class="v">Line <strong>${fmt(plLine, 1)}</strong> · H-1.5 ${pct(pHomePl)} / A+1.5 ${pct(pAwayPl)}</div>
              <div class="v">Model spread: ${fmt(modelSpread, 2)}</div>
            </div>
          </div>
          <div class="v live-ctx-top"></div>
        </div>

        <div class="bets">
          ${top.length ? top.map(r => {
            const cls = evClass(r.ev);
            const mkt = toUpper(r.market);
            const side = toUpper(r.side);
            const pModel = (r && r._pModel !== undefined) ? r._pModel : _inferModelProbForRec(pred, r);
            const drvPills = r.edgeReasons ? renderDriverPills(r.edgeReasons, 2, true) : '';
            let ln = (r.line !== null && r.line !== undefined && String(r.line).trim() !== '') ? String(r.line) : '';
            try {
              if (!ln && mkt.includes('TOTAL') && totalLine !== null && totalLine !== undefined && isFinite(Number(totalLine))) {
                ln = String(totalLine);
              }
            } catch (e) {}
            const lineAttr = ln ? ` data-line="${ln}"` : '';
            return `<span class="bet ${cls}" data-market="${mkt}" data-side="${side}"${lineAttr}><strong>${r.market}</strong> ${r.side}${drvPills} <span class="muted" data-role="rec-outcome"></span></span>`;
          }).join('') : `<span class="muted">No recommendations available for this game.</span>`}

        <div class="tile">
          <div class="markets-row">
            ${renderPropsEdgesHtml(`Props edges (${pred.away_abbr || 'Away'})`, propsAway)}

          </div>

        <div class="live-lens" style="display:none;">
          <div class="live-guidance-body"></div>
          <div class="live-odds-body"></div>
          <div class="live-lens-body"></div>
        </div>

        <div class="merged-block">
          <div class="merged-body"></div>
        </div>
      `;

      // Always show merged Sim vs Live tables (pregame shows sim-only with blank live columns).
      try {
        const merged = el.querySelector('.merged-body');
        if (merged) {
          if (Array.isArray(simForGame) && simForGame.length) {
            merged.innerHTML = renderMergedSimLive({ away: pred.away, home: pred.home, lens: { players: { away: [], home: [] }, goalies: { away: [], home: [] } } }, simForGame);
          } else {
            merged.innerHTML = `<div class="k">Sim vs Live</div><div class="v muted">No sim boxscores available yet.</div>`;
          }
        }
      } catch (e) {}

      return el;
    }

    function _findCardByGameKey(gameKey) {
      const k = normKey(gameKey);
      for (const el of document.querySelectorAll('.card[data-game-key]')) {
        if (normKey(el.dataset.gameKey) === k) return el;
      }
      return null;
    }

    function _setScoreboardStripLayout(strip, nItems) {
      if (!strip) return;
      const n = Math.max(0, Number(nItems || 0));
      if (!n) {
        try { strip.style.removeProperty('--sb-cols'); } catch (e) {}
        try { strip.style.removeProperty('--sb-rows'); } catch (e) {}
        return;
      }

      // Keep these in sync with the CSS above.
      const gapPx = 8;
      const baselineMinCardPx = 210;

      let rows = 1;
      let cols = n;
      try {
        const w = Number(strip.clientWidth || strip.getBoundingClientRect().width || 0);
        const maxColsOneRow = Math.max(1, Math.floor((w + gapPx) / (baselineMinCardPx + gapPx)));
        if (n > maxColsOneRow) {
          rows = 2;
          cols = Math.ceil(n / 2);
        }
      } catch (e) {
        rows = 2;
        cols = Math.ceil(n / 2);
      }

      try { strip.style.setProperty('--sb-cols', String(Math.max(1, cols))); } catch (e) {}
      try { strip.style.setProperty('--sb-rows', String(Math.max(1, rows))); } catch (e) {}
    }

    function buildScoreboardStrip(preds) {
      const strip = $('scoreboardStrip');
      if (!strip) return;
      strip.innerHTML = '';

      function _dispState(s) {
        try {
          return isFinalLikeState(s) ? 'Final' : String(s || '').trim();
        } catch (e) {
          return String(s || '').trim();
        }
      }

      function _fmtStartLocal(p) {
        try {
          const t = startTimeMs(p);
          if (!isFinite(Number(t))) return '';
          const d = new Date(Number(t));
          // Browser-local time. Include a short timezone name so users don't confuse ET/CT/etc.
          // (Some browsers may show a GMT offset instead of CST/CDT; that's still unambiguous.)
          const fmt = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
          return String(fmt.format(d));
        } catch (e) {
          return '';
        }
      }

      const frag = document.createDocumentFragment();
      for (const p of (preds || [])) {
        const k = keyForGame(p);
        // Compact strip should show full team names (not 2-3 letter abbreviations).
        const a = String(p && p.away || '').trim() || toUpper(p && p.away_abbr);
        const h = String(p && p.home || '').trim() || toUpper(p && p.home_abbr);
        const state = _dispState(p && p.game_state);
        const awayLogo = (p && p.away_logo) ? String(p.away_logo) : '';
        const homeLogo = (p && p.home_logo) ? String(p.home_logo) : '';
        const startLocal = _fmtStartLocal(p);
        const timeLine = (startLocal || state || '—');

        const aEl = document.createElement('a');
        aEl.href = '#';
        aEl.className = 's-item';
        aEl.dataset.gameKey = k;
        try { aEl.dataset.awayName = String(p && p.away || '').trim(); } catch (e) {}
        try { aEl.dataset.homeName = String(p && p.home || '').trim(); } catch (e) {}
        try { if (awayLogo) aEl.dataset.awayLogo = awayLogo; } catch (e) {}
        try { if (homeLogo) aEl.dataset.homeLogo = homeLogo; } catch (e) {}
        try {
          const pk = (p && (p.gamePk ?? p.game_pk ?? p.nhl_game_pk ?? p.nhlGamePk ?? p.game_id ?? p.gameId));
          if (pk !== undefined && pk !== null && String(pk).trim() !== '') aEl.dataset.gamePk = String(pk).trim();
        } catch (e) {}
        aEl.innerHTML = `
          <div class="s-time">${timeLine}</div>
          <div class="s-teamline">
            <div class="lhs">${awayLogo ? `<img class="team-logo" src="${awayLogo}" alt="${a || ''}" />` : ''}<div class="nm">${a || '—'}</div></div>
            <div class="pts" data-role="away-pts"></div>
          </div>
          <div class="s-teamline">
            <div class="lhs">${homeLogo ? `<img class="team-logo" src="${homeLogo}" alt="${h || ''}" />` : ''}<div class="nm">${h || '—'}</div></div>
            <div class="pts" data-role="home-pts"></div>
          </div>
          <div class="s-sig" data-role="sig-1"></div>
          <div class="s-sig" data-role="sig-2"></div>
          <div class="s-sig" data-role="sig-3"></div>
        `;
        aEl.addEventListener('click', (ev) => {
          ev.preventDefault();
          const card = _findCardByGameKey(k);
          if (card && card.scrollIntoView) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        frag.appendChild(aEl);
      }
      strip.appendChild(frag);
      try { _setScoreboardStripLayout(strip, (preds || []).length); } catch (e) {}
    }

    (function() {
      let raf = 0;
      window.addEventListener('resize', () => {
        try { if (raf) cancelAnimationFrame(raf); } catch (e) {}
        raf = requestAnimationFrame(() => {
          raf = 0;
          const strip = $('scoreboardStrip');
          if (!strip) return;
          const n = strip.querySelectorAll('.s-item').length;
          _setScoreboardStripLayout(strip, n);
        });
      });
    })();

    function _pickSignalForTag(signals) {
      if (!Array.isArray(signals) || !signals.length) return null;
      // Prefer game-scoped signals; fallback to top overall.
      const g = signals.find(s => String(s && s.scope || '').toLowerCase() === 'game');
      return g || signals[0];
    }

    function _isBetOrWatchSignal(s) {
      try {
        const a = String(s && s.action || '').toUpperCase();
        return a === 'BET' || a === 'WATCH';
      } catch (e) {
        return false;
      }
    }

    function _filterGameBetWatchSignals(signals) {
      const arr = Array.isArray(signals) ? signals : [];
      return arr.filter(s => {
        try {
          const scope = String(s && s.scope || '').toLowerCase();
          if (scope !== 'game') return false;
          return _isBetOrWatchSignal(s);
        } catch (e) {
          return false;
        }
      });
    }

    function _signalLineText(sig) {
      try {
        if (!sig) return '';
        const action = String(sig.action || '').toUpperCase();
        const label = String(sig.label || '').trim();
        if (!label) return '';

        function _prettyDriverTag(t) {
          try {
            const s = String(t || '').trim();
            if (!s) return '';
            if (s === 'pace:up') return 'pace ↑';
            if (s === 'pace:down') return 'pace ↓';
            if (s === 'goalie:weak') return 'goalie weak';
            if (s === 'goalie:strong') return 'goalie strong';
            if (s === 'manpower:pp_home') return 'PP home';
            if (s === 'manpower:pp_away') return 'PP away';
            if (s === 'score:tied') return 'score tied';
            if (s === 'score:home_leading') return 'home leading';
            if (s === 'score:away_leading') return 'away leading';
            if (s === 'empty_net:home') return 'home EN';
            if (s === 'empty_net:away') return 'away EN';
            return s.replace(/_/g, ' ');
          } catch (e) {
            return '';
          }
        }

        const bits = [];
        // Live-lens drivers (compact): human driver_tags only; avoid EV/edge/price/time.
        try {
          const tags = Array.isArray(sig.driver_tags) ? sig.driver_tags : [];
          const keep = tags
            .map(_prettyDriverTag)
            .filter(Boolean)
            .filter(x => {
              const s = String(x || '').toLowerCase();
              return !(s.startsWith('market:') || s.startsWith('edge:') || s.startsWith('gate:') || s.startsWith('prob_source:') || s.startsWith('guard:'));
            })
            .slice(0, 4);
          if (keep.length) bits.push(keep.join(' · '));
        } catch (e) {}
        // Stat-based context when present (e.g., PLAYER_SHOTS signals)
        try {
          const shots = Number(sig.shots);
          const toi = Number(sig.toi_min);
          if (isFinite(shots) && isFinite(toi)) bits.push(`${Math.round(shots)} shots · ${toi.toFixed(1)} TOI`);
        } catch (e) {}
        try {
          const need = Number(sig.need);
          if (isFinite(need)) bits.push(`need ${Math.round(need)}`);
        } catch (e) {}
        // If live odds are missing, keep the explicit note
        try {
          const note = String(sig.note || '').trim();
          if (note) bits.push(note);
        } catch (e) {}

        const reason = bits.filter(Boolean).join(' · ');
        const prefix = (action === 'BET') ? 'BET' : ((action === 'WATCH') ? 'WATCH' : action);
        return reason ? `${prefix} ${label} — ${reason}` : `${prefix} ${label}`;
      } catch (e) {
        return '';
      }
    }

    function _pickTopSignals(signals, maxN=3) {
      const arr = Array.isArray(signals) ? signals.slice() : [];
      function rank(s) {
        const a = String(s && s.action || '').toUpperCase();
        const scope = String(s && s.scope || '').toLowerCase();
        // Desired compact ordering:
        // 1) Game/period live BET signals
        // 2) Live prop BET signals
        // 3) Game/period WATCH signals
        // 4) Live prop WATCH signals
        let group = 9;
        if (a === 'BET' && scope === 'game') group = 0;
        else if (a === 'BET' && scope === 'prop') group = 1;
        else if (a === 'WATCH' && scope === 'game') group = 2;
        else if (a === 'WATCH' && scope === 'prop') group = 3;
        let edgeAbs = 0;
        try { const e = Number(s && s.edge); if (isFinite(e)) edgeAbs = Math.abs(e); } catch (e) {}
        let p = 0;
        try { const pm = Number(s && s.p_model); if (isFinite(pm)) p = pm; } catch (e) {}
        return [group, -edgeAbs, -p];
      }
      arr.sort((x, y) => {
        const rx = rank(x), ry = rank(y);
        for (let i = 0; i < Math.max(rx.length, ry.length); i++) {
          const dx = rx[i] ?? 0, dy = ry[i] ?? 0;
          if (dx < dy) return -1;
          if (dx > dy) return 1;
        }
        return 0;
      });
      return arr.slice(0, Math.max(0, maxN));
    }

    function _compactSignalText(sig) {
      try {
        if (!sig) return '';
        const action = String(sig.action || '').toUpperCase();
        const label = String(sig.label || '').trim();
        if (!label) return '';
        const prefix = (action === 'BET') ? 'BET' : ((action === 'WATCH') ? 'WATCH' : '');
        return prefix ? `${prefix} · ${label}` : '';
      } catch (e) {
        return '';
      }
    }

    function _signalClass(signals) {
      try {
        if (!Array.isArray(signals) || !signals.length) return '';
        const anyBet = signals.some(s => String(s && s.action || '').toUpperCase() === 'BET');
        if (anyBet) return 'bet';
        const anyWatch = signals.some(s => String(s && s.action || '').toUpperCase() === 'WATCH');
        if (anyWatch) return 'watch';
      } catch (e) {}
      return '';
    }

    function updateScoreboardStripFromLive(mapByKey, mapByPk) {
      const strip = $('scoreboardStrip');
      if (!strip) return;
      for (const item of strip.querySelectorAll('.s-item[data-game-key]')) {
        const k = normKey(item.dataset.gameKey);
        let g = null;
        try {
          const pk = String(item.dataset.gamePk || '').trim();
          if (pk && mapByPk && mapByPk.has(pk)) g = mapByPk.get(pk);
        } catch (e) {}

        try {
          const aPtsEl = item.querySelector('[data-role="away-pts"]');
          const hPtsEl = item.querySelector('[data-role="home-pts"]');
          const st = String(g && g.gameState ? g.gameState : '').trim();
          const up = String(st || '').toUpperCase();
          const sc = (g && g.score) ? g.score : null;
          const ag = sc && sc.away !== undefined && sc.away !== null ? sc.away : null;
          const hg = sc && sc.home !== undefined && sc.home !== null ? sc.home : null;
          const show = (ag !== null && hg !== null) && (isLiveState(st) || up.includes('FINAL') || up.includes('POST') || up.includes('END'));
          if (aPtsEl) aPtsEl.textContent = show ? String(ag) : '';
          if (hPtsEl) hPtsEl.textContent = show ? String(hg) : '';
        } catch (e) {}
        if (!g) g = (mapByKey && mapByKey.get) ? (mapByKey.get(k) || null) : null;

        item.classList.remove('live', 'bet', 'watch');
        if (!g) continue;

        try {
          if (isLiveState(g.gameState)) item.classList.add('live');
        } catch (e) {}

        try {
          const gameSigs = _filterGameBetWatchSignals(g.signals);
          const cls = _signalClass(gameSigs);
          if (cls) item.classList.add(cls);
          // Render up to 3 signal lines with reasons (line 4/5/6)
          const sigs = _pickTopSignals(gameSigs, 3);
          const sigEls = [
            item.querySelector('[data-role="sig-1"]'),
            item.querySelector('[data-role="sig-2"]'),
            item.querySelector('[data-role="sig-3"]'),
          ];
          for (let i = 0; i < sigEls.length; i++) {
            const el = sigEls[i];
            if (!el) continue;
            const s = sigs[i] || null;
            el.classList.remove('bet','watch');
            if (!s) { el.textContent = ''; continue; }
            const act = String(s.action || '').toUpperCase();
            if (act === 'BET') el.classList.add('bet');
            else if (act === 'WATCH') el.classList.add('watch');
            el.textContent = _signalLineText(s);
          }
        } catch (e) {}

        try {
          const stEl = item.querySelector('.s-time');
          const per = (g && g.period !== undefined && g.period !== null) ? g.period : null;
          const perDisp = (g && (g.period_disp !== undefined && g.period_disp !== null)) ? String(g.period_disp).trim() : '';
          const clk = g && g.clock ? String(g.clock) : '';
          const st = String(g && g.gameState ? g.gameState : '').trim();
          if (stEl) {
            if (isLiveState(st)) {
              stEl.textContent = formatLiveClockText(st, per, clk, perDisp);
            } else {
              // Preserve scheduled start time from initial render if present.
              const existing = String(stEl.textContent || '').trim();
              const next = (st || '').trim();
              if (!existing || existing === '—') stEl.textContent = (next || '—');
              else if (next && isFinalLikeState(next)) stEl.textContent = 'Final';
            }
          }
        } catch (e) {}
      }
    }

    function isLiveState(s) {
      const x = String(s || '').toUpperCase();
      return x.includes('LIVE') || x.includes('IN_PROGRESS') || x.includes('IN PROGRESS') || x.includes('IN-PROGRESS') || x.includes('CRIT');
    }

    function isFinalLikeState(s) {
      const x = String(s || '').toUpperCase();
      // NHL Web schedule commonly uses OFF for completed games.
      return x.includes('FINAL') || x.includes('POST') || x.includes('END') || (x === 'OFF');
    }

    function formatPeriodLabel(period, gameState) {
      try {
        const st = String(gameState || '').toUpperCase();
        const p = (period !== null && period !== undefined) ? Number(period) : NaN;
        if (!isFinite(p) || p <= 0) return '—';
        if (st.includes('SO')) return 'SO';
        if (p >= 4) return 'OT';
        if (p === 1) return '1st';
        if (p === 2) return '2nd';
        if (p === 3) return '3rd';
        return `P${p}`;
      } catch (e) {
        return '—';
      }
    }

    function formatLiveClockText(gameState, period, clock, periodDisp) {
      const lbl = String(periodDisp || '').trim() || formatPeriodLabel(period, gameState);
      const clk = String(clock || '').trim();
      if (!clk) return `${lbl}`.trim();
      return `${lbl} ${clk} left`.trim();
    }

    function renderLens(game) {
      const lens = (game && game.lens) ? game.lens : {};
      const score = (game && game.score) ? game.score : {};
      const per = game && game.period !== undefined ? game.period : null;
      const clock = game && game.clock ? String(game.clock) : '';

      const totals = (lens && lens.totals) ? lens.totals : null;
      const periods = (lens && lens.periods) ? lens.periods : null;
      const goalies = (lens && lens.goalies) ? lens.goalies : null;
      const players = (lens && lens.players) ? lens.players : null;

      const lines = [];
      const headline = `P${per || '—'} ${clock || ''} · Score ${score.away ?? '—'}-${score.home ?? '—'}`;
      lines.push(`<div class="v"><strong>${headline}</strong></div>`);

      // Live linescore (1P/2P/3P/Total)
      try {
        const awayAbbr = game && game.away ? String(game.away) : '';
        const homeAbbr = game && game.home ? String(game.home) : '';

        const byP = { 1: { a: null, h: null }, 2: { a: null, h: null }, 3: { a: null, h: null } };
        if (periods && Array.isArray(periods)) {
          for (const p of periods) {
            const pn = Number(p && p.period);
            if (![1,2,3].includes(pn)) continue;
            byP[pn] = {
              a: (p.away && p.away.goals !== undefined) ? p.away.goals : null,
              h: (p.home && p.home.goals !== undefined) ? p.home.goals : null,
            };
          }
        }
        const awayRow = {
          p1: byP[1].a,
          p2: byP[2].a,
          p3: byP[3].a,
          total: (totals && totals.away) ? totals.away.goals : null,
        };
        const homeRow = {
          p1: byP[1].h,
          p2: byP[2].h,
          p3: byP[3].h,
          total: (totals && totals.home) ? totals.home.goals : null,
        };
        lines.push(renderLinescoreHtml('Live line score', awayAbbr, homeAbbr, awayRow, homeRow, false));
      } catch (e) {
        // ignore
      }

      // Live player boxscore (skaters)
      try {
        const _shotVal = (r) => {
          const v = (r && (r.s ?? r.sog ?? r.shots ?? r.shots_on_goal));
          return (v === null || v === undefined) ? null : Number(v);
        };
        const renderLivePlayersTable = (title, arr) => {
          const rows = (arr || []).slice();
          rows.sort((a,b) => (Number(b.p)||0) - (Number(a.p)||0) || (Number(_shotVal(b))||0) - (Number(_shotVal(a))||0));
          const body = rows.slice(0, 18).map(r => {

            return `

                <td>${r.p ?? '—'}</td>
                <td>${shots ?? '—'}</td>

              </tr>
            `;
          }).join('');
          return `
            <div class="section-title">${title}</div>
