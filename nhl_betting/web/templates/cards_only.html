        <input id="datePicker" class="date-input" type="date" value="{{ initial_date }}" />
        <button type="button" class="cards-date-button" id="cardsDateLoadButton">Load</button>
        <a class="cards-nav-pill" id="cardsNextDateLink" href="/?date={{ initial_date | urlencode }}" rel="next">Next</a>
        <a id="accuracyLink" class="cards-nav-pill" href="/live_lens_accuracy?date={{ initial_date | urlencode }}">Live Lens Accuracy</a>
        <a id="skaterLaddersLink" class="cards-nav-pill" href="/skater-ladders?date={{ initial_date | urlencode }}">Skater Ladders</a>
        <a id="goalieLaddersLink" class="cards-nav-pill" href="/goalie-ladders?date={{ initial_date | urlencode }}">Goalie Ladders</a>
      </div>
      <div class="cards-toolbar-rail">
        <div id="cardsSourceMeta" class="cards-source-meta"></div>
        <div id="cardsFilters" class="cards-filters" aria-label="Slate filters"></div>
        <div class="muted" id="status">Loading…</div>
      </div>
    </section>
    <main>
      <section id="scoreboardStrip" class="scoreboard-strip cards-scoreboard" aria-label="Games"></section>
      <div class="cards-section-heading cards-section-heading--compact">
        <div>
          <div class="cards-section-kicker">Player props pulse</div>
          <h2>Top moving edges</h2>
        </div>
        <div id="propsStripLabel" class="muted props-strip-label"></div>
      </div>
      <div id="propsStrip" class="props-strip"></div>
      <section id="cards" class="cards cards-grid" aria-live="polite"></section>
      <div id="empty" class="empty muted"></div>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    const LIVE_POLL_MS = 30000;
    const PROPS_POLL_MS = 60000;
    let currentDate = null;
    let livePollTimer = null;
    let livePollInFlight = false;
    let propsPollTimer = null;
    let propsPollInFlight = false;
    let lastPropsStripSignature = '';
    let activeSlateFilter = 'all';
    let currentSlateCards = [];
    let currentSlateInfoByKey = new Map();
    let currentSlateNSims = null;
    const propCardState = new Map();

    const DEFAULT_PAGE_TITLE = 'NHL Game Cards';

    function setCompactMode(on) {
      try {
        document.documentElement.classList.toggle('compact-card', !!on);
      } catch (e) {}
      // Compact mode affects sizing; recompute the scoreboard layout.
      try {
        const strip = $('scoreboardStrip');
        if (strip) _setScoreboardStripLayout(strip, strip.querySelectorAll('.s-item').length);
      } catch (e) {}
    }

    // Pregame props display cap (American odds). Keeps the UI focused on bettable ranges.
    // Hard cap by default: only show props with -125 <= price <= +125.
    const PROPS_AMERICAN_PRICE_MIN = -125;
    const PROPS_AMERICAN_PRICE_MAX = 125;
    // Small EV floor to avoid thin/noisy picks dominating the list.
    const PROPS_EV_MIN = 0.02;

    function setDateScopedHref(elementId, base, d) {
      const node = $(elementId);
      if (!node) return;
      if (!d) {
        node.setAttribute('href', base);
        return;
      }
      const u = new URL(base, window.location.origin);
      u.searchParams.set('date', d);
      node.setAttribute('href', u.pathname + u.search);
    }

    function setPrimaryNavHrefs(d) {
      setDateScopedHref('accuracyLink', '/live_lens_accuracy', d);
      setDateScopedHref('skaterLaddersLink', '/skater-ladders', d);
      setDateScopedHref('goalieLaddersLink', '/goalie-ladders', d);
      try {
        const baseDate = String(d || '').trim();
        if (!baseDate) return;
        const prev = new Date(`${baseDate}T00:00:00Z`);
        const next = new Date(`${baseDate}T00:00:00Z`);
        if (!Number.isNaN(prev.getTime()) && !Number.isNaN(next.getTime())) {
          prev.setUTCDate(prev.getUTCDate() - 1);
          next.setUTCDate(next.getUTCDate() + 1);
          setDateScopedHref('cardsPrevDateLink', '/', prev.toISOString().slice(0, 10));
          setDateScopedHref('cardsNextDateLink', '/', next.toISOString().slice(0, 10));
        }
      } catch (e) {}
    }

    function pct(x) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return (100 * Number(x)).toFixed(1) + '%';
    }

    function fmt(x, nd=2) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return Number(x).toFixed(nd);
    }

    function fmtInt(x) {
      if (x === null || x === undefined || isNaN(Number(x))) return '—';
      return String(Math.round(Number(x)));
    }

    function parseSortValue(txt, type) {
      const s = String(txt || '').trim();
      if (!s || s === '—') return null;
      if (type === 'num') {
        const n = Number(s);
        return isFinite(n) ? n : null;
      }
      if (type === 'pct') {
        const n = Number(s.replace('%',''));
        return isFinite(n) ? n : null;
      }
      if (type === 'toi') {
        // Accept mm:ss or hh:mm:ss
        const parts = s.split(':').map(x => Number(x));
        if (parts.some(x => !isFinite(x))) return null;
        if (parts.length === 2) return parts[0] * 60 + parts[1];
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return null;
      }
      return s.toLowerCase();
    }

    function sortBoxscoreTableByHeader(th) {
      const table = th.closest('table');
      if (!table) return;
      if (!table.classList.contains('boxscore')) return;

      const tr = th.parentElement;
      if (!tr) return;
      const headers = Array.from(tr.children || []);
      const idx = headers.indexOf(th);
      if (idx < 0) return;

      const type = String(th.dataset.sortType || 'text');
      const existing = th.dataset.sortDir || '';
      let dir;
      if (!existing) {
        dir = (type === 'text') ? 'asc' : 'desc';
      } else {
        dir = existing === 'asc' ? 'desc' : 'asc';
      }

      table.querySelectorAll('th.sortable').forEach(x => {
        if (x !== th) delete x.dataset.sortDir;
      });
      th.dataset.sortDir = dir;

      const tbody = table.tBodies && table.tBodies[0];
      if (!tbody) return;
      const rows = Array.from(tbody.rows || []).map((r, i) => ({ r, i }));
      const mult = (dir === 'asc') ? 1 : -1;

      rows.sort((a, b) => {
        const ta = a.r.cells[idx] ? a.r.cells[idx].textContent : '';
        const tb = b.r.cells[idx] ? b.r.cells[idx].textContent : '';
        const va = parseSortValue(ta, type);
        const vb = parseSortValue(tb, type);

        const aNull = (va === null || va === undefined);
        const bNull = (vb === null || vb === undefined);
        if (aNull && bNull) return a.i - b.i;
        if (aNull) return 1;
        if (bNull) return -1;

        if (typeof va === 'number' && typeof vb === 'number') {
          const d = (va - vb);
          if (d !== 0) return mult * d;
          return a.i - b.i;
        }
        const sa = String(va);
        const sb = String(vb);
        if (sa < sb) return -1 * mult;
        if (sa > sb) return 1 * mult;
        return a.i - b.i;
      });

      for (const x of rows) tbody.appendChild(x.r);
    }

    document.addEventListener('click', (ev) => {
      const th = ev.target && ev.target.closest ? ev.target.closest('th.sortable') : null;
      if (!th) return;
      sortBoxscoreTableByHeader(th);
    });

    function toUpper(s) {
      return String(s || '').toUpperCase();
    }

    function inferTeamAbbrFromLogoUrl(url) {
      const s = String(url || '').trim();
      if (!s) return '';
      // Common NHL logo pattern: .../svg/NYR_dark.svg or .../svg/NYR.svg
      const m = s.match(/\/([A-Za-z]{2,4})(?:_[^\/]+)?\.(?:svg|png|jpg|jpeg)(?:\?|#|$)/);
      if (!m) return '';
      const ab = toUpper(m[1]);
      return /^[A-Z]{2,4}$/.test(ab) ? ab : '';
    }

    function predTeamAbbr(pred, side) {
      try {
        const direct = toUpper(pred && pred[side + '_abbr']);
        if (direct) return direct;
        const fromLogo = inferTeamAbbrFromLogoUrl(pred && pred[side + '_logo']);
        if (fromLogo) return fromLogo;
        const maybe = toUpper(pred && pred[side]);
        if (maybe && /^[A-Z]{2,4}$/.test(maybe)) return maybe;
      } catch (e) {}
      return '';
    }

    function keyForSimRow(r) {
      const away = String(r.game_away || '').trim();
      const home = String(r.game_home || '').trim();
      return away + ' @ ' + home;
    }

    function sumSim(rows, teamAbbr, period, col) {
      const t = toUpper(teamAbbr);
      let s = 0;
      let any = false;
      for (const r of (rows || [])) {
        if (!r) continue;
        if (toUpper(r.team) !== t) continue;
        if (Number(r.period) !== Number(period)) continue;
        const v = Number(r[col]);
        if (!isFinite(v)) continue;
        s += v;
        any = true;
      }
      return any ? s : null;
    }

    function renderLinescoreHtml(title, awayAbbr, homeAbbr, awayRow, homeRow, isSim=false) {
      const f = isSim ? (x) => fmt(x, 1) : (x) => fmtInt(x);
      const a = awayRow || {};
      const h = homeRow || {};
      return `
        <div class="section-title">${title}</div>
        <table class="linescore">
          <thead>
            <tr><th></th><th>1P</th><th>2P</th><th>3P</th><th>Total</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="team">${awayAbbr || '—'}</td>
              <td>${f(a.p1)}</td>
              <td>${f(a.p2)}</td>
              <td>${f(a.p3)}</td>
              <td class="total">${f(a.total)}</td>
            </tr>
            <tr>
              <td class="team">${homeAbbr || '—'}</td>
              <td>${f(h.p1)}</td>
              <td>${f(h.p2)}</td>
              <td>${f(h.p3)}</td>
              <td class="total">${f(h.total)}</td>
            </tr>
          </tbody>
        </table>
      `;
    }

    function renderSimSkatersTableHtml(title, simRows, teamAbbr) {
      const t = toUpper(teamAbbr);
      const rows = (simRows || [])
        .filter(r => r && Number(r.period) === 0)
        .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
        .filter(r => toUpper(r.team) === t)
        .filter(r => String(r.player || '').trim() && toUpper(r.player) !== 'TEAM')
        .filter(r => {
          const saves = Number(r.saves);
          return !(isFinite(saves) && saves > 0);
        })
        .map(r => ({
          player: r.player,
          pos: r.pos || r.position || r.player_position || r.playerPosition || r.player_pos,
          goals: Number(r.goals),
          assists: Number(r.assists),
          points: Number(r.points),
          shots: Number(r.shots),
          blocks: Number(r.blocks),
          toi_sec: Number(r.toi_sec),
        }));

      rows.sort((a,b) => (b.points - a.points) || (b.shots - a.shots) || (b.toi_sec - a.toi_sec));

      const body = rows.slice(0, 18).map(r => {
        const toi = isFinite(r.toi_sec) ? `${Math.floor(r.toi_sec/60)}:${String(Math.floor(r.toi_sec%60)).padStart(2,'0')}` : '—';
        return `
          <tr>
            <td class="player">${r.player || '—'}</td>
            <td>${r.pos ? String(r.pos) : '—'}</td>
            <td>${fmt(r.goals, 2)}</td>
            <td>${fmt(r.assists, 2)}</td>
            <td>${fmt(r.points, 2)}</td>
            <td>${fmt(r.shots, 2)}</td>
            <td>${fmt(r.blocks, 2)}</td>
            <td>${toi}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="section-title">${title}</div>
        <table class="boxscore">
          <thead><tr>
            <th class="sortable" data-sort-type="text">Player</th>
            <th class="sortable" data-sort-type="text">Pos</th>
            <th class="sortable" data-sort-type="num">G</th>
            <th class="sortable" data-sort-type="num">A</th>
            <th class="sortable" data-sort-type="num">P</th>
            <th class="sortable" data-sort-type="num">S</th>
            <th class="sortable" data-sort-type="num">BLK</th>
            <th class="sortable" data-sort-type="toi">TOI</th>
          </tr></thead>
          <tbody>${body || ''}</tbody>
        </table>
      `;
    }

    function renderSimGoaliesTableHtml(title, simRows, teamAbbr) {
      const t = toUpper(teamAbbr);
      const goalies = (simRows || [])
        .filter(r => r && Number(r.period) === 0)
        .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
        .filter(r => toUpper(r.team) === t)
        .filter(r => String(r.player || '').trim() && toUpper(r.player) !== 'TEAM')
        .filter(r => {
          const saves = Number(r.saves);
          return isFinite(saves) && saves > 0;
        })
        .map(r => ({
          player: r.player,
          pos: r.pos || r.position || r.player_position || r.playerPosition || r.player_pos,
          saves: Number(r.saves),
          toi_sec: Number(r.toi_sec),
        }));

      goalies.sort((a,b) => (b.saves - a.saves) || (b.toi_sec - a.toi_sec));

      const body = goalies.slice(0, 4).map(r => {
        const toi = isFinite(r.toi_sec) ? `${Math.floor(r.toi_sec/60)}:${String(Math.floor(r.toi_sec%60)).padStart(2,'0')}` : '—';
        return `
          <tr>
            <td class="player">${r.player || '—'}</td>
            <td>${r.pos ? String(r.pos) : '—'}</td>
            <td>${fmt(r.saves, 2)}</td>
            <td>${toi}</td>
          </tr>
        `;
      }).join('');

      return `
        <div class="section-title">${title}</div>
        <table class="boxscore">
          <thead><tr>
            <th class="sortable" data-sort-type="text">Goalie</th>
            <th class="sortable" data-sort-type="text">Pos</th>
            <th class="sortable" data-sort-type="num">SV</th>
            <th class="sortable" data-sort-type="toi">TOI</th>
          </tr></thead>
          <tbody>${body || ''}</tbody>
        </table>
      `;
    }

    function renderSimBoxscoresOnly(pred, simRows) {
      const rows = Array.isArray(simRows) ? simRows : [];
      if (!rows.length) {
        return `<div class="k">Projected box scores</div><div class="v muted">No sim boxscores available yet.</div>`;
      }

      const awayLabel = predTeamAbbr(pred, 'away') || String((pred && pred.away) || 'Away').trim() || 'Away';
      const homeLabel = predTeamAbbr(pred, 'home') || String((pred && pred.home) || 'Home').trim() || 'Home';
      const awayKey = String((pred && pred.away) || awayLabel).trim() || awayLabel;
      const homeKey = String((pred && pred.home) || homeLabel).trim() || homeLabel;

      const teamTotal = (teamKey, col) => {
        const p0 = sumSim(rows, teamKey, 0, col);
        if (p0 !== null && p0 !== undefined) return p0;
        let total = 0;
        let any = false;
        for (const per of [1, 2, 3, 4]) {
          const v = sumSim(rows, teamKey, per, col);
          if (v !== null && v !== undefined) {
            total += Number(v);
            any = true;
          }
        }
        return any ? total : null;
      };

      const awayLine = {
        p1: sumSim(rows, awayKey, 1, 'goals'),
        p2: sumSim(rows, awayKey, 2, 'goals'),
        p3: sumSim(rows, awayKey, 3, 'goals'),
        total: teamTotal(awayKey, 'goals'),
      };
      const homeLine = {
        p1: sumSim(rows, homeKey, 1, 'goals'),
        p2: sumSim(rows, homeKey, 2, 'goals'),
        p3: sumSim(rows, homeKey, 3, 'goals'),
        total: teamTotal(homeKey, 'goals'),
      };

      const out = [];
      out.push(`<div class="k">Projected box scores</div>`);
      out.push(renderLinescoreHtml('Sim line score', awayLabel, homeLabel, awayLine, homeLine, true));
      out.push(renderSimSkatersTableHtml(`Skaters (${awayLabel})`, rows, awayKey));
      out.push(renderSimSkatersTableHtml(`Skaters (${homeLabel})`, rows, homeKey));
      out.push(renderSimGoaliesTableHtml(`Goalies (${awayLabel})`, rows, awayKey));
      out.push(renderSimGoaliesTableHtml(`Goalies (${homeLabel})`, rows, homeKey));
      return out.join('');
    }

    function evClass(ev) {
      const v = Number(ev);
      if (!isFinite(v)) return '';
      return v >= 0 ? 'pos' : 'neg';
    }

    function keyForGame(r) {
      const away = String(r.away || '').trim();
      const home = String(r.home || '').trim();
      return away + ' @ ' + home;
    }

    function startTimeMs(p) {
      try {
        const cand = [
          'commence_time_utc','commence_time','start_time_utc','start_time','start_time_et',
          'game_time_utc','game_time_et','scheduled_start_utc','scheduled_utc','scheduled','scheduled_start'
        ];
        for (const k of cand) {
          const v = p ? p[k] : null;
          if (!v) continue;
          const t = Date.parse(String(v));
          if (isFinite(t)) return t;
        }
      } catch (e) {}
      return null;
    }

    function sortPredsByStart(preds) {
      const arr = (preds || []).slice();
      arr.sort((a, b) => {
        const ta = startTimeMs(a);
        const tb = startTimeMs(b);
        const aNull = (ta === null || ta === undefined);
        const bNull = (tb === null || tb === undefined);
        if (aNull && bNull) return keyForGame(a).localeCompare(keyForGame(b));
        if (aNull) return 1;
        if (bNull) return -1;
        if (ta !== tb) return ta - tb;
        return keyForGame(a).localeCompare(keyForGame(b));
      });
      return arr;
    }

    function getSelectedGameKeyFromUrl() {
      try {
        const p = new URLSearchParams(window.location.search || '');
        const g = String(p.get('game') || '').trim();
        if (!g) return null;
        // Accept AWY@HOME or "AWY @ HOME"
        return g.replace(/\s+/g,' ').replace('@', ' @ ').replace(/\s+@\s+/, ' @ ').trim();
      } catch (e) {
        return null;
      }
    }

    function getRequestedDate() {
      try {
        const p = new URLSearchParams(window.location.search || '');
        const d = (p.get('date') || '').trim();
        return d || null;
      } catch (e) {
        return null;
      }
    }

    function setRequestedDateInUrl(date) {
      try {
        const u = new URL(window.location.href);
        if (date) u.searchParams.set('date', date);
        else u.searchParams.delete('date');
        window.history.replaceState({}, '', u.toString());
      } catch (e) {}
    }

    function normalizePropRec(rec) {
      try {
        const side = toUpper(rec && rec.side);
        const price = (rec && rec.price !== undefined && rec.price !== null) ? rec.price
          : (side === 'OVER' ? (rec && rec.over_price) : (rec && rec.under_price));
        const priceNum = (price !== null && price !== undefined && String(price).trim() !== '') ? Number(price) : NaN;
        const prob = (rec && rec.prob !== undefined && rec.prob !== null) ? Number(rec.prob)
          : ((rec && rec.p_over !== undefined && rec.p_over !== null) ? Number(rec.p_over) : NaN);
        return {
          team: toUpper(rec && rec.team),
          opp: toUpper(rec && rec.opp),
          player: String((rec && rec.player) ? rec.player : '').trim(),
          market: toUpper(rec && rec.market),
          side,
          line: (rec && rec.line !== undefined) ? rec.line : null,
          price,
          priceNum,
          ev: Number((rec && rec.ev !== undefined) ? rec.ev : NaN),
          edgeScore: Number((rec && rec.edge_score !== undefined) ? rec.edge_score : NaN),
          edgeReasons: String((rec && (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason)) ? (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason) : '').trim(),
          prob,
          book: String((rec && rec.book) ? rec.book : '').trim(),
          playerId: (rec && (rec.player_id ?? rec.playerId ?? rec.id)) ?? null,
          headshotUrl: String((rec && (rec.headshot_url || rec.headshotUrl)) ? (rec.headshot_url || rec.headshotUrl) : '').trim(),
          teamLogo: String((rec && (rec.team_logo || rec.teamLogo)) ? (rec.team_logo || rec.teamLogo) : '').trim(),
        };
      } catch (e) {
        return { team:'', opp:'', player:'', market:'', side:'', line:null, price:null, priceNum:NaN, ev:NaN, edgeScore:NaN, edgeReasons:'', prob:NaN, book:'', playerId:null, headshotUrl:'', teamLogo:'' };
      }
    }

    function americanToDecimal(x) {
      const v = Number(x);
      if (!isFinite(v) || v === 0) return NaN;
      return (v > 0) ? (1 + v / 100.0) : (1 + 100.0 / Math.abs(v));
    }

    function propRowKey(row) {
      const ln = (row && row.line !== undefined && row.line !== null && String(row.line).trim() !== '') ? String(row.line).trim() : '';
      return [normKey(row && row.player), toUpper(row && row.team), toUpper(row && row.market), toUpper(row && row.side), ln].join('|');
    }

    function propSelectionKey(row) {
      const side = String((row && row.side) || '').trim().toLowerCase();
      if (side === 'over' || side === 'under') return side;
      return 'all';
    }

    function propMarketInfo(market) {
      const key = toUpper(market);
      if (key === 'SOG') return { key: 'sog', label: 'Shots on goal', statKey: 'shots', isGoalie: false };
      if (key === 'GOALS') return { key: 'goals', label: 'Goals', statKey: 'goals', isGoalie: false };
      if (key === 'ASSISTS') return { key: 'assists', label: 'Assists', statKey: 'assists', isGoalie: false };
      if (key === 'POINTS') return { key: 'points', label: 'Points', statKey: 'points', isGoalie: false };
      if (key === 'BLOCKS') return { key: 'blocks', label: 'Blocked shots', statKey: 'blocks', isGoalie: false };
      if (key === 'SAVES') return { key: 'saves', label: 'Saves', statKey: 'saves', isGoalie: true };
      return { key: normKey(market) || 'prop', label: String(market || 'Prop'), statKey: 'shots', isGoalie: false };
    }

    function propTypeInfo(row) {
      return propMarketInfo(row && row.market);
    }

    function propTierLabel(row) {
      const ev = Number(row && row.ev);
      const edge = Number(row && row.edgeScore);
      const best = Math.max(isFinite(ev) ? ev : -Infinity, isFinite(edge) ? edge : -Infinity);
      if (!isFinite(best)) return 'Lean';
      if (best >= 0.08) return 'A tier';
      if (best >= 0.05) return 'B tier';
      if (best >= 0.03) return 'C tier';
      return 'Lean';
    }

    function formatPropEdge(row) {
      const bits = [];
      const ev = Number(row && row.ev);
      const edge = Number(row && row.edgeScore);
      const prob = Number(row && row.prob);
      if (isFinite(edge)) bits.push(`Edge ${(100 * edge).toFixed(1)}%`);
      if (isFinite(ev)) bits.push(`EV ${(100 * ev).toFixed(1)}%`);
      if (isFinite(prob)) bits.push(`Model ${(100 * prob).toFixed(1)}%`);
      return bits.join(' | ') || 'No edge detail';
    }

    function buildCardPropRows(propsRows) {
      const raw = (propsRows || []).map(normalizePropRec)
        .filter(r => r && r.player && r.market && r.side && (isFinite(r.edgeScore) || isFinite(r.ev)))
        .filter(r => {
          const ev = Number(r.ev);
          return !isFinite(ev) || ev >= PROPS_EV_MIN;
        })
        .filter(r => {
          const p = Number(r.priceNum);
          return isFinite(p) && p >= PROPS_AMERICAN_PRICE_MIN && p <= PROPS_AMERICAN_PRICE_MAX;
        });

      const best = new Map();
      for (const row of raw) {
        const key = propRowKey(row);
        const cur = best.get(key);
        if (!cur) {
          best.set(key, row);
          continue;
        }
        const decNew = americanToDecimal(row.price);
        const decCur = americanToDecimal(cur.price);
        if (isFinite(decNew) && (!isFinite(decCur) || decNew > decCur)) {
          best.set(key, row);
          continue;
        }
        if (Number(row.edgeScore) > Number(cur.edgeScore)) {
          best.set(key, row);
          continue;
        }
        if (Number(row.edgeScore) === Number(cur.edgeScore) && Number(row.ev) > Number(cur.ev)) {
          best.set(key, row);
        }
      }

      return Array.from(best.values()).sort((a, b) => {
        const evDelta = (isFinite(Number(b.ev)) ? Number(b.ev) : -1e9) - (isFinite(Number(a.ev)) ? Number(a.ev) : -1e9);
        if (evDelta) return evDelta;
        const edgeDelta = (isFinite(Number(b.edgeScore)) ? Number(b.edgeScore) : -1e9) - (isFinite(Number(a.edgeScore)) ? Number(a.edgeScore) : -1e9);
        if (edgeDelta) return edgeDelta;
        return String(a.player || '').localeCompare(String(b.player || ''));
      });
    }

    function ensurePropCardState(gameKey, rows) {
      const key = String(gameKey || '').trim();
      const normalized = Array.isArray(rows) ? rows : [];
      if (!propCardState.has(key)) {
        const first = normalized[0] || null;
        propCardState.set(key, {
          rows: normalized,
          selectedPropKey: first ? propRowKey(first) : null,
          propFilters: { side: 'all', type: 'all' },
        });
      }
      const detail = propCardState.get(key);
      detail.rows = normalized;
      if (detail.selectedPropKey && !normalized.some((row) => propRowKey(row) === detail.selectedPropKey)) {
        detail.selectedPropKey = normalized[0] ? propRowKey(normalized[0]) : null;
      }
      return detail;
    }

    function filteredPropRows(rows, filters) {
      const safeRows = Array.isArray(rows) ? rows : [];
      const safeFilters = filters || { side: 'all', type: 'all' };
      return safeRows.filter((row) => {
        const matchesSide = safeFilters.side === 'all' || propSelectionKey(row) === safeFilters.side;
        const matchesType = safeFilters.type === 'all' || propTypeInfo(row).key === safeFilters.type;
        return matchesSide && matchesType;
      });
    }

    function propSideCounts(rows) {
      const safeRows = Array.isArray(rows) ? rows : [];
      return {
        all: safeRows.length,
        over: safeRows.filter((row) => propSelectionKey(row) === 'over').length,
        under: safeRows.filter((row) => propSelectionKey(row) === 'under').length,
      };
    }

    function propTypeCounts(rows) {
      const out = new Map();
      for (const row of (rows || [])) {
        const info = propTypeInfo(row);
        out.set(info.key, (out.get(info.key) || 0) + 1);
      }
      return out;
    }

    function propTypeOptions(rows) {
      const counts = propTypeCounts(rows);
      const options = [];
      for (const [key, count] of counts.entries()) {
        const sample = (rows || []).find((row) => propTypeInfo(row).key === key);
        const info = propTypeInfo(sample);
        options.push({ key, label: info.label, count });
      }
      options.sort((a, b) => b.count - a.count || a.label.localeCompare(b.label));
      return options;
    }

    function propFilterPillMarkup(config) {
      return `
        <button
          type="button"
          class="cards-prop-filter-pill ${config.active ? 'is-active' : ''}"
          data-prop-filter-kind="${escHtml(config.kind)}"
          data-prop-filter-value="${escHtml(config.value)}"
          ${config.disabled ? 'disabled' : ''}
        >${escHtml(config.label)}${config.count !== undefined ? ` ${escHtml(String(config.count))}` : ''}</button>`;
    }

    function renderPropFilterControls(rows, detail) {
      const filters = detail?.propFilters || { side: 'all', type: 'all' };
      const sideBaseRows = (rows || []).filter((row) => filters.type === 'all' || propTypeInfo(row).key === filters.type);
      const typeBaseRows = (rows || []).filter((row) => filters.side === 'all' || propSelectionKey(row) === filters.side);
      const sideCounts = propSideCounts(sideBaseRows);
      const typeCounts = propTypeCounts(typeBaseRows);
      const typeOptions = propTypeOptions(rows || []);

      return `
        <div class="cards-prop-filter-group">
          <div class="cards-section-label">Side</div>
          <div class="cards-prop-filter-pills">
            ${[
              { kind: 'side', value: 'all', label: 'All', count: sideCounts.all, active: filters.side === 'all', disabled: sideCounts.all === 0 && filters.side !== 'all' },
              { kind: 'side', value: 'over', label: 'Over', count: sideCounts.over, active: filters.side === 'over', disabled: sideCounts.over === 0 && filters.side !== 'over' },
              { kind: 'side', value: 'under', label: 'Under', count: sideCounts.under, active: filters.side === 'under', disabled: sideCounts.under === 0 && filters.side !== 'under' },
            ].map(propFilterPillMarkup).join('')}
          </div>
        </div>
        <div class="cards-prop-filter-group">
          <div class="cards-section-label">Type</div>
          <div class="cards-prop-filter-pills">
            ${propFilterPillMarkup({ kind: 'type', value: 'all', label: 'All', count: (rows || []).length, active: filters.type === 'all', disabled: !(rows || []).length && filters.type !== 'all' })}
            ${typeOptions.map((option) => propFilterPillMarkup({ kind: 'type', value: option.key, label: option.label, count: typeCounts.get(option.key) || 0, active: filters.type === option.key, disabled: (typeCounts.get(option.key) || 0) === 0 && filters.type !== option.key })).join('')}
          </div>
        </div>`;
    }

    function propButtonMarkup(rows, selectedKey) {
      return (rows || []).map((row) => {
        const key = propRowKey(row);
        const info = propTypeInfo(row);
        const lineLabel = (row.line !== null && row.line !== undefined && String(row.line).trim() !== '') ? fmt(row.line, 1) : '—';
        const priceLabel = (row.price !== null && row.price !== undefined && String(row.price).trim() !== '') ? fmtAmerican(row.price) : '—';
        return `
          <button type="button" class="cards-prop-button ${selectedKey === key ? 'is-selected' : ''}" data-prop-key="${escHtml(key)}">
            <strong>${escHtml(row.player || 'Player')}</strong>
            <span>${escHtml(info.label)} ${escHtml(String(row.side || '').toUpperCase())} ${escHtml(lineLabel)}</span>
            <span class="cards-subcopy">${escHtml(formatPropEdge(row))} · ${escHtml(priceLabel)}</span>
          </button>`;
      }).join('');
    }

    function propSideForGame(pred, row) {
      const team = toUpper(row && row.team);
      const away = predTeamAbbr(pred, 'away');
      const home = predTeamAbbr(pred, 'home');
      if (team && away && team === away) return 'away';
      if (team && home && team === home) return 'home';
      return 'all';
    }

    function lookupPropRowInSet(rows, row) {
      const targetId = getPlayerId(row);
      const targetFull = normName(row && row.player);
      const targetKey = nameKey(row && row.player);
      for (const entry of (rows || [])) {
        const entryId = getPlayerId(entry);
        if (targetId !== null && entryId !== null && targetId === entryId) return entry;
        if (targetFull && normName(entry && entry.name) === targetFull) return entry;
        if (targetKey && nameKey(entry && entry.name) === targetKey) return entry;
      }
      return null;
    }

    function lookupPropSimRow(rows, row, teamAbbr) {
      const targetId = getPlayerId(row);
      const targetFull = normName(row && row.player);
      const targetKey = nameKey(row && row.player);
      const team = toUpper(teamAbbr || row?.team);
      for (const entry of (rows || [])) {
        if (team && toUpper(entry && entry.team) !== team) continue;
        const entryId = getPlayerId(entry);
        if (targetId !== null && entryId !== null && targetId === entryId) return entry;
        if (targetFull && normName(entry && entry.player) === targetFull) return entry;
        if (targetKey && nameKey(entry && entry.player) === targetKey) return entry;
      }
      return null;
    }

    function statFromRow(row, market) {
      if (!row) return null;
      const info = propMarketInfo(market);
      if (info.statKey === 'points') {
        const p = Number(row.points ?? row.p);
        if (isFinite(p)) return p;
        const g = Number(row.goals ?? row.g);
        const a = Number(row.assists ?? row.a);
        if (isFinite(g) || isFinite(a)) return (isFinite(g) ? g : 0) + (isFinite(a) ? a : 0);
        return null;
      }
      if (info.statKey === 'shots') {
        const v = Number(row.shots ?? row.s ?? row.sog ?? row.shots_on_goal);
        return isFinite(v) ? v : null;
      }
      if (info.statKey === 'blocks') {
        const v = Number(row.blocks ?? row.blk ?? row.blocked);
        return isFinite(v) ? v : null;
      }
      if (info.statKey === 'goals') {
        const v = Number(row.goals ?? row.g);
        return isFinite(v) ? v : null;
      }
      if (info.statKey === 'assists') {
        const v = Number(row.assists ?? row.a);
        return isFinite(v) ? v : null;
      }
      if (info.statKey === 'saves') {
        const v = Number(row.saves ?? row.sv);
        return isFinite(v) ? v : null;
      }
      return null;
    }

    function formatToiValue(row) {
      if (!row) return '—';
      const raw = row.toi ?? row.timeOnIce ?? row.time_on_ice;
      if (raw !== undefined && raw !== null && String(raw).trim()) return String(raw).trim();
      const sec = Number(row.toi_sec);
      if (isFinite(sec)) return `${Math.floor(sec / 60)}:${String(Math.round(sec % 60)).padStart(2, '0')}`;
      return '—';
    }

    function renderPropPlayerRowTable(title, row, isGoalie, isSim) {
      if (!row) {
        return `
          <div class="cards-panel-card cards-prop-stack">
            <div class="cards-table-head"><div class="cards-table-title">${escHtml(title)}</div></div>
            <div class="cards-empty-copy">${escHtml(isSim ? 'No sim row matched this player.' : 'No live or final row matched this player yet.')}</div>
          </div>`;
      }

      if (isGoalie) {
        const saves = statFromRow(row, 'SAVES');
        const sa = Number(row.shots_against ?? row.shotsAgainst ?? row.sa);
        return `
          <div class="cards-panel-card cards-prop-stack">
            <div class="cards-table-head"><div class="cards-table-title">${escHtml(title)}</div></div>
            <table class="boxscore">
              <thead><tr><th>Goalie</th><th>SV</th><th>SA</th><th>TOI</th></tr></thead>
              <tbody><tr><td class="player">${escHtml(row.name || row.player || '—')}</td><td>${saves == null ? '—' : escHtml(String(isSim ? fmt(saves, 2) : fmtInt(saves)))}</td><td>${isFinite(sa) ? escHtml(String(isSim ? fmt(sa, 2) : fmtInt(sa))) : '—'}</td><td>${escHtml(formatToiValue(row))}</td></tr></tbody>
            </table>
          </div>`;
      }

      const goals = Number(row.goals ?? row.g);
      const assists = Number(row.assists ?? row.a);
      const points = statFromRow(row, 'POINTS');
      const shots = statFromRow(row, 'SOG');
      const blocks = statFromRow(row, 'BLOCKS');
      return `
        <div class="cards-panel-card cards-prop-stack">
          <div class="cards-table-head"><div class="cards-table-title">${escHtml(title)}</div></div>
          <table class="boxscore">
            <thead><tr><th>Player</th><th>G</th><th>A</th><th>P</th><th>S</th><th>BLK</th><th>TOI</th></tr></thead>
            <tbody><tr><td class="player">${escHtml(row.name || row.player || '—')}</td><td>${isFinite(goals) ? escHtml(String(isSim ? fmt(goals, 2) : fmtInt(goals))) : '—'}</td><td>${isFinite(assists) ? escHtml(String(isSim ? fmt(assists, 2) : fmtInt(assists))) : '—'}</td><td>${points == null ? '—' : escHtml(String(isSim ? fmt(points, 2) : fmtInt(points)))}</td><td>${shots == null ? '—' : escHtml(String(isSim ? fmt(shots, 2) : fmtInt(shots)))}</td><td>${blocks == null ? '—' : escHtml(String(isSim ? fmt(blocks, 2) : fmtInt(blocks)))}</td><td>${escHtml(formatToiValue(row))}</td></tr></tbody>
          </table>
        </div>`;
    }

    function resolvePropRows(pred, liveGame, simRows, selected) {
      const info = propMarketInfo(selected && selected.market);
      const side = propSideForGame(pred, selected);
      const livePlayers = info.isGoalie ? (liveGame?.lens?.goalies || {}) : (liveGame?.lens?.players || {});
      const actualSet = side === 'away' || side === 'home'
        ? (livePlayers?.[side] || [])
        : ([]).concat(livePlayers?.away || [], livePlayers?.home || []);
      const actualRow = lookupPropRowInSet(actualSet, selected);

      let simTeam = '';
      if (side === 'away') simTeam = predTeamAbbr(pred, 'away') || selected?.team;
      else if (side === 'home') simTeam = predTeamAbbr(pred, 'home') || selected?.team;
      else simTeam = selected?.team;
      const simRow = lookupPropSimRow((simRows || []).filter((row) => Number(row.period) === 0), selected, simTeam);

      return {
        actualRow,
        simRow,
        actualValue: statFromRow(actualRow, selected?.market),
        simValue: statFromRow(simRow, selected?.market),
      };
    }

    function renderCardPropSections(card, pred, simRows, liveGame) {
      if (!card || !pred) return;
      const gameKey = String(card.dataset.gameKey || '').trim();
      const detail = ensurePropCardState(gameKey, buildCardPropRows([].concat(card.__propsAway || [], card.__propsHome || [])));
      const rows = Array.isArray(detail.rows) ? detail.rows : [];
      const groupsNode = card.querySelector('[data-role="prop-groups"]');
      const lensNode = card.querySelector('[data-role="prop-lens"]');
      const filtersNode = card.querySelector('[data-role="prop-filters"]');
      const summaryChip = card.querySelector('[data-role="prop-summary-chip"]');
      if (!groupsNode || !lensNode || !filtersNode || !summaryChip) return;

      const filters = detail.propFilters || { side: 'all', type: 'all' };
      const visibleRows = filteredPropRows(rows, filters);
      filtersNode.innerHTML = rows.length ? renderPropFilterControls(rows, detail) : '';
      summaryChip.textContent = visibleRows.length ? `${visibleRows.length} props` : (rows.length ? 'No matches' : 'Off card');

      if (!rows.length) {
        groupsNode.innerHTML = '<div class="cards-empty-copy">No playable player props for this matchup.</div>';
        lensNode.innerHTML = `
          <div class="cards-lens-head">
            <div>
              <div class="cards-lens-label">Prop lens</div>
              <div class="cards-lens-main">No player lens available</div>
            </div>
            <span class="cards-lens-badge is-live">Off card</span>
          </div>
          <div class="cards-callout-copy">This game has the game-market tiles and sim detail, but no saved playable player props to drill into.</div>`;
        return;
      }

      if (!visibleRows.length) {
        groupsNode.innerHTML = '<div class="cards-empty-copy">No props match the current side and type filters.</div>';
        lensNode.innerHTML = `
          <div class="cards-lens-head">
            <div>
              <div class="cards-lens-label">Prop lens</div>
              <div class="cards-lens-main">No filtered prop selected</div>
            </div>
            <span class="cards-lens-badge is-live">Refine filters</span>
          </div>
          <div class="cards-callout-copy">Adjust the side or prop-type pills to bring a saved player edge back into view.</div>`;
        return;
      }

      let selected = visibleRows.find((row) => propRowKey(row) === detail.selectedPropKey) || visibleRows[0] || null;
      if (selected) detail.selectedPropKey = propRowKey(selected);

      const awayAbbr = predTeamAbbr(pred, 'away') || String(pred.away_abbr || pred.away || 'Away').trim() || 'Away';
      const homeAbbr = predTeamAbbr(pred, 'home') || String(pred.home_abbr || pred.home || 'Home').trim() || 'Home';
      const awayRows = visibleRows.filter((row) => propSideForGame(pred, row) === 'away');
      const homeRows = visibleRows.filter((row) => propSideForGame(pred, row) === 'home');
      const neutralRows = visibleRows.filter((row) => {
        const side = propSideForGame(pred, row);
        return side !== 'away' && side !== 'home';
      });

      groupsNode.innerHTML = `
        ${awayRows.length ? `<div class="cards-prop-group"><div class="cards-prop-group-head"><div class="cards-section-label">${escHtml(awayAbbr)} board</div><span class="cards-chip">${escHtml(String(awayRows.length))}</span></div><div class="cards-prop-buttons">${propButtonMarkup(awayRows, detail.selectedPropKey)}</div></div>` : ''}
        ${homeRows.length ? `<div class="cards-prop-group"><div class="cards-prop-group-head"><div class="cards-section-label">${escHtml(homeAbbr)} board</div><span class="cards-chip">${escHtml(String(homeRows.length))}</span></div><div class="cards-prop-buttons">${propButtonMarkup(homeRows, detail.selectedPropKey)}</div></div>` : ''}
        ${neutralRows.length ? `<div class="cards-prop-group"><div class="cards-prop-group-head"><div class="cards-section-label">Other matched props</div><span class="cards-chip">${escHtml(String(neutralRows.length))}</span></div><div class="cards-prop-buttons">${propButtonMarkup(neutralRows, detail.selectedPropKey)}</div></div>` : ''}`;

      const info = propTypeInfo(selected);
      const rowsForLens = resolvePropRows(pred, liveGame, simRows, selected);
      const actualLabel = rowsForLens.actualValue == null ? '—' : String(fmt(rowsForLens.actualValue, rowsForLens.actualValue % 1 ? 2 : 0));
      const simLabel = rowsForLens.simValue == null ? '—' : String(fmt(rowsForLens.simValue, 2));
      const lineLabel = `${String(selected?.side || 'OVER').replace(/^./, (m) => m.toUpperCase())} ${fmt(selected?.line, 1)}`;
      const detailPairs = [
        { label: 'Tier', value: propTierLabel(selected) },
        { label: 'Market', value: info.label },
        { label: 'Line', value: lineLabel },
        { label: 'Odds', value: fmtAmerican(selected?.price) },
        { label: 'Model', value: isFinite(Number(selected?.prob)) ? `${pct(selected?.prob)} ${String(selected?.side || 'over').toLowerCase()}` : 'Model unavailable' },
        { label: 'Actual', value: actualLabel },
        { label: 'Sim mean', value: simLabel },
        { label: 'Edge', value: formatPropEdge(selected) },
      ];

      lensNode.innerHTML = `
        <div class="cards-lens-head">
          <div>
            <div class="cards-lens-label">Prop lens</div>
            <div class="cards-lens-main">${escHtml(selected.player || 'Player')} · ${escHtml(info.label)}</div>
            <div class="cards-subcopy">${escHtml(selected.team || 'Team')} at ${escHtml(selected.opp || (String(selected.team || '').toUpperCase() === awayAbbr ? homeAbbr : awayAbbr || 'Opp'))} · ${escHtml(propTierLabel(selected))} · Sim-backed lens</div>
          </div>
          <span class="cards-lens-badge ${escHtml(evClass(selected.ev))}">${escHtml(String(selected.side || '').toUpperCase())}</span>
        </div>
        <div class="cards-detail-grid">
          ${detailPairs.map((pair) => renderDataPair(pair.label, pair.value)).join('')}
        </div>
        ${selected.edgeReasons ? `<div class="cards-callout-copy">${renderDriverPills(selected.edgeReasons, 4, false)}</div>` : ''}
        <div class="cards-box-grid">
          ${renderPropPlayerRowTable('Live / final player row', rowsForLens.actualRow, info.isGoalie, false)}
          ${renderPropPlayerRowTable('Sim player row', rowsForLens.simRow, info.isGoalie, true)}
        </div>`;
    }

    function sourceMetaPill(label, variant = '') {
      const classes = ['cards-source-meta-pill'];
      if (variant) classes.push(`is-${variant}`);
      return `<span class="${classes.join(' ')}">${escHtml(String(label || ''))}</span>`;
    }

    function slateCounts(cards) {
      const list = Array.isArray(cards) ? cards : [];
      const liveCount = list.filter((card) => isLiveState(card?.status)).length;
      const finalCount = list.filter((card) => isFinalLikeState(card?.status)).length;
      const officialCount = list.filter((card) => !!card?.hasOfficial).length;
      const propsCount = list.filter((card) => !!card?.hasProps).length;
      return {
        liveCount,
        finalCount,
        officialCount,
        propsCount,
        upcomingCount: Math.max(list.length - liveCount - finalCount, 0),
      };
    }

    function renderSlateSourceMeta(cards, nSims) {
      const root = $('cardsSourceMeta');
      if (!root) return;
      const counts = slateCounts(cards);
      const pills = [
        sourceMetaPill(`${cards.length} games`, 'soft'),
        sourceMetaPill(`${counts.upcomingCount} upcoming`, 'soft'),
        sourceMetaPill(`${counts.liveCount} live`, counts.liveCount ? 'live' : 'soft'),
        sourceMetaPill(`${counts.finalCount} final`, 'soft'),
        sourceMetaPill(`${counts.officialCount} official cards`, 'soft'),
        sourceMetaPill(`${counts.propsCount} props boards`, 'soft'),
      ];
      if (nSims !== null && nSims !== undefined && isFinite(Number(nSims))) pills.splice(1, 0, sourceMetaPill(`${Number(nSims)} sims / game`, 'soft'));
      root.innerHTML = pills.join('');
    }

    function buildSlateFilters(cards) {
      const counts = slateCounts(cards);
      return [
        { key: 'all', label: `All ${cards.length}` },
        { key: 'official', label: `Official ${counts.officialCount}` },
        { key: 'props', label: `Props ${counts.propsCount}` },
        { key: 'live', label: `Live ${counts.liveCount}` },
        { key: 'final', label: `Final ${counts.finalCount}` },
      ];
    }

    function elementMatchesSlateFilter(el, filterKey) {
      if (!el || filterKey === 'all') return true;
      const status = String(el.dataset.cardStatus || '').trim();
      const hasOfficial = el.dataset.hasOfficial === '1';
      const hasProps = el.dataset.hasProps === '1';
      if (filterKey === 'official') return hasOfficial;
      if (filterKey === 'props') return hasProps;
      if (filterKey === 'live') return isLiveState(status);
      if (filterKey === 'final') return isFinalLikeState(status);
      return true;
    }

    function applySlateFilter() {
      for (const card of document.querySelectorAll('.cards-game-card[data-game-key]')) {
        card.hidden = !elementMatchesSlateFilter(card, activeSlateFilter);
      }
      for (const item of document.querySelectorAll('.scoreboard-strip .s-item[data-game-key]')) {
        item.hidden = !elementMatchesSlateFilter(item, activeSlateFilter);
      }
    }

    function renderSlateFilters(cards) {
      const root = $('cardsFilters');
      if (!root) return;
      root.innerHTML = buildSlateFilters(cards).map((filter) => `
        <button type="button" class="cards-filter-pill ${filter.key === activeSlateFilter ? 'is-active' : ''}" data-filter-key="${escHtml(filter.key)}">
          ${escHtml(filter.label)}
        </button>`).join('');
      root.querySelectorAll('[data-filter-key]').forEach((button) => {
        button.addEventListener('click', () => {
          activeSlateFilter = button.getAttribute('data-filter-key') || 'all';
          renderSlateFilters(currentSlateCards);
          applySlateFilter();
        });
      });
    }

    function renderPropsEdgesHtml(title, propsRows) {
      // Normalize; prefer edge score, but fallback to EV for older bundles.
      const raw = (propsRows || []).map(normalizePropRec)
        .filter(r => r && r.player && r.market && r.side && (isFinite(r.edgeScore) || isFinite(r.ev)))
        .filter(r => {
          // If EV exists, require a small minimum; otherwise keep row (older artifacts).
          const ev = Number(r.ev);
          return !isFinite(ev) || ev >= PROPS_EV_MIN;
        })
        .filter(r => {
          // Hard display cap: only show bettable price ranges.
          const p = Number(r.priceNum);
          return isFinite(p) && p >= PROPS_AMERICAN_PRICE_MIN && p <= PROPS_AMERICAN_PRICE_MAX;
        });

      // Dedupe: show each prop once by best available price.
      const best = new Map();
      for (const r of raw) {
        const ln = (r.line !== null && r.line !== undefined && String(r.line).trim() !== '') ? String(r.line).trim() : '';
        const key = `${normKey(r.player)}|${toUpper(r.market)}|${toUpper(r.side)}|${ln}`;
        const cur = best.get(key);
        if (!cur) { best.set(key, r); continue; }
        const decNew = americanToDecimal(r.price);
        const decCur = americanToDecimal(cur.price);
        if (isFinite(decNew) && (!isFinite(decCur) || decNew > decCur)) { best.set(key, r); continue; }
        // Tie-break: higher edge score, then EV.
        if (r.edgeScore > cur.edgeScore) { best.set(key, r); continue; }
        if (r.edgeScore === cur.edgeScore && isFinite(r.ev) && (!isFinite(cur.ev) || r.ev > cur.ev)) { best.set(key, r); }
      }
      const rows = Array.from(best.values());
      // Prefer ranking by EV (bettability), then by edge score.
      rows.sort((a,b) => ((isFinite(b.ev) ? b.ev : -1e9) - (isFinite(a.ev) ? a.ev : -1e9)) || ((isFinite(b.edgeScore) ? b.edgeScore : -1e9) - (isFinite(a.edgeScore) ? a.edgeScore : -1e9)));
      const top = rows.slice(0, 4);
      if (!top.length) {
        return `<div class="market"><div class="k">${title}</div><div class="v muted">No props edges available.</div></div>`;
      }
      const body = top.map(r => {
        const edgeTxt = isFinite(r.edgeScore) ? (100 * r.edgeScore).toFixed(0) : '—';
        const evTxt = isFinite(r.ev) ? (100 * r.ev).toFixed(1) + '%' : '—';
        const prTxt = isFinite(r.prob) ? (100 * r.prob).toFixed(1) + '%' : '—';
        const ln = (r.line !== null && r.line !== undefined && String(r.line).trim() !== '') ? String(r.line) : '—';
        const price = (r.price !== null && r.price !== undefined && String(r.price).trim() !== '') ? String(r.price) : '—';
        const book = r.book ? ` (${r.book})` : '';
        const pills = r.edgeReasons ? renderDriverPills(r.edgeReasons, 3, false) : '';
        return `<div class="v"><strong>${r.player}</strong> ${r.market} ${r.side} ${ln} <span class="muted">@ ${price}${book}</span> · <strong>Edge ${edgeTxt}</strong> <span class="muted">(p ${prTxt}${isFinite(r.ev) ? `, EV ${evTxt}` : ''})</span>${pills}</div>`;
      }).join('');
      return `<div class="market"><div class="k">${title}</div>${body}</div>`;
    }

    function normKey(s) {
      return String(s || '').trim().replace(/\s+/g,' ').toLowerCase();
    }

    function normalizeRec(rec) {
      const ev = (rec && rec.ev !== undefined) ? Number(rec.ev) : NaN;
      return {
        market: String(rec.market || ''),
        side: String(rec.side || ''),
        line: (rec && rec.line !== undefined) ? rec.line : null,
        price: rec.price,
        ev,
        edgeReasons: String((rec && (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason)) ? (rec.edge_drivers || rec.edge_reasons || rec.drivers || rec.reason) : '').trim(),
        home: String(rec.home || ''),
        away: String(rec.away || ''),
      };
    }

    function _shortDriversText(s) {
      try {
        const x = String(s || '').trim();
        if (!x) return '';
        // Prefer the first 1-2 clauses; keep compact.
        const parts = x.split(/\s*[;|]\s*|\s*\u00b7\s*|\s*,\s*/).map(p => p.trim()).filter(Boolean);
        const keep = parts.slice(0, 2).join(' · ');
        const out = keep || x;
        return out.length > 90 ? (out.slice(0, 87) + '...') : out;
      } catch (e) {
        return '';
      }
    }

    function escHtml(s) {
      try {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\"/g, '&quot;')
          .replace(/'/g, '&#39;');
      } catch (e) {
        return '';
      }
    }

    function splitDrivers(s) {
      try {
        const x = String(s || '').trim();
        if (!x) return [];
        const parts = x
          .split(/\s*[;|]\s*|\s*\u00b7\s*|\s*,\s*/)
          .map(p => String(p || '').trim())
          .filter(Boolean);
        const seen = new Set();
        const out = [];
        for (const p of parts) {
          const k = p.toLowerCase();
          if (seen.has(k)) continue;
          seen.add(k);
          out.push(p);
        }
        return out;
      } catch (e) {
        return [];
      }
    }

    function renderDriverPills(s, maxPills=3, inline=false) {
      const parts = splitDrivers(s);
      if (!parts.length) return '';
      const keep = parts.slice(0, Math.max(1, Number(maxPills) || 3));
      const cls = inline ? 'driver-pills inline' : 'driver-pills';
      return `<span class="${cls}">` + keep.map(p => `<span class="driver-pill">${escHtml(p)}</span>`).join('') + `</span>`;
    }

    function simProjectedTotals(pred, simRows) {
      const rows = Array.isArray(simRows) ? simRows : [];
      if (!rows.length) return { away: null, home: null };

      const awayLabel = predTeamAbbr(pred, 'away') || String((pred && pred.away) || 'Away').trim() || 'Away';
      const homeLabel = predTeamAbbr(pred, 'home') || String((pred && pred.home) || 'Home').trim() || 'Home';
      const awayKey = String((pred && pred.away) || awayLabel).trim() || awayLabel;
      const homeKey = String((pred && pred.home) || homeLabel).trim() || homeLabel;

      const totalFor = (teamKey) => {
        const p0 = sumSim(rows, teamKey, 0, 'goals');
        if (p0 !== null && p0 !== undefined) return Number(p0);
        let total = 0;
        let any = false;
        for (const per of [1, 2, 3, 4]) {
          const v = sumSim(rows, teamKey, per, 'goals');
          if (v !== null && v !== undefined) {
            total += Number(v);
            any = true;
          }
        }
        return any ? total : null;
      };

      return {
        away: totalFor(awayKey),
        home: totalFor(homeKey),
      };
    }

    function poissonPmf(k, lambda) {
      const kk = Number(k);
      const lam = Number(lambda);
      if (!isFinite(kk) || !isFinite(lam) || kk < 0 || lam < 0) return 0;
      if (kk === 0) return Math.exp(-lam);
      let pmf = Math.exp(-lam);
      for (let goal = 1; goal <= kk; goal += 1) pmf = (pmf * lam) / goal;
      return pmf;
    }

    function segmentWinnerProbabilities(homeLambda, awayLambda, maxGoals=10) {
      const home = Number(homeLambda);
      const away = Number(awayLambda);
      if (!isFinite(home) || !isFinite(away) || home < 0 || away < 0) return null;
      let pHome = 0;
      let pAway = 0;
      let pTie = 0;
      for (let h = 0; h <= maxGoals; h += 1) {
        const ph = poissonPmf(h, home);
        for (let a = 0; a <= maxGoals; a += 1) {
          const joint = ph * poissonPmf(a, away);
          if (h > a) pHome += joint;
          else if (a > h) pAway += joint;
          else pTie += joint;
        }
      }
      const total = pHome + pAway + pTie;
      if (!total) return null;
      return {
        away_win_prob: pAway / total,
        home_win_prob: pHome / total,
        tie_prob: pTie / total,
      };
    }

    function predictionSegments(pred) {
      const existing = pred && pred.segments && typeof pred.segments === 'object' ? pred.segments : null;
      if (existing) return existing;

      const p1h = Number(pred && pred.period1_home_proj);
      const p1a = Number(pred && pred.period1_away_proj);
      const p2h = Number(pred && pred.period2_home_proj);
      const p2a = Number(pred && pred.period2_away_proj);
      const p3h = Number(pred && pred.period3_home_proj);
      const p3a = Number(pred && pred.period3_away_proj);

      const segments = {};
      const p1 = segmentWinnerProbabilities(p1h, p1a);
      const p2 = segmentWinnerProbabilities(p2h, p2a);
      const p3 = segmentWinnerProbabilities(p3h, p3a);
      if (p1) segments.p1 = p1;
      if (p2) segments.p2 = p2;
      if (p3) segments.p3 = p3;

      let regHome = null;
      let regAway = null;
      if ([p1h, p2h, p3h].every((value) => isFinite(value))) regHome = p1h + p2h + p3h;
      else if (isFinite(Number(pred && pred.proj_home_goals))) regHome = Number(pred.proj_home_goals);
      if ([p1a, p2a, p3a].every((value) => isFinite(value))) regAway = p1a + p2a + p3a;
      else if (isFinite(Number(pred && pred.proj_away_goals))) regAway = Number(pred.proj_away_goals);

      const final = segmentWinnerProbabilities(regHome, regAway);
      if (final) {
        segments.final = final;
        segments.ot = {
          yes_prob: Number(final.tie_prob) || 0,
          no_prob: Math.max(0, 1 - (Number(final.tie_prob) || 0)),
        };
      }
      return segments;
    }

    function renderProbabilityRow(label, row, awayLabel, homeLabel, badge='Win split') {
      if (!row) {
        return `
          <div class="cards-prob-row">
            <div class="cards-prob-head">
              <div class="cards-prob-label">${escHtml(label)}</div>
              <div class="cards-prob-badge">${escHtml(badge)}</div>
            </div>
            <div class="cards-prob-meta">Probabilities unavailable.</div>
          </div>
        `;
      }
      const away = Math.max(0, Number(row.away_win_prob) || 0);
      const home = Math.max(0, Number(row.home_win_prob) || 0);
      const tie = Math.max(0, Number(row.tie_prob) || 0);
      const total = away + tie + home;
      const awayWidth = total > 0 ? (away / total) * 100 : 0;
      const tieWidth = total > 0 ? (tie / total) * 100 : 0;
      const homeWidth = total > 0 ? (home / total) * 100 : 0;
      return `
        <div class="cards-prob-row">
          <div class="cards-prob-head">
            <div class="cards-prob-label">${escHtml(label)}</div>
            <div class="cards-prob-badge">${escHtml(badge)}</div>
          </div>
          <div class="cards-prob-bar">
            <div class="cards-prob-away" style="--seg-width:${awayWidth.toFixed(4)}%;"></div>
            <div class="cards-prob-tie" style="--seg-width:${tieWidth.toFixed(4)}%;"></div>
            <div class="cards-prob-home" style="--seg-width:${homeWidth.toFixed(4)}%;"></div>
          </div>
          <div class="cards-prob-meta">${escHtml(awayLabel)} ${pct(away)} | Tie ${pct(tie)} | ${escHtml(homeLabel)} ${pct(home)}</div>
        </div>
      `;
    }

    function renderOtProbabilityRow(otRow) {
      if (!otRow) {
        return `
          <div class="cards-prob-row">
            <div class="cards-prob-head">
              <div class="cards-prob-label">OT</div>
              <div class="cards-prob-badge">Game path</div>
            </div>
            <div class="cards-prob-meta">OT probability unavailable.</div>
          </div>
        `;
      }
      const noOt = Math.max(0, Number(otRow.no_prob) || 0);
      const yesOt = Math.max(0, Number(otRow.yes_prob) || 0);
      const total = noOt + yesOt;
      const noOtWidth = total > 0 ? (noOt / total) * 100 : 0;
      const yesOtWidth = total > 0 ? (yesOt / total) * 100 : 0;
      return `
        <div class="cards-prob-row">
          <div class="cards-prob-head">
            <div class="cards-prob-label">OT</div>
            <div class="cards-prob-badge">Game path</div>
          </div>
          <div class="cards-prob-bar">
            <div class="cards-prob-tie" style="--seg-width:${noOtWidth.toFixed(4)}%;"></div>
            <div class="cards-prob-home" style="--seg-width:${yesOtWidth.toFixed(4)}%;"></div>
          </div>
          <div class="cards-prob-meta">No OT ${pct(noOt)} | OT ${pct(yesOt)}</div>
        </div>
      `;
    }

    function renderGameProbabilityRows(pred, awayAbbr, homeAbbr) {
      const segments = predictionSegments(pred);
      return [
        renderProbabilityRow('P1', segments && segments.p1, awayAbbr, homeAbbr),
        renderProbabilityRow('P2', segments && segments.p2, awayAbbr, homeAbbr),
        renderProbabilityRow('P3', segments && segments.p3, awayAbbr, homeAbbr),
        renderProbabilityRow('Final', segments && segments.final, awayAbbr, homeAbbr, 'Regulation'),
        renderOtProbabilityRow(segments && segments.ot),
      ].join('');
    }

    function renderDataPair(label, value) {
      return `
        <div class="cards-data-pair">
          <span>${escHtml(label)}</span>
          <strong>${escHtml(value)}</strong>
        </div>
      `;
    }

    function gameStatusInfo(rawStatus, opts = null) {
      const o = opts || {};
      const raw = String(rawStatus || '').trim();
      const detailed = String(o.detailed || '').trim();
      const periodDisp = String(o.periodDisp || '').trim();
      const tokens = [raw, detailed, periodDisp].filter(Boolean);
      const upper = tokens.join(' | ').toUpperCase();
      const compact = upper.replace(/[^A-Z0-9]+/g, '');
      const has = (value) => upper.includes(String(value || '').toUpperCase());
      const hasCompact = (value) => compact.includes(String(value || '').toUpperCase().replace(/[^A-Z0-9]+/g, ''));
      const isFinal = has('FINAL') || hasCompact('FINAL') || has('POST') || hasCompact('POST') || has('END') || hasCompact('END') || upper === 'OFF' || compact === 'OFF';
      const isIntermission = has('INTERMISSION') || hasCompact('INTERMISSION') || /(?:^|\b)INT(?:\b|$)/.test(upper) || hasCompact('INT');
      const isShootout = has('SHOOTOUT') || hasCompact('SHOOTOUT') || upper === 'SO' || compact === 'SO' || /(?:^|\b)SO(?:\b|$)/.test(upper);
      const isOvertime = !isFinal && !isShootout && (has('OVERTIME') || hasCompact('OVERTIME') || /(?:^|\b)OT(?:\b|$)/.test(upper) || hasCompact('OT'));
      const isCritical = has('CRIT') || hasCompact('CRIT');
      const isLive = !isFinal && (has('LIVE') || hasCompact('LIVE') || has('IN_PROGRESS') || has('IN PROGRESS') || has('IN-PROGRESS') || hasCompact('INPROGRESS') || isIntermission || isShootout || isOvertime || isCritical);

      let text = raw || detailed || periodDisp || 'Scheduled';
      let className = statusBadgeClass(text);
      if (isFinal) {
        text = 'Final';
        className = 'final';
      } else if (isShootout) {
        text = 'SO';
        className = 'so';
      } else if (isOvertime) {
        text = 'OT';
        className = 'ot';
      } else if (isIntermission) {
        text = 'Intermission';
        className = 'intermission';
      } else if (isCritical) {
        text = 'Crunch Time';
        className = 'crit';
      } else if (isLive) {
        text = 'Live';
        className = 'live';
      } else if (has('PRE') || hasCompact('PRE') || has('PREGAME') || hasCompact('PREGAME') || has('PREVIEW') || hasCompact('PREVIEW') || has('SCHEDULED') || hasCompact('SCHEDULED') || has('FUT') || hasCompact('FUT')) {
        text = 'Scheduled';
        className = 'scheduled';
      }

      return {
        raw,
        detailed,
        periodDisp,
        text,
        className,
        isLive,
        isFinal,
      };
    }

    function statusBadgeClass(text) {
      try {
        const s = String(text || '').trim().toLowerCase();
        if (!s) return 'scheduled';
        return s.replace(/[^a-z0-9]+/g, '-');
      } catch (e) {
        return 'scheduled';
      }
    }

    function activateCardTab(card, panelId) {
      if (!card) return;
      const target = String(panelId || 'overview').trim() || 'overview';
      for (const btn of card.querySelectorAll('.cards-tab')) {
        btn.classList.toggle('is-active', btn.dataset.tabTarget === target);
      }
      for (const panel of card.querySelectorAll('.cards-panel')) {

    function wireCardTabs(card) {
      if (!card || card.dataset.cardWired === '1') return;
      card.addEventListener('click', (ev) => {
        const tab = ev.target && ev.target.closest ? ev.target.closest('.cards-tab') : null;

          detail.propFilters[kind] = value;
          const pred = (window.__PREDS_BY_GAME__ && window.__PREDS_BY_GAME__.get) ? (window.__PREDS_BY_GAME__.get(gameKey) || null) : null;
          const simRows = (window.__SIM_BY_GAME__ && window.__SIM_BY_GAME__.get) ? (window.__SIM_BY_GAME__.get(gameKey) || []) : [];
          const liveGame = (window.__LIVE_BY_KEY__ && window.__LIVE_BY_KEY__.get) ? (window.__LIVE_BY_KEY__.get(normKey(gameKey)) || null) : null;

          const detail = propCardState.get(gameKey);
          if (!detail) return;
          detail.selectedPropKey = String(propBtn.getAttribute('data-prop-key') || '').trim() || null;
          const pred = (window.__PREDS_BY_GAME__ && window.__PREDS_BY_GAME__.get) ? (window.__PREDS_BY_GAME__.get(gameKey) || null) : null;
          const simRows = (window.__SIM_BY_GAME__ && window.__SIM_BY_GAME__.get) ? (window.__SIM_BY_GAME__.get(gameKey) || []) : [];
          const liveGame = (window.__LIVE_BY_KEY__ && window.__LIVE_BY_KEY__.get) ? (window.__LIVE_BY_KEY__.get(normKey(gameKey)) || null) : null;
          renderCardPropSections(card, pred, simRows, liveGame);
        }
      });
      card.dataset.cardWired = '1';
      activateCardTab(card, 'overview');
    }

    function _normTeamToken(s) {
      return String(s || '').trim().replace(/\s+/g,' ').toLowerCase();
    }

    function _inferModelProbForRec(pred, rec) {
      try {
        const mkt = toUpper(rec.market);
        const sideRaw = String(rec.side || '');
        const side = _normTeamToken(sideRaw);
        const awayName = _normTeamToken(pred && pred.away);
        const homeName = _normTeamToken(pred && pred.home);

        const mlAway = (pred && pred.p_away_ml !== undefined && pred.p_away_ml !== null) ? Number(pred.p_away_ml) : null;
        const mlHome = (pred && pred.p_home_ml !== undefined && pred.p_home_ml !== null) ? Number(pred.p_home_ml) : null;
        const pOver = (pred && pred.p_over !== undefined && pred.p_over !== null) ? Number(pred.p_over) : null;
        const pUnder = (pred && pred.p_under !== undefined && pred.p_under !== null) ? Number(pred.p_under) : null;
        const pHomePl = (pred && pred['p_home_pl_-1.5'] !== undefined && pred['p_home_pl_-1.5'] !== null) ? Number(pred['p_home_pl_-1.5']) : null;
        const pAwayPl = (pred && pred['p_away_pl_+1.5'] !== undefined && pred['p_away_pl_+1.5'] !== null) ? Number(pred['p_away_pl_+1.5']) : null;

        if (mkt.includes('ML')) {
          if (awayName && side === awayName) return mlAway;
          if (homeName && side === homeName) return mlHome;
          return null;
        }
        if (mkt.includes('TOTAL')) {
          const s = toUpper(sideRaw);
          if (s.includes('OVER')) return pOver;
          if (s.includes('UNDER')) return pUnder;
          return null;
        }
        if (mkt.includes('PL') || mkt.includes('PUCK')) {
          // Side looks like "Team -1.5" or "Team +1.5".
          if (awayName && side.startsWith(awayName)) return pAwayPl;
          if (homeName && side.startsWith(homeName)) return pHomePl;
          return null;
        }
      } catch (e) {}
      return null;
    }

    function renderCard(pred, recsForGame, simForGame, propsAway=null, propsHome=null, simMeta=null) {
      const match = keyForGame(pred);
      const state = String(pred.game_state || '').trim();
      const stateInfo = gameStatusInfo(state);
      const venue = String(pred.venue || '').trim();
      let startDetail = venue;
      try {
        const startMs = startTimeMs(pred);
        if (isFinite(Number(startMs))) {
          const startText = new Intl.DateTimeFormat(undefined, {
            month: 'numeric',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit',
            timeZoneName: 'short',
          }).format(new Date(Number(startMs)));
          startDetail = venue ? `${startText} · ${venue}` : startText;
        }
      } catch (e) {}

      const awayLogo = pred.away_logo ? String(pred.away_logo) : '';
      const homeLogo = pred.home_logo ? String(pred.home_logo) : '';

      const projAway = pred.proj_away_goals;
      const projHome = pred.proj_home_goals;
      const modelTotal = pred.model_total;
      const modelSpread = pred.model_spread;

      const mlAway = pred.p_away_ml;
      const mlHome = pred.p_home_ml;

      const totalLine = pred.total_line_used;
      const pOver = pred.p_over;
      const pUnder = pred.p_under;

      const plLine = pred.pl_line_used;
      const pHomePl = pred['p_home_pl_-1.5'];
      const pAwayPl = pred['p_away_pl_+1.5'];

      // Pick a few best recs to show.
      // We want picks rooted in the model (confidence) first, then EV.
      const recs = (recsForGame || [])
        .map(normalizeRec)
        .filter(r => r.market && isFinite(r.ev));

      const bestByMarket = new Map();
      recs.forEach(r => {
        const m = toUpper(r.market);
        const pModel = _inferModelProbForRec(pred, r);
        const conf = (pModel !== null && pModel !== undefined && isFinite(Number(pModel))) ? Math.abs(Number(pModel) - 0.5) : -1;
        const cur = bestByMarket.get(m);
        if (!cur) {
          bestByMarket.set(m, { ...r, _pModel: pModel, _conf: conf });
          return;
        }
        const curConf = (cur && cur._conf !== undefined) ? Number(cur._conf) : -1;
        const curEv = (cur && cur.ev !== undefined) ? Number(cur.ev) : -Infinity;
        const evv = Number(r.ev);
        if (conf > curConf || (conf === curConf && evv > curEv)) {
          bestByMarket.set(m, { ...r, _pModel: pModel, _conf: conf });
        }
      });
      const preferredOrder = ['ML','TOTAL','PL'];
      const top = preferredOrder
        .map(m => bestByMarket.get(m))
        .filter(Boolean);

      const simTotals = simProjectedTotals(pred, simForGame);
      const simCount = (simMeta && simMeta.nSims !== undefined && simMeta.nSims !== null && isFinite(Number(simMeta.nSims)))
        ? Number(simMeta.nSims)
        : null;
      const awayAbbr = predTeamAbbr(pred, 'away') || String(pred.away_abbr || pred.away || 'Away').trim() || 'Away';
