                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        const renderLiveGoaliesTable = (title, arr) => {
          const rows = (arr || []).slice();
          const body = rows.slice(0, 2).map(r => {
            const svPct = (r && r.sv_pct !== undefined && r.sv_pct !== null && isFinite(Number(r.sv_pct)))
              ? (100 * Number(r.sv_pct)).toFixed(1) + '%'
              : '—';
            return `
              <tr>
                <td class="player">${(r && r.name) ? r.name : '—'}</td>
                <td>${(r && r.saves !== undefined) ? r.saves : '—'}</td>
                <td>${(r && r.shots_against !== undefined) ? r.shots_against : '—'}</td>
                <td>${svPct}</td>
              </tr>
            `;
          }).join('');
          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Goalie</th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="num">SA</th>
                <th class="sortable" data-sort-type="pct">SV%</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
            </table>
          `;
        };

        // Redundant in Live Lens view: we show merged Sim vs Live tables instead.
      } catch (e) {
        // ignore
      }

      if (totals && (totals.away || totals.home)) {
        const a = totals.away || {};
        const h = totals.home || {};
        const bits = [];
        if (a.sog !== undefined || h.sog !== undefined) bits.push(`SOG <span class="mono">${a.sog ?? '—'}-${h.sog ?? '—'}</span>`);
        if (a.faceoff_win_pct !== undefined || h.faceoff_win_pct !== undefined) bits.push(`FO% <span class="mono">${fmt(a.faceoff_win_pct,1)}-${fmt(h.faceoff_win_pct,1)}</span>`);
        if (a.pp !== undefined || h.pp !== undefined) bits.push(`PP <span class="mono">${a.pp ?? '—'} / ${h.pp ?? '—'}</span>`);
        if (bits.length) lines.push(`<div class="v">${bits.join(' · ')}</div>`);
      }

      if (periods && Array.isArray(periods) && periods.length) {
        const parts = periods.slice(0, 4).map(p => {
          const pn = p.period ?? '—';
          const a = (p.away || {});
          const h = (p.home || {});
          const seg = [];
          if (a.goals !== undefined || h.goals !== undefined) seg.push(`G ${a.goals ?? '—'}-${h.goals ?? '—'}`);
          if (a.sog !== undefined || h.sog !== undefined) seg.push(`SOG ${a.sog ?? '—'}-${h.sog ?? '—'}`);
          return `P${pn} (${seg.join(', ') || '—'})`;
        });
        lines.push(`<div class="v muted">By period: ${parts.join(' · ')}</div>`);
      }

      if (goalies) {
        const ga = (goalies.away && goalies.away[0]) ? goalies.away[0] : null;
        const gh = (goalies.home && goalies.home[0]) ? goalies.home[0] : null;
        if (ga || gh) {
          const gBits = [];
          if (ga) gBits.push(`Away G: ${ga.name ?? '—'} ${ga.saves ?? '—'}/${ga.shots_against ?? '—'} (${fmt((ga.sv_pct ?? null)*100,1)}%)`);
          if (gh) gBits.push(`Home G: ${gh.name ?? '—'} ${gh.saves ?? '—'}/${gh.shots_against ?? '—'} (${fmt((gh.sv_pct ?? null)*100,1)}%)`);
          lines.push(`<div class="v">${gBits.join(' · ')}</div>`);
        }
      }

      return `<div class="k">Live lens</div>${lines.join('')}`;
    }

    function normName(s) {
      return String(s || '').trim().toLowerCase().replace(/[\.'’]/g,'').replace(/\s+/g,' ');
    }

    function getPlayerId(x) {
      try {
        if (!x) return null;
        const cand = ['player_id','playerId','playerID','id','nhl_player_id','nhlPlayerId'];
        for (const k of cand) {
          const v = x[k];
          if (v === null || v === undefined || v === '') continue;
          const n = parseInt(String(v), 10);
          if (isFinite(n)) return n;
        }
      } catch (e) {}
      return null;
    }

    function nameKey(s) {
      const n = normName(s);
      if (!n) return '';
      const parts = n.split(' ').filter(Boolean);
      if (parts.length < 2) return n;
      const first = parts[0];
      const last = parts[parts.length - 1];
      const fi = first ? first[0] : '';
      return (fi && last) ? (fi + ' ' + last) : n;
    }

    function renderMergedSimLive(game, simRows) {
      try {
        const lens = (game && game.lens) ? game.lens : {};
        const players = (lens && lens.players) ? lens.players : null;
        const goalies = (lens && lens.goalies) ? lens.goalies : null;
        const gameState = String((game && (game.gameState || game.game_state)) ? (game.gameState || game.game_state) : '').toUpperCase();
        const liveLabel = (gameState.includes('FINAL')) ? 'Final' : 'Live';
        const away = String(game && game.away ? game.away : '').trim();
        const home = String(game && game.home ? game.home : '').trim();

        const sim = Array.isArray(simRows) ? simRows : [];
        const simSkaters = sim
          .filter(r => r && Number(r.period) === 0)
          .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
          .filter(r => String(r.player || '').trim() && String(r.player || '').toUpperCase() !== 'TEAM')
          .filter(r => {
            const saves = Number(r.saves);
            return !(isFinite(saves) && saves > 0);
          });

        const simGoalies = sim
          .filter(r => r && Number(r.period) === 0)
          .filter(r => String(r.is_dressed) === '1' || r.is_dressed === 1 || r.is_dressed === true)
          .filter(r => String(r.player || '').trim() && String(r.player || '').toUpperCase() !== 'TEAM')
          .filter(r => {
            const saves = Number(r.saves);
            return isFinite(saves) && saves > 0;
          });

        const buildSimMap = (teamAbbr) => {
          const t = String(teamAbbr || '').toUpperCase();
          const byId = new Map();
          const byKey = new Map();
          const byFull = new Map();
          for (const r of simSkaters) {
            if (String(r.team || '').toUpperCase() !== t) continue;
            const pid = getPlayerId(r);
            const full = normName(r.player);
            const key = nameKey(r.player);
            if (pid !== null && pid !== undefined) byId.set(pid, r);
            if (key) byKey.set(key, r);
            if (full) byFull.set(full, r);
          }
          return { byId, byKey, byFull };
        };

        const buildSimGoalieMap = (teamAbbr) => {
          const t = String(teamAbbr || '').toUpperCase();
          const byId = new Map();
          const byKey = new Map();
          const byFull = new Map();
          for (const r of simGoalies) {
            if (String(r.team || '').toUpperCase() !== t) continue;
            const pid = getPlayerId(r);
            const full = normName(r.player);
            const key = nameKey(r.player);
            if (pid !== null && pid !== undefined) byId.set(pid, r);
            if (key) byKey.set(key, r);
            if (full) byFull.set(full, r);
          }
          return { byId, byKey, byFull };
        };

        const simAway = buildSimMap(away);
        const simHome = buildSimMap(home);
        const simGAway = buildSimGoalieMap(away);
        const simGHome = buildSimGoalieMap(home);

        const renderMergedSkaters = (title, liveArr, simMap) => {
          const live = Array.isArray(liveArr) ? liveArr.slice() : [];
          const rows = [];
          const seenIds = new Set();
          const seenKeys = new Set();

          const n0 = (x) => {
            const v = Number(x);
            return (isFinite(v) ? v : 0);
          };
          const n0i = (x) => {
            const v = parseInt(String(x ?? ''), 10);
            return (isFinite(v) ? v : 0);
          };
          const toiToSec = (s) => {
            try {
              const t = String(s || '').trim();
              if (!t || t === '—') return 0;
              const m = t.split(':');
              if (m.length !== 2) return 0;
              const mm = parseInt(m[0], 10);
              const ss = parseInt(m[1], 10);
              if (!isFinite(mm) || !isFinite(ss)) return 0;
              return 60 * mm + ss;
            } catch (e) {
              return 0;
            }
          };
          const fmtToi = (sec) => {
            const s = Math.max(0, Math.round(Number(sec) || 0));
            const mm = Math.floor(s / 60);
            const ss = s % 60;
            return `${mm}:${String(ss).padStart(2,'0')}`;
          };

          // Prefer ordering by live points then shots
          live.sort((a,b) => (Number(b.p)||0)-(Number(a.p)||0) || (Number((b && (b.s ?? b.sog ?? b.shots)) )||0)-(Number((a && (a.s ?? a.sog ?? a.shots)) )||0));
          for (const r of live) {
            const pid = getPlayerId(r);
            const k = nameKey(r && r.name);
            const full = normName(r && r.name);
            if (!pid && !k && !full) continue;
            let s = null;
            if (pid !== null && pid !== undefined) s = (simMap.byId && simMap.byId.get(pid)) || null;
            if (!s && k) s = (simMap.byKey && simMap.byKey.get(k)) || null;
            if (!s && full) s = (simMap.byFull && simMap.byFull.get(full)) || null;
            rows.push({ live: r, sim: s });
            if (pid !== null && pid !== undefined) seenIds.add(pid);
            if (k) seenKeys.add(k);
          }
          // Add sim-only players (if live list is missing them)
          try {
            const byId = simMap.byId || new Map();
            const byKey = simMap.byKey || new Map();
            const byFull = simMap.byFull || new Map();
            if (byId.size) {
              for (const [pid, s] of byId.entries()) {
                if (seenIds.has(pid)) continue;
                rows.push({ live: null, sim: s });
              }
            } else {
              for (const [k2, s] of byKey.entries()) {
                if (seenKeys.has(k2)) continue;
                rows.push({ live: null, sim: s });
              }
              if (!rows.length) {
                for (const [_k3, s] of byFull.entries()) {
                  rows.push({ live: null, sim: s });
                }
              }
            }
          } catch (e) {}

          const body = rows.slice(0, 20).map(x => {
            const lp = x.live || {};
            const sp = x.sim || {};
            const liveName = lp.name || sp.player || '—';
            const pos = lp.pos || sp.pos || sp.position || '—';
            const ltoi = lp.toi || '—';
            const stoi = (isFinite(Number(sp.toi_sec)))
              ? `${Math.floor(Number(sp.toi_sec)/60)}:${String(Math.floor(Number(sp.toi_sec)%60)).padStart(2,'0')}`
              : '—';
            const lshots = (lp && (lp.s ?? lp.sog ?? lp.shots ?? lp.shots_on_goal));
            return `
              <tr>
                <td class="player">${liveName}</td>
                <td>${pos}</td>
                <td>${lp.g ?? '—'}</td>
                <td>${lp.a ?? '—'}</td>
                <td>${lp.p ?? '—'}</td>
                <td>${lshots ?? '—'}</td>
                <td>${lp.blk ?? '—'}</td>
                <td>${ltoi}</td>
                <td>${fmt(Number(sp.goals),2)}</td>
                <td>${fmt(Number(sp.assists),2)}</td>
                <td>${fmt(Number(sp.points),2)}</td>
                <td>${fmt(Number(sp.shots),2)}</td>
                <td>${fmt(Number(sp.blocks),2)}</td>
                <td>${stoi}</td>
              </tr>
            `;
          }).join('');

          // Totals row (sanity check: player totals should roughly match team/game totals)
          try {
            let lg = 0, la = 0, lp0 = 0, ls = 0, lblk = 0, ltoiSec = 0;
            let sg = 0, sa = 0, sp0 = 0, ss = 0, sblk = 0, stoiSec = 0;
            for (const x of rows) {
              const lpR = x.live || {};
              const spR = x.sim || {};
              const lshots = (lpR && (lpR.s ?? lpR.sog ?? lpR.shots ?? lpR.shots_on_goal));
              lg += n0i(lpR.g);
              la += n0i(lpR.a);
              lp0 += n0i(lpR.p);
              ls += n0i(lshots);
              lblk += n0i(lpR.blk);
              ltoiSec += toiToSec(lpR.toi);

              sg += n0(spR.goals);
              sa += n0(spR.assists);
              sp0 += n0(spR.points);
              ss += n0(spR.shots);
              sblk += n0(spR.blocks);
              stoiSec += n0(spR.toi_sec);
            }

            var totalsRow = `
              <tr>
                <td class="player">TEAM TOTAL</td>
                <td>—</td>
                <td>${lg}</td>
                <td>${la}</td>
                <td>${lp0}</td>
                <td>${ls}</td>
                <td>${lblk}</td>
                <td>${fmtToi(ltoiSec)}</td>
                <td>${fmt(sg,2)}</td>
                <td>${fmt(sa,2)}</td>
                <td>${fmt(sp0,2)}</td>
                <td>${fmt(ss,2)}</td>
                <td>${fmt(sblk,2)}</td>
                <td>${fmtToi(stoiSec)}</td>
              </tr>
            `;
          } catch (e) {
            var totalsRow = '';
          }

          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Player</th>
                <th class="sortable" data-sort-type="text">Pos</th>
                <th colspan="6">${liveLabel}</th>
                <th colspan="6">Sim (proj)</th>
              </tr>
              <tr>
                <th></th><th></th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
                <th class="sortable" data-sort-type="num">G</th>
                <th class="sortable" data-sort-type="num">A</th>
                <th class="sortable" data-sort-type="num">P</th>
                <th class="sortable" data-sort-type="num">S</th>
                <th class="sortable" data-sort-type="num">BLK</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
              <tfoot>${totalsRow || ''}</tfoot>
            </table>
          `;
        };

        const renderMergedGoalies = (title, liveArr, simMap) => {
          const live = Array.isArray(liveArr) ? liveArr.slice(0,2) : [];
          const rows = [];
          const seenIds = new Set();
          const n0i = (x) => {
            const v = parseInt(String(x ?? ''), 10);
            return (isFinite(v) ? v : 0);
          };
          const n0 = (x) => {
            const v = Number(x);
            return (isFinite(v) ? v : 0);
          };
          const fmtToi = (sec) => {
            const s = Math.max(0, Math.round(Number(sec) || 0));
            const mm = Math.floor(s / 60);
            const ss = s % 60;
            return `${mm}:${String(ss).padStart(2,'0')}`;
          };
          for (const r of live) {
            const pid = getPlayerId(r);
            const k = nameKey(r && r.name);
            const full = normName(r && r.name);
            let s = null;
            if (pid !== null && pid !== undefined) s = (simMap.byId && simMap.byId.get(pid)) || null;
            if (!s && k) s = (simMap.byKey && simMap.byKey.get(k)) || null;
            if (!s && full) s = (simMap.byFull && simMap.byFull.get(full)) || null;
            rows.push({ live: r, sim: s });
            if (pid !== null && pid !== undefined) seenIds.add(pid);
          }
          try {
            const byId = simMap.byId || new Map();
            const byKey = simMap.byKey || new Map();
            const byFull = simMap.byFull || new Map();
            if (byId.size) {
              for (const [pid, s] of byId.entries()) {
                if (seenIds.has(pid)) continue;
                rows.push({ live: null, sim: s });
              }
            } else {
              for (const [_k2, s] of byKey.entries()) {
                rows.push({ live: null, sim: s });
              }
              if (!rows.length) {
                for (const [_k3, s] of byFull.entries()) {
                  rows.push({ live: null, sim: s });
                }
              }
            }
          } catch (e) {}

          const body = rows.slice(0, 2).map(x => {
            const lg = x.live || {};
            const sg = x.sim || {};
            const nm = lg.name || sg.player || '—';
            const svPct = (lg && lg.sv_pct !== undefined && lg.sv_pct !== null && isFinite(Number(lg.sv_pct)))
              ? (100 * Number(lg.sv_pct)).toFixed(1) + '%'
              : '—';
            const stoi = (isFinite(Number(sg.toi_sec)))
              ? `${Math.floor(Number(sg.toi_sec)/60)}:${String(Math.floor(Number(sg.toi_sec)%60)).padStart(2,'0')}`
              : '—';
            return `
              <tr>
                <td class="player">${nm}</td>
                <td>${lg.saves ?? '—'}</td>
                <td>${lg.shots_against ?? '—'}</td>
                <td>${svPct}</td>
                <td>${fmt(Number(sg.saves),2)}</td>
                <td>${stoi}</td>
              </tr>
            `;
          }).join('');

          // Totals row (sanity check)
          try {
            let lsv = 0, lsa = 0;
            let ssv = 0, stoiSec = 0;
            for (const x of rows) {
              const lg = x.live || {};
              const sg = x.sim || {};
              lsv += n0i(lg.saves);
              lsa += n0i(lg.shots_against);
              ssv += n0(sg.saves);
              stoiSec += n0(sg.toi_sec);
            }
            const lsvpct = (lsa > 0) ? ((100 * (lsv / lsa)).toFixed(1) + '%') : '—';
            var totalsRow = `
              <tr>
                <td class="player">TEAM TOTAL</td>
                <td>${lsv}</td>
                <td>${lsa || '—'}</td>
                <td>${lsvpct}</td>
                <td>${fmt(ssv,2)}</td>
                <td>${fmtToi(stoiSec)}</td>
              </tr>
            `;
          } catch (e) {
            var totalsRow = '';
          }

          return `
            <div class="section-title">${title}</div>
            <table class="boxscore">
              <thead><tr>
                <th class="sortable" data-sort-type="text">Goalie</th>
                <th colspan="3">${liveLabel}</th>
                <th colspan="2">Sim (proj)</th>
              </tr>
              <tr>
                <th></th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="num">SA</th>
                <th class="sortable" data-sort-type="pct">SV%</th>
                <th class="sortable" data-sort-type="num">SV</th>
                <th class="sortable" data-sort-type="toi">TOI</th>
              </tr></thead>
              <tbody>${body || ''}</tbody>
              <tfoot>${totalsRow || ''}</tfoot>
            </table>
          `;
        };

        const out = [];
        out.push(`<div class="k">Sim vs ${liveLabel}</div>`);
        // Always attempt to render merged tables. If live stats are missing, the table
        // still shows sim-only rows so the Live Lens card isn't empty pre-live.
        out.push(renderMergedSkaters(`Skaters (${away || 'Away'})`, (players && players.away) ? players.away : [], simAway));
        out.push(renderMergedSkaters(`Skaters (${home || 'Home'})`, (players && players.home) ? players.home : [], simHome));
        out.push(renderMergedGoalies(`Goalies (${away || 'Away'})`, (goalies && goalies.away) ? goalies.away : [], simGAway));
        out.push(renderMergedGoalies(`Goalies (${home || 'Home'})`, (goalies && goalies.home) ? goalies.home : [], simGHome));
        return out.join('');
      } catch (e) {
        return '';
      }
    }

    function renderOdds(oddsGame) {
      if (!oddsGame) return '';
      const ml = oddsGame.ml || {};
      const tot = oddsGame.total || {};
      const pl = oddsGame.puckline || {};

      function hasVal(x) {
        return x !== null && x !== undefined && x !== '';
      }

      const rows = [];

      // Core game markets
      {
        const parts = [];
        if (hasVal(ml.away) && hasVal(ml.home)) {
          parts.push(`ML <span class="mono">A ${ml.away} (${ml.away_book || '—'})</span> · <span class="mono">H ${ml.home} (${ml.home_book || '—'})</span>`);
        }
        if (hasVal(tot.line) && (hasVal(tot.over) || hasVal(tot.under))) {
          parts.push(`Total <span class="mono">${fmt(tot.line,1)}</span> O ${tot.over ?? '—'} (${tot.over_book || '—'}) / U ${tot.under ?? '—'} (${tot.under_book || '—'})`);
        }
        const plAway = pl['away_+1.5'];
        const plAwayBook = pl['away_+1.5_book'];
        const plHome = pl['home_-1.5'];
        const plHomeBook = pl['home_-1.5_book'];
        if (hasVal(plAway) && hasVal(plHome)) {
          parts.push(`PL A+1.5 ${plAway} (${plAwayBook || '—'}) · H-1.5 ${plHome} (${plHomeBook || '—'})`);
        }
        if (parts.length) rows.push(`<span class="muted">Game:</span> ${parts.join(' · ')}`);
      }

      // Regulation 3-way (1X2)
      {
        const r = oddsGame.reg_3way || null;
        if (r && (hasVal(r.home) || hasVal(r.draw) || hasVal(r.away))) {
          rows.push(`<span class="muted">Reg 1X2:</span> <span class="mono">H ${r.home ?? '—'} (${r.home_book || '—'})</span> · <span class="mono">D ${r.draw ?? '—'} (${r.draw_book || '—'})</span> · <span class="mono">A ${r.away ?? '—'} (${r.away_book || '—'})</span>`);
        }
      }

      function renderPeriodRow(lbl, blk) {
        if (!blk) return '';
        const parts = [];
        const mlp = blk.ml || null;
        const totp = blk.total || null;
        const spr = blk.spread || null;
        const tw = blk.three_way || null;

        if (mlp && (hasVal(mlp.home) || hasVal(mlp.away))) {
          parts.push(`ML <span class="mono">H ${mlp.home ?? '—'} (${mlp.home_book || '—'})</span> · <span class="mono">A ${mlp.away ?? '—'} (${mlp.away_book || '—'})</span>`);
        }
        if (totp && hasVal(totp.line) && (hasVal(totp.over) || hasVal(totp.under))) {
          parts.push(`Tot <span class="mono">${fmt(totp.line,1)}</span> O ${totp.over ?? '—'} (${totp.over_book || '—'}) / U ${totp.under ?? '—'} (${totp.under_book || '—'})`);
        }
        if (spr && (hasVal(spr.home) || hasVal(spr.away)) && (hasVal(spr.home_point) || hasVal(spr.away_point))) {
          const hp = hasVal(spr.home_point) ? fmt(spr.home_point,1) : '—';
          const ap = hasVal(spr.away_point) ? fmt(spr.away_point,1) : '—';
          parts.push(`Spr <span class="mono">H ${hp} ${spr.home ?? '—'} (${spr.home_book || '—'})</span> · <span class="mono">A ${ap} ${spr.away ?? '—'} (${spr.away_book || '—'})</span>`);
        }
        if (tw && (hasVal(tw.home) || hasVal(tw.draw) || hasVal(tw.away))) {
          parts.push(`3W <span class="mono">H ${tw.home ?? '—'} (${tw.home_book || '—'})</span> · <span class="mono">D ${tw.draw ?? '—'} (${tw.draw_book || '—'})</span> · <span class="mono">A ${tw.away ?? '—'} (${tw.away_book || '—'})</span>`);
        }
        if (!parts.length) return '';
        return `<span class="muted">${lbl}:</span> ${parts.join(' · ')}`;
      }

      function renderPeriodTotalsOnlyRow(lbl, totp) {
        if (!totp) return '';
        const parts = [];
        if (hasVal(totp.line) && (hasVal(totp.over) || hasVal(totp.under))) {
          parts.push(`Tot <span class="mono">${fmt(totp.line,1)}</span> O ${totp.over ?? '—'} (${totp.over_book || '—'}) / U ${totp.under ?? '—'} (${totp.under_book || '—'})`);
        }
        if (!parts.length) return '';
        return `<span class="muted">${lbl}:</span> ${parts.join(' · ')}`;
      }

      // Per-period markets
      {
        const pls = oddsGame.period_lines || null;
        let anyPeriod = false;
        if (pls) {
          const p1 = renderPeriodRow('P1', pls.p1 || null);
          const p2 = renderPeriodRow('P2', pls.p2 || null);
          const p3 = renderPeriodRow('P3', pls.p3 || null);
          if (p1) { rows.push(p1); anyPeriod = true; }
          if (p2) { rows.push(p2); anyPeriod = true; }
          if (p3) { rows.push(p3); anyPeriod = true; }
        }

        // Fallback: some feeds only provide per-period totals even when ML/spreads/3W are missing.
        if (!anyPeriod) {
          const pt = oddsGame.period_totals || null;
          if (pt) {
            const t1 = renderPeriodTotalsOnlyRow('P1', pt.p1 || null);
            const t2 = renderPeriodTotalsOnlyRow('P2', pt.p2 || null);
            const t3 = renderPeriodTotalsOnlyRow('P3', pt.p3 || null);
            if (t1) rows.push(t1);
            if (t2) rows.push(t2);
            if (t3) rows.push(t3);
          }
        }
      }

      if (!rows.length) return '';
      return `<div class="v"><span class="muted">Live lines:</span>${rows.map(r => `<div class="rowline">${r}</div>`).join('')}</div>`;
    }

    function renderTopLiveContext(game) {
      try {
        const g = (game && game.guidance) ? game.guidance : null;
        const parts = [];

        try {
          const st = String((game && (game.gameState || game.game_state || game.state)) || '').trim();
          if (isLiveState(st)) {
            const per = (game && game.period !== undefined && game.period !== null) ? game.period : null;
            const perDisp = (game && (game.period_disp !== undefined && game.period_disp !== null)) ? String(game.period_disp).trim() : '';
            const clk = (game && game.clock) ? String(game.clock).trim() : '';
            const t = formatLiveClockText(st, per, clk, perDisp);
            if (t && t !== '—') parts.push(t);
          }
        } catch (e) {
          // ignore
        }

        if (g && g.manpower) {
          let mp = String(g.manpower);
          if (g.pp_team) {
            const side = String(g.pp_team).toUpperCase() === 'HOME' ? 'H' : 'A';
            mp += ` ${side}PP`;
            if (g.pp_sec_remaining_est !== null && g.pp_sec_remaining_est !== undefined && isFinite(Number(g.pp_sec_remaining_est))) {
              const rem = Math.max(0, Math.round(Number(g.pp_sec_remaining_est)));
              const mm = Math.floor(rem / 60);
              const ss = rem % 60;
              mp += ` ${mm}:${String(ss).padStart(2,'0')}`;
            }
          }
          parts.push(mp);
        }

        if (g && (g.away_empty_net || g.home_empty_net)) {
          const en = [];
          if (g.away_empty_net) en.push('A-EN');
          if (g.home_empty_net) en.push('H-EN');
          parts.push(en.join('/'));
        }

        if (g && ((g.away_att_l5 !== null && g.away_att_l5 !== undefined) || (g.home_att_l5 !== null && g.home_att_l5 !== undefined))) {
          const aa5 = (g.away_att_l5 !== null && g.away_att_l5 !== undefined && isFinite(Number(g.away_att_l5))) ? String(Math.round(Number(g.away_att_l5))) : '—';
          const ha5 = (g.home_att_l5 !== null && g.home_att_l5 !== undefined && isFinite(Number(g.home_att_l5))) ? String(Math.round(Number(g.home_att_l5))) : '—';
          parts.push(`AttL5 A${aa5}/H${ha5}`);
        }

        if (g && ((g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined) || (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined))) {
          const ax = (g.away_xg_proxy_l10 !== null && g.away_xg_proxy_l10 !== undefined && isFinite(Number(g.away_xg_proxy_l10))) ? fmt(Number(g.away_xg_proxy_l10), 2) : '—';
          const hx = (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined && isFinite(Number(g.home_xg_proxy_l10))) ? fmt(Number(g.home_xg_proxy_l10), 2) : '—';
          parts.push(`xG10 A${ax}/H${hx}`);
        }

        // Faceoffs (possession proxy)
        try {
          if (!g) throw new Error('no_guidance');
          const aT10 = (g.away_fo_taken_l10 !== null && g.away_fo_taken_l10 !== undefined && isFinite(Number(g.away_fo_taken_l10))) ? Number(g.away_fo_taken_l10) : null;
          const hT10 = (g.home_fo_taken_l10 !== null && g.home_fo_taken_l10 !== undefined && isFinite(Number(g.home_fo_taken_l10))) ? Number(g.home_fo_taken_l10) : null;
          const use10 = ((aT10 !== null && aT10 > 0) || (hT10 !== null && hT10 > 0));

          const aW = use10
            ? ((g.away_fo_wins_l10 !== null && g.away_fo_wins_l10 !== undefined && isFinite(Number(g.away_fo_wins_l10))) ? Number(g.away_fo_wins_l10) : null)
            : ((g.away_fo_wins !== null && g.away_fo_wins !== undefined && isFinite(Number(g.away_fo_wins))) ? Number(g.away_fo_wins) : null);
          const hW = use10
            ? ((g.home_fo_wins_l10 !== null && g.home_fo_wins_l10 !== undefined && isFinite(Number(g.home_fo_wins_l10))) ? Number(g.home_fo_wins_l10) : null)
            : ((g.home_fo_wins !== null && g.home_fo_wins !== undefined && isFinite(Number(g.home_fo_wins))) ? Number(g.home_fo_wins) : null);

          const aT = use10
            ? aT10
            : ((g.away_fo_taken !== null && g.away_fo_taken !== undefined && isFinite(Number(g.away_fo_taken))) ? Number(g.away_fo_taken) : null);
          const hT = use10
            ? hT10
            : ((g.home_fo_taken !== null && g.home_fo_taken !== undefined && isFinite(Number(g.home_fo_taken))) ? Number(g.home_fo_taken) : null);

          const aP = use10
            ? ((g.away_fo_pct_l10 !== null && g.away_fo_pct_l10 !== undefined && isFinite(Number(g.away_fo_pct_l10))) ? Number(g.away_fo_pct_l10) : null)
            : ((g.away_fo_pct !== null && g.away_fo_pct !== undefined && isFinite(Number(g.away_fo_pct))) ? Number(g.away_fo_pct) : null);
          const hP = use10
            ? ((g.home_fo_pct_l10 !== null && g.home_fo_pct_l10 !== undefined && isFinite(Number(g.home_fo_pct_l10))) ? Number(g.home_fo_pct_l10) : null)
            : ((g.home_fo_pct !== null && g.home_fo_pct !== undefined && isFinite(Number(g.home_fo_pct))) ? Number(g.home_fo_pct) : null);

          if ((aT !== null && aT > 0) || (hT !== null && hT > 0)) {
            const scope = use10 ? 'FO10' : 'FO';
            const aTxt = (aW !== null && aT !== null) ? `${Math.round(aW)}/${Math.round(aT)}` : '—';
            const hTxt = (hW !== null && hT !== null) ? `${Math.round(hW)}/${Math.round(hT)}` : '—';
            const aPct = (aP !== null) ? `${fmt(aP, 0)}%` : '—';
            const hPct = (hP !== null) ? `${fmt(hP, 0)}%` : '—';
            parts.push(`${scope} A${aTxt} (${aPct})/H${hTxt} (${hPct})`);
          }
        } catch (e) {
          // ignore
        }

        if (!parts.length) return '';
        return `<span class="muted">Live context:</span> ${parts.join(' · ')}`;
      } catch (e) {
        return '';
      }
    }

    function renderGuidance(game) {
      const g = (game && game.guidance) ? game.guidance : null;
      if (!g) return '';
      const notes = Array.isArray(g.notes) ? g.notes.filter(x => String(x || '').trim()) : [];
      const lean = String(g.lean_total || 'neutral').toUpperCase();

      const per = (game && game.period !== undefined && game.period !== null) ? game.period : null;
      const clock = (game && game.clock) ? String(game.clock) : '';
      const score = (game && game.score) ? game.score : {};
      const awayScore = (score && score.away !== undefined && score.away !== null) ? score.away : '—';
      const homeScore = (score && score.home !== undefined && score.home !== null) ? score.home : '—';

      const sigs = (game && Array.isArray(game.signals)) ? game.signals : [];
      const betSigs = sigs.filter(s => String((s||{}).action||'').toUpperCase() === 'BET');
      const watchSigs = sigs.filter(s => String((s||{}).action||'').toUpperCase() === 'WATCH');

      const bits = [];
      if (g.goal_pace_60 !== null && g.goal_pace_60 !== undefined) bits.push(`Goal pace/60 ${fmt(g.goal_pace_60, 1)}`);
      if (g.sog_pace_60 !== null && g.sog_pace_60 !== undefined) bits.push(`SOG pace/60 ${fmt(g.sog_pace_60, 0)}`);
      if (g.total_goals !== null && g.total_goals !== undefined && g.live_total_line !== null && g.live_total_line !== undefined) {
        bits.push(`Total ${g.total_goals} vs line ${fmt(g.live_total_line, 1)}`);
      }

      const hasModel = (g.p_over !== null && g.p_over !== undefined) || (g.p_under !== null && g.p_under !== undefined);
      const hasEdge = (g.edge_over !== null && g.edge_over !== undefined) || (g.edge_under !== null && g.edge_under !== undefined);
      const pOver = (g.p_over !== null && g.p_over !== undefined) ? Number(g.p_over) : null;
      const pUnder = (g.p_under !== null && g.p_under !== undefined) ? Number(g.p_under) : null;
      const pPush = (g.p_push !== null && g.p_push !== undefined) ? Number(g.p_push) : null;
      const eOver = (g.edge_over !== null && g.edge_over !== undefined) ? Number(g.edge_over) : null;
      const eUnder = (g.edge_under !== null && g.edge_under !== undefined) ? Number(g.edge_under) : null;

      const totalGoals = (g.total_goals !== null && g.total_goals !== undefined && isFinite(Number(g.total_goals))) ? Number(g.total_goals) : null;
      const liveLine = (g.live_total_line !== null && g.live_total_line !== undefined && isFinite(Number(g.live_total_line))) ? Number(g.live_total_line) : null;
      const remMin = (g.remaining_min !== null && g.remaining_min !== undefined && isFinite(Number(g.remaining_min))) ? Number(g.remaining_min) : null;
      const muRem = (g.mu_remaining !== null && g.mu_remaining !== undefined && isFinite(Number(g.mu_remaining))) ? Number(g.mu_remaining) : null;

      const lines = [];
      lines.push(`<div class="k">Live guidance</div>`);
      if (per !== null || clock || (awayScore !== '—' && homeScore !== '—')) {
        const headBits = [];
        if (per !== null) headBits.push(`P${per}`);
        if (clock) headBits.push(String(clock));

      // Make the total situation explicit (needs / allows) + a simple projection.

          const underWinTotal = isInt ? (Math.round(liveLine) - 1) : Math.floor(liveLine);
          const overNeeds = Math.max(0, overWinTotal - totalGoals);

          const tBits = [];

          tBits.push(`Over needs ${overNeeds}${overNeeds === 1 ? ' goal' : ' goals'}+`);

          } else {

          }
          if (remMin !== null) {
            tBits.push(`Remaining ${fmt(remMin, 1)}m`);
            if (remMin > 0 && overNeeds > 0) {
              tBits.push(`Need pace ${(60.0 * overNeeds / remMin).toFixed(1)}/60`);

          }

        }
        if (totalGoals !== null && muRem !== null) {

          lines.push(`<div class="v"><span class="muted">Projection:</span> remaining ${fmt(muRem, 2)} → final ${fmt(projFinal, 2)}</div>`);
        }
      } catch (e) {

      }

      // Play-by-play context (best-effort): manpower/PP, empty net, and pressure.
      try {
        if (g.manpower) {

          const hx = (g.home_xg_proxy_l10 !== null && g.home_xg_proxy_l10 !== undefined && isFinite(Number(g.home_xg_proxy_l10))) ? fmt(Number(g.home_xg_proxy_l10), 2) : '—';

          const hT10 = (g.home_fo_taken_l10 !== null && g.home_fo_taken_l10 !== undefined && isFinite(Number(g.home_fo_taken_l10))) ? Number(g.home_fo_taken_l10) : null;
          const use10 = ((aT10 !== null && aT10 > 0) || (hT10 !== null && hT10 > 0));

          const aW = use10
            ? ((g.away_fo_wins_l10 !== null && g.away_fo_wins_l10 !== undefined && isFinite(Number(g.away_fo_wins_l10))) ? Number(g.away_fo_wins_l10) : null)
            : ((g.away_fo_wins !== null && g.away_fo_wins !== undefined && isFinite(Number(g.away_fo_wins))) ? Number(g.away_fo_wins) : null);
          const hW = use10
            ? ((g.home_fo_wins_l10 !== null && g.home_fo_wins_l10 !== undefined && isFinite(Number(g.home_fo_wins_l10))) ? Number(g.home_fo_wins_l10) : null)
            : ((g.home_fo_wins !== null && g.home_fo_wins !== undefined && isFinite(Number(g.home_fo_wins))) ? Number(g.home_fo_wins) : null);

          const aT = use10
            ? aT10
            : ((g.away_fo_taken !== null && g.away_fo_taken !== undefined && isFinite(Number(g.away_fo_taken))) ? Number(g.away_fo_taken) : null);
          const hT = use10
            ? hT10
            : ((g.home_fo_taken !== null && g.home_fo_taken !== undefined && isFinite(Number(g.home_fo_taken))) ? Number(g.home_fo_taken) : null);

          const aP = use10
            ? ((g.away_fo_pct_l10 !== null && g.away_fo_pct_l10 !== undefined && isFinite(Number(g.away_fo_pct_l10))) ? Number(g.away_fo_pct_l10) : null)
            : ((g.away_fo_pct !== null && g.away_fo_pct !== undefined && isFinite(Number(g.away_fo_pct))) ? Number(g.away_fo_pct) : null);
          const hP = use10
            ? ((g.home_fo_pct_l10 !== null && g.home_fo_pct_l10 !== undefined && isFinite(Number(g.home_fo_pct_l10))) ? Number(g.home_fo_pct_l10) : null)
            : ((g.home_fo_pct !== null && g.home_fo_pct !== undefined && isFinite(Number(g.home_fo_pct))) ? Number(g.home_fo_pct) : null);

          if ((aT !== null && aT > 0) || (hT !== null && hT > 0)) {
            const scope = use10 ? 'last10' : 'overall';
            const aTxt = (aW !== null && aT !== null) ? `${Math.round(aW)}/${Math.round(aT)}` : '—';
            const hTxt = (hW !== null && hT !== null) ? `${Math.round(hW)}/${Math.round(hT)}` : '—';
            const aPct = (aP !== null) ? `${fmt(aP, 0)}%` : '—';
            const hPct = (hP !== null) ? `${fmt(hP, 0)}%` : '—';
            lines.push(`<div class="v"><span class="muted">Possession:</span> Faceoffs ${scope} A ${aTxt} (${aPct}) / H ${hTxt} (${hPct})</div>`);
          }
        } catch (e) {
          // ignore
        }
      } catch (e) {
        // ignore
      }

      // Signals (WATCH/BET)
      try {
        const renderSigPill = (s) => {
          const act = String((s||{}).action || 'WATCH').toUpperCase();
          const cls = (act === 'BET') ? 'bet pos' : 'bet';
          const label = String((s||{}).label || '').trim() || 'Signal';
          const p = (s && s.p_model !== undefined && s.p_model !== null && isFinite(Number(s.p_model))) ? pct(Number(s.p_model)) : null;
          const edge = (s && s.edge !== undefined && s.edge !== null && isFinite(Number(s.edge))) ? (Number(s.edge) >= 0 ? '+' : '') + fmt(100*Number(s.edge), 1) + '%' : null;
          const price = (s && s.price !== undefined && s.price !== null) ? String(s.price) : null;
          const fair = (s && s.fair_price_american !== undefined && s.fair_price_american !== null) ? String(s.fair_price_american) : null;
          const maxp = (s && s.target_max_price_american !== undefined && s.target_max_price_american !== null) ? String(s.target_max_price_american) : null;

          const meta = [];
          if (p) meta.push(`p ${p}`);
          if (edge) meta.push(`edge ${edge}`);
          if (price) meta.push(`live ${price}`);
          if (fair) meta.push(`fair ${fair}`);
          if (maxp) meta.push(`max ${maxp}`);

          const metaTxt = meta.length ? ` <span class="muted">(${meta.join(' · ')})</span>` : '';
          return `<span class="${cls}">${act}: ${label}</span>${metaTxt}`;
        };

        const shown = [];
        for (const s of betSigs.slice(0, 6)) shown.push(renderSigPill(s));
        for (const s of watchSigs.slice(0, Math.max(0, 6 - shown.length))) shown.push(renderSigPill(s));
        if (shown.length) {
          lines.push(`<div class="v"><span class="muted">Signals:</span></div>`);
          lines.push(`<div class="bets">${shown.join(' ')}</div>`);
        }
      } catch (e) {
        // ignore
      }

      if (hasModel) {
        const parts = [];
        if (pOver !== null && isFinite(pOver)) {
          const edgeTxt = (hasEdge && eOver !== null && isFinite(eOver)) ? ` (edge ${eOver >= 0 ? '+' : ''}${fmt(100*eOver, 1)}%)` : '';
          parts.push(`O ${pct(pOver)}${edgeTxt}`);
        }
        if (pUnder !== null && isFinite(pUnder)) {
          const edgeTxt = (hasEdge && eUnder !== null && isFinite(eUnder)) ? ` (edge ${eUnder >= 0 ? '+' : ''}${fmt(100*eUnder, 1)}%)` : '';
          parts.push(`U ${pct(pUnder)}${edgeTxt}`);
        }
        if (pPush !== null && isFinite(pPush) && pPush > 0.001) {
          parts.push(`Push ${pct(pPush)}`);
        }
        if (parts.length) {
          lines.push(`<div class="v"><span class="muted">Model vs line:</span> ${parts.join(' · ')}</div>`);
        }
      }

      if (notes.length) {
        lines.push(`<div class="v">${notes.map(n => `• ${String(n)}`).join('<br/>')}</div>`);
      }
      return lines.join('');
    }

    async function maybeLoadLiveLens(date, preds, opts=null) {

        const includeNonLive = (o.includeNonLive !== undefined && o.includeNonLive !== null)
          ? Number(o.includeNonLive)

        const settleRecOutcome = (market, side, line, awayGoals, homeGoals) => {
          try {
            const m = String(market || '').toUpperCase();
            const s = String(side || '').toUpperCase();
            const ag = Number(awayGoals);
            const hg = Number(homeGoals);
            if (!isFinite(ag) || !isFinite(hg)) return null;

            if (m.includes('ML')) {
              if (hg === ag) return 'P';
              const winner = (hg > ag) ? 'HOME' : 'AWAY';
              if (s.includes('HOME')) return (winner === 'HOME') ? 'W' : 'L';
              if (s.includes('AWAY')) return (winner === 'AWAY') ? 'W' : 'L';
              return null;
            }

            if (m.includes('TOTAL')) {
              const tot = ag + hg;
              const ln = (line !== null && line !== undefined && String(line).trim() !== '') ? Number(line) : NaN;
              if (!isFinite(ln)) return null;
              if (Math.abs(ln - Math.round(ln)) < 1e-9 && Math.abs(tot - Math.round(ln)) < 1e-9) return 'P';
              if (s.includes('OVER')) return (tot > ln) ? 'W' : 'L';
              if (s.includes('UNDER')) return (tot < ln) ? 'W' : 'L';
              return null;
            }

              // Assume standard ±1.5.
              const diff = hg - ag;
              if (s.includes('HOME') && s.includes('-1.5')) return (diff >= 2) ? 'W' : 'L';
              if (s.includes('AWAY') && (s.includes('+1.5') || s.includes('1.5'))) return (diff <= 1) ? 'W' : 'L';
              // If side omits the line, infer from HOME/AWAY.
              if (s.includes('HOME')) return (diff >= 2) ? 'W' : 'L';
              if (s.includes('AWAY')) return (diff <= 1) ? 'W' : 'L';

            }
            return null;
          } catch (e) {

          }

        function normalizeScoreboardRow(r) {

              }

            }
            const pkRaw = r ? pick(r.gamePk, r.game_pk, r.gameId, r.game_id) : undefined;

          // Time remaining in period (live games)
          try {
            const lc = card.querySelector('[data-role="live-clock"]');
            const ls = card.querySelector('[data-role="live-score"]');
            const aBig = card.querySelector('[data-role="away-pts-big"]');
            const hBig = card.querySelector('[data-role="home-pts-big"]');
            const st = String(g && g.gameState ? g.gameState : '').trim();
            const per = (g && g.period !== undefined && g.period !== null) ? g.period : null;
            const perDisp = (g && (g.period_disp !== undefined && g.period_disp !== null)) ? String(g.period_disp).trim() : '';
            const clk = (g && g.clock) ? String(g.clock).trim() : '';
            if (lc) {
              if (g && isLiveState(st) && (per !== null || perDisp || clk)) {
                lc.textContent = formatLiveClockText(st, per, clk, perDisp);
              } else {
                lc.textContent = '';
              }
            }
            if (ls) {
              try {
                // Score is shown next to each team name/logo.
                ls.textContent = '';
              } catch (e) {
                ls.textContent = '';
              }
            }

            try {
              const up = String(st || '').toUpperCase();
              const sc = (g && g.score) ? g.score : null;
              const ag = sc && sc.away !== undefined && sc.away !== null ? sc.away : null;
              const hg = sc && sc.home !== undefined && sc.home !== null ? sc.home : null;
              const show = (ag !== null && hg !== null) && (isLiveState(st) || isFinalLikeState(up));
              if (aBig) aBig.textContent = show ? String(ag) : '';
              if (hBig) hBig.textContent = show ? String(hg) : '';
            } catch (e) {
              if (aBig) aBig.textContent = '';
              if (hBig) hBig.textContent = '';
            }
          } catch (e) {}

          // Reconcile displayed recommendations for FINAL games.
          try {
            const st = String(g && g.gameState ? g.gameState : '').toUpperCase();
            if (g && isFinalLikeState(st) && g.score) {
              const ag = g.score.away;
              const hg = g.score.home;
              if (g && isFinalLikeState(st) && ag !== null && hg !== null) {
                fs.textContent = `FINAL ${ag}-${hg}`;
                const s = betEl.dataset.side;
                const line = (betEl.dataset.line !== undefined) ? betEl.dataset.line : null;
                const out = settleRecOutcome(m, s, line, ag, hg);
                const outEl = betEl.querySelector('[data-role="rec-outcome"]');
                if (outEl) outEl.textContent = out ? `· ${out}` : '';
              }
            } else {
              for (const betEl of card.querySelectorAll('.bets .bet [data-role="rec-outcome"]')) {
                betEl.textContent = '';
              }
            }
          } catch (e) {}

          // Always keep top live context line in sync.
          try {
            const ctxTop = card.querySelector('.live-ctx-top');
            if (ctxTop) ctxTop.innerHTML = g ? renderTopLiveContext(g) : '';
          } catch (e) {}

          // Update merged Sim vs Live tables using the pregame team names so sim rows match.
          try {
            const displayKey = String(card.dataset.gameKey || '').trim();
            const simRows = (window.__SIM_BY_GAME__ && window.__SIM_BY_GAME__.get) ? (window.__SIM_BY_GAME__.get(displayKey) || []) : [];
            const pred = (window.__PREDS_BY_GAME__ && window.__PREDS_BY_GAME__.get) ? (window.__PREDS_BY_GAME__.get(displayKey) || null) : null;
            const awayNm = pred ? (pred.away || '') : (g ? (g.away || '') : '');
            const homeNm = pred ? (pred.home || '') : (g ? (g.home || '') : '');
            const mergedEl = card.querySelector('.merged-body');
            if (mergedEl && Array.isArray(simRows) && simRows.length) {
              const gMerge = {
                away: awayNm,
                home: homeNm,
                gameState: g ? g.gameState : null,
                lens: (g && g.lens) ? g.lens : { players: { away: [], home: [] }, goalies: { away: [], home: [] } },
              };
              mergedEl.innerHTML = renderMergedSimLive(gMerge, simRows);
            }
          } catch (e) {}

          // Show boxscore-derived stats for LIVE and FINAL games.
          // (Previously FINAL games were hidden, which made already-finished games look like they had no stats.)
          if (g && g.lens && (isLiveState(g.gameState) || isFinalLikeState(g.gameState))) {
            lensBody.innerHTML = renderLens(g);
            oddsBody.innerHTML = renderOdds(g.odds || null);
            guidanceBody.innerHTML = renderGuidance(g);
            box.style.display = 'grid';
          } else {
            lensBody.innerHTML = '';
            oddsBody.innerHTML = '';
            guidanceBody.innerHTML = '';
            box.style.display = 'none';
          }
        }

        return anyLiveNow;
      } catch (e) {
        // Best-effort; UI should still work without live lens.
        return false;
      }
    }

    function stopLivePolling() {
      if (livePollTimer) {
        clearInterval(livePollTimer);
        livePollTimer = null;
      }
    }

    function startLivePolling(date, preds, opts=null) {
      stopLivePolling();
      const o = opts || {};
      const inplay = (o.inplay !== undefined && o.inplay !== null) ? Number(o.inplay) : 1;
      const includeNonLive = (o.includeNonLive !== undefined && o.includeNonLive !== null) ? Number(o.includeNonLive) : 0;

      livePollTimer = setInterval(async () => {
        if (date !== currentDate) return;
        if (livePollInFlight) return;
        livePollInFlight = true;
        try {
          await maybeLoadLiveLens(date, preds, { inplay, includeNonLive });
        } finally {
          livePollInFlight = false;
        }
      }, LIVE_POLL_MS);
    }

    async function fetchJson(url, opts=null) {
      const o = opts || {};
      const timeoutMs = (o.timeoutMs !== undefined && o.timeoutMs !== null) ? Number(o.timeoutMs) : 15000;
      const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      let t = null;
      try {
        if (ctrl && isFinite(timeoutMs) && timeoutMs > 0) {
          t = setTimeout(() => { try { ctrl.abort(); } catch (e) {} }, timeoutMs);
        }
        const r = await fetch(url, {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' },
          signal: ctrl ? ctrl.signal : undefined,
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
      } catch (e) {
        if (e && (e.name === 'AbortError' || String(e).toLowerCase().includes('abort'))) {
          throw new Error('Request timed out');
        }
        throw e;
      } finally {
        if (t) clearTimeout(t);
      }
    }

    function todayYmdInTZ(tzName) {
      try {
        const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: tzName, year: 'numeric', month: '2-digit', day: '2-digit' });
        return String(fmt.format(new Date()));
      } catch (e) {
        // Fallback: browser-local date (avoid UTC rollovers).
        try {
          const fmt2 = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
          return String(fmt2.format(new Date()));
        } catch (e2) {
          return String(new Date().toISOString().slice(0, 10));
        }
      }
    }

    function setStatus(msg) {
      $('status').textContent = msg;
    }

    function setEmpty(msg) {
      $('empty').style.display = 'block';
      $('empty').textContent = msg;
    }

    function clearEmpty() {
      $('empty').style.display = 'none';
      $('empty').textContent = '';
    }

    async function loadDate(date) {
      stopLivePolling();
      currentDate = date;
      setStatus(`Loading ${date}…`);
      clearEmpty();
      $('cards').innerHTML = '';

      let b = null;
      let sim = null;
      let simSummary = null;
      try {
        [b, sim, simSummary] = await Promise.all([
          fetchJson(`/v1/bundle/${encodeURIComponent(date)}`),
          (async () => {
            try {
              return await fetchJson(`/api/sim/boxscores?date=${encodeURIComponent(date)}`);
            } catch (e) {
              return null;
            }
          })(),
          (async () => {
            try {
              return await fetchJson(`/api/sim/summary?date=${encodeURIComponent(date)}`);
            } catch (e) {
              return null;
            }
          })(),
        ]);
      } catch (e) {
        try { console.error('[cards] loadDate failed', e); } catch (e2) {}
        const msg = (e && e.message) ? e.message : String(e);
        setStatus(`Error loading ${date}`);
        setEmpty(msg);
        return;
      }
      if (!b || !b.ok) {
        const msg = (b && (b.error || b.message)) ? (b.error || b.message) : 'bundle_error';
        setStatus(`Error loading ${date}`);
        setEmpty(msg);
        return;
      }

      const preds = (((b.data||{}).games||{}).predictions||{}).rows || [];
      const recs = (((b.data||{}).games||{}).recommendations||{}).rows || [];
      const propsRecs = (((b.data||{}).props||{}).recommendations||{}).rows || [];

      const simRows = (sim && (sim.rows || sim.data)) ? (sim.rows || sim.data) : [];
      const nSims = (simSummary && simSummary.ok) ? simSummary.n_sims : null;
      const simByGame = new Map();
      if (Array.isArray(simRows)) {
        for (const r of simRows) {
          const k = keyForSimRow(r);
          if (!k.trim()) continue;
          if (!simByGame.has(k)) simByGame.set(k, []);
          simByGame.get(k).push(r);
        }
      }
      // Expose for live lens merging
      try { window.__SIM_BY_GAME__ = simByGame; } catch (e) {}

      // Expose predictions for live lens merging (so merged sim/live uses team names consistently)
      try {
        const predsByGame = new Map();
        for (const p of (preds || [])) {
          const kk = keyForGame(p);
          predsByGame.set(kk, p);
        }
        window.__PREDS_BY_GAME__ = predsByGame;
      } catch (e) {}

      if (!preds.length) {
        setStatus(`No games found for ${date}.`);
        setEmpty('No predictions rows available for this date yet.');
        return;
      }

      // Sort games by scheduled start time.
      const predsSorted = sortPredsByStart(preds);

      // Single unified view: always show the full slate.
      const predsToShow = predsSorted;

      // Render the compact top strip (updated during live polling).
      try { buildScoreboardStrip(predsToShow); } catch (e) {}

      // index recs by game key (away@home)
      const byGame = new Map();
      for (const r of recs) {
        const k = keyForGame(r);
        if (!byGame.has(k)) byGame.set(k, []);
        byGame.get(k).push(r);
      }

      // Index props recommendations by team abbreviation
      const propsByTeam = new Map();
      for (const r of (propsRecs || [])) {
        const tm = toUpper(r && r.team);
        if (!tm) continue;
        if (!propsByTeam.has(tm)) propsByTeam.set(tm, []);
        propsByTeam.get(tm).push(r);
      }

      const frag = document.createDocumentFragment();
      for (const p of predsToShow) {
        const k = keyForGame(p);
        const aAb = predTeamAbbr(p, 'away');
        const hAb = predTeamAbbr(p, 'home');
        // Filter props to the actual opponent to avoid cross-game bleed.
        const propsAwayAll = (aAb && propsByTeam.get(aAb)) ? propsByTeam.get(aAb) : [];
        const propsHomeAll = (hAb && propsByTeam.get(hAb)) ? propsByTeam.get(hAb) : [];
        const propsAway = (aAb && hAb) ? propsAwayAll.filter(r => {
          const opp = toUpper(r && r.opp);
          return !opp || opp === hAb;
        }) : propsAwayAll;
        const propsHome = (aAb && hAb) ? propsHomeAll.filter(r => {
          const opp = toUpper(r && r.opp);
          return !opp || opp === aAb;
        }) : propsHomeAll;
        frag.appendChild(renderCard(
          p,
          byGame.get(k) || [],
          simByGame.get(k) || [],
          propsAway,
          propsHome,
        ));
      }
      $('cards').appendChild(frag);

      // Overlay live lens:
      // - For today: poll live-only (inplay=1)
      // - For past/future slates: fetch non-live too (include_non_live=1) so FINAL results show next to sim
      // "Today" is computed in the viewer's local timezone to avoid UTC/ET rollover bugs.
      // Also allow ET equality since artifact dates are ET-based.
      let userTz = null;
      try { userTz = (Intl.DateTimeFormat().resolvedOptions() || {}).timeZone || null; } catch (e) { userTz = null; }
      const todayLocal = todayYmdInTZ(userTz || 'UTC');
      const todayEt = todayYmdInTZ('America/New_York');
      const isToday = (String(date) === String(todayLocal)) || (String(date) === String(todayEt));
      const inplay = isToday ? 1 : 0;
      const includeNonLive = 1;
      await maybeLoadLiveLens(date, preds, { inplay, includeNonLive });
      if (isToday) startLivePolling(date, preds, { inplay, includeNonLive });

      const note = b.note ? ` (${b.note})` : '';
      const liveCount = predsSorted.filter(p => isLiveState(p.game_state)).length;
      setStatus(`${date}: ${predsToShow.length} games · live ${liveCount}/${predsSorted.length}${note}`);
    }

    async function init() {
      $('themeToggle').onclick = () => {
        document.documentElement.classList.toggle('light');
        try {
          localStorage.setItem('theme', document.documentElement.classList.contains('light') ? 'light' : 'dark');
        } catch (e) {}
      };

      try {
        const titleEl = $('pageTitle');
        if (titleEl) titleEl.textContent = 'NHL Betting – Cards';
        document.title = 'NHL Betting – Cards';
      } catch (e) {}

      try {
        const d = await fetchJson('/v1/dates');
        if (!d.ok) throw new Error(d.error || 'dates_error');
        const requested = getRequestedDate();
        const dateInput = $('datePicker');
        let initialDate = (requested || (Array.isArray(d.trio) ? d.trio[1] : null) || d.latest || '').trim();
        if (!initialDate) {
          // Last-resort fallback so the UI can still load even if server has no artifacts yet.
          // Use browser-local date to avoid UTC rollovers.
          try {
            const fmt = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
            initialDate = String(fmt.format(new Date()));
          } catch (e) {
            initialDate = String(new Date().toISOString().slice(0,10));
          }
        }

        dateInput.value = initialDate;
        try { setAccuracyHref(initialDate); } catch (e) {}
        dateInput.onchange = async () => {
          const next = String(dateInput.value || '').trim();
          if (!next) return;
          try { setAccuracyHref(next); } catch (e) {}
          setRequestedDateInUrl(next);
          try {
            await loadDate(next);
          } catch (e) {
            stopLivePolling();
            setStatus('Error loading bundle.');
            setEmpty(String(e && e.message ? e.message : e));
          }
        };

        // Trigger initial load.
        setRequestedDateInUrl(initialDate);
        await loadDate(initialDate);
      } catch (e) {
        setStatus('Failed to load dates.');
        setEmpty(String(e && e.message ? e.message : e));
      }
    }

    init();
  </script>
</body>
