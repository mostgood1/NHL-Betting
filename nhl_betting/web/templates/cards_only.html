          lines.push(`<div class="v"><span class="muted">Signals:</span></div>`);
          lines.push(`<div class="bets">${shown.join(' ')}</div>`);
        }
      } catch (e) {
        // ignore
      }

      if (hasModel) {
        const parts = [];
        if (pOver !== null && isFinite(pOver)) {
          const edgeTxt = (hasEdge && eOver !== null && isFinite(eOver)) ? ` (edge ${eOver >= 0 ? '+' : ''}${fmt(100*eOver, 1)}%)` : '';
          parts.push(`O ${pct(pOver)}${edgeTxt}`);
        }
        if (pUnder !== null && isFinite(pUnder)) {
          const edgeTxt = (hasEdge && eUnder !== null && isFinite(eUnder)) ? ` (edge ${eUnder >= 0 ? '+' : ''}${fmt(100*eUnder, 1)}%)` : '';
          parts.push(`U ${pct(pUnder)}${edgeTxt}`);
        }
        if (pPush !== null && isFinite(pPush) && pPush > 0.001) {
          parts.push(`Push ${pct(pPush)}`);
        }
        if (parts.length) {
          lines.push(`<div class="v"><span class="muted">Model vs line:</span> ${parts.join(' · ')}</div>`);
        }
      }

      if (notes.length) {
        lines.push(`<div class="v">${notes.map(n => `• ${String(n)}`).join('<br/>')}</div>`);
      }
      return lines.join('');
    }

    async function maybeLoadLiveLens(date, preds, opts=null) {
      try {
        if (date !== currentDate) return false;
        const o = opts || {};
        const inplay = (o.inplay !== undefined && o.inplay !== null) ? Number(o.inplay) : 1;
        const includeNonLive = (o.includeNonLive !== undefined && o.includeNonLive !== null)
          ? Number(o.includeNonLive)
          : (inplay ? 0 : 1);

        const settleRecOutcome = (market, side, line, awayGoals, homeGoals) => {
          try {
            const m = String(market || '').toUpperCase();
            const s = String(side || '').toUpperCase();
            const ag = Number(awayGoals);
            const hg = Number(homeGoals);
            if (!isFinite(ag) || !isFinite(hg)) return null;

            if (m.includes('ML')) {
              if (hg === ag) return 'P';
              const winner = (hg > ag) ? 'HOME' : 'AWAY';
              if (s.includes('HOME')) return (winner === 'HOME') ? 'W' : 'L';
              if (s.includes('AWAY')) return (winner === 'AWAY') ? 'W' : 'L';
              return null;
            }

            if (m.includes('TOTAL')) {
              const tot = ag + hg;
              const ln = (line !== null && line !== undefined && String(line).trim() !== '') ? Number(line) : NaN;
              if (!isFinite(ln)) return null;
              if (Math.abs(ln - Math.round(ln)) < 1e-9 && Math.abs(tot - Math.round(ln)) < 1e-9) return 'P';
              if (s.includes('OVER')) return (tot > ln) ? 'W' : 'L';
              if (s.includes('UNDER')) return (tot < ln) ? 'W' : 'L';
              return null;
            }

            if (m.includes('PL') || m.includes('PUCK')) {
              // Assume standard ±1.5.
              const diff = hg - ag;
              if (s.includes('HOME') && s.includes('-1.5')) return (diff >= 2) ? 'W' : 'L';
              if (s.includes('AWAY') && (s.includes('+1.5') || s.includes('1.5'))) return (diff <= 1) ? 'W' : 'L';
              // If side omits the line, infer from HOME/AWAY.
              if (s.includes('HOME')) return (diff >= 2) ? 'W' : 'L';
              if (s.includes('AWAY')) return (diff <= 1) ? 'W' : 'L';
              return null;
            }
            return null;
          } catch (e) {
            return null;
          }
        };

        function normalizeScoreboardRow(r) {
          try {
            function pick() {
              for (let i = 0; i < arguments.length; i++) {
                const v = arguments[i];
                if (v !== undefined && v !== null) return v;
              }
              return undefined;
            }
            const pkRaw = r ? pick(r.gamePk, r.game_pk, r.gameId, r.game_id) : undefined;
            const pk = (pkRaw !== undefined) ? String(pkRaw).trim() : '';
            const st = String(r ? pick(r.gameState, r.game_state, r.state) : '' || '').trim();
            const awayName = String(r ? pick(r.away, r.awayTeam, r.away_team) : '' || '').trim();
            const homeName = String(r ? pick(r.home, r.homeTeam, r.home_team) : '' || '').trim();
            const awayAbbr = String(r ? pick(r.away_abbr, r.awayAbbr) : '' || '').trim().toUpperCase();
            const homeAbbr = String(r ? pick(r.home_abbr, r.homeAbbr) : '' || '').trim().toUpperCase();
            const perRaw = r ? pick(r.period, r.web_period) : undefined;
            const per = (perRaw !== undefined) ? perRaw : null;
            const clkRaw = r ? pick(r.clock, r.web_clock) : undefined;
            const clk = clkRaw ? String(clkRaw).trim() : '';
            const perDispRaw = r ? pick(r.period_disp, r.periodDisp) : undefined;
            const perDisp = perDispRaw ? String(perDispRaw).trim() : '';
            const intermissionRaw = r ? pick(r.intermission, r.inIntermission) : undefined;
            const intermission = !!intermissionRaw;
            const agRaw = r ? pick(r.awayScore, r.away_score, (r.score && r.score.away)) : undefined;
            const hgRaw = r ? pick(r.homeScore, r.home_score, (r.score && r.score.home)) : undefined;
            const ag = (agRaw !== undefined) ? agRaw : null;
            const hg = (hgRaw !== undefined) ? hgRaw : null;
            return {
              gamePk: pk,
              gameState: st,
              away: awayName || awayAbbr,
              home: homeName || homeAbbr,
              away_abbr: awayAbbr,
              home_abbr: homeAbbr,
              period: per,
              period_disp: perDisp,
              intermission,
              clock: clk,
              score: {
                away: (ag !== null && ag !== undefined && ag !== '') ? Number(ag) : null,
                home: (hg !== null && hg !== undefined && hg !== '') ? Number(hg) : null,
              },
            };
          } catch (e) {
            return null;
          }
        }

        // Fetch scoreboard first so score/clock updates still work even if live-lens fails.
        let sbRows = null;
        try {
          sbRows = await fetchJson(`/api/scoreboard?date=${encodeURIComponent(date)}&_=${Date.now()}`);
        } catch (e) {
          sbRows = null;
        }
        const sbByKey = new Map();
        const sbByPk = new Map();
        if (Array.isArray(sbRows)) {
          for (const r of sbRows) {
            const sg = normalizeScoreboardRow(r);
            if (!sg) continue;
            const pk = String(sg.gamePk || '').trim();
            if (pk) sbByPk.set(pk, sg);
            try {
              const kAbbr = (sg.away_abbr && sg.home_abbr) ? normKey(`${sg.away_abbr} @ ${sg.home_abbr}`) : '';
              if (kAbbr) sbByKey.set(kAbbr, sg);
            } catch (e) {}
            try {
              const kName = normKey(keyForGame(sg));
              if (kName) sbByKey.set(kName, sg);
            } catch (e) {}
          }
        }

        const cb = (inplay ? `&_=${Date.now()}` : '');
        let live = null;
        try {
          live = await fetchJson(`/v1/live-lens/${encodeURIComponent(date)}?best=1&inplay=${inplay ? 1 : 0}&include_non_live=${includeNonLive ? 1 : 0}${cb}`);
        } catch (e) {
          live = null;
        }
        if (date !== currentDate) return false;

        // Build merged maps: start from scoreboard rows, then overlay live-lens (preserving scoreboard score/clock).
        const mapByKey = new Map(sbByKey);
        const mapByPk = new Map(sbByPk);
        if (live && live.ok && Array.isArray(live.games)) {
          for (const g of (live.games || [])) {
            if (!g) continue;
            let base = null;
            try {
              const pk = (g && g.gamePk !== undefined && g.gamePk !== null) ? String(g.gamePk).trim() : '';
              if (pk && sbByPk.has(pk)) base = sbByPk.get(pk);
            } catch (e) {}
            if (!base) {
              try {
                const k0 = (g && g.key) ? normKey(String(g.key)) : '';
                const k1 = normKey(keyForGame(g));
                base = (k0 && sbByKey.has(k0)) ? sbByKey.get(k0) : ((k1 && sbByKey.has(k1)) ? sbByKey.get(k1) : null);
              } catch (e) {
                base = null;
              }
            }
            try {
              if (base) {
                // Prefer scoreboard for score/clock/period/state (more reliable on Render).
                if (base.score && base.score.away !== null && base.score.home !== null) g.score = base.score;
                if (base.clock) g.clock = base.clock;
                else if (base.intermission) g.clock = '';
                if (base.period !== null && base.period !== undefined) g.period = base.period;
                if (base.period_disp) g.period_disp = base.period_disp;
                if (base.intermission !== undefined && base.intermission !== null) g.intermission = !!base.intermission;
                if (base.gameState) g.gameState = base.gameState;
              }
            } catch (e) {}

            try {
              const k0 = (g && g.key) ? String(g.key) : '';
              const k1 = keyForGame(g);
              if (k0.trim()) mapByKey.set(normKey(k0), g);
              if (k1.trim()) mapByKey.set(normKey(k1), g);
            } catch (e) {}
            try {
              const pk = (g && g.gamePk !== undefined && g.gamePk !== null) ? String(g.gamePk).trim() : '';
              if (pk) mapByPk.set(pk, g);
            } catch (e) {}
          }
        }

        const anyLiveNow = Array.from(mapByPk.values()).some(g => isLiveState(g && g.gameState));

        try {
          window.__LIVE_BY_KEY__ = mapByKey;
          window.__LIVE_BY_PK__ = mapByPk;
        } catch (e) {}

        // Update compact top strip from merged payload.
        try { updateScoreboardStripFromLive(mapByKey, mapByPk); } catch (e) {}
        try { syncSlateStatusesFromLive(mapByKey, mapByPk); } catch (e) {}

        for (const card of document.querySelectorAll('.card[data-game-key]')) {
          const k = normKey(card.dataset.gameKey);
          const box = card.querySelector('.live-lens');
          if (!box) continue;
          const lensBody = box.querySelector('.live-lens-body') || box;
          const oddsBody = box.querySelector('.live-odds-body') || box;
          const guidanceBody = box.querySelector('.live-guidance-body') || box;
          let g = null;
          try {
            const pk = String(card.dataset.gamePk || '').trim();
            if (pk && mapByPk.has(pk)) g = mapByPk.get(pk);
          } catch (e) {}
          if (!g) {
            g = mapByKey.get(k) || null;
          }

          if (!g) {
            // Best-effort fallback if future payloads ever key by abbreviations.
            const ak = String(card.dataset.awayAbbr || '').trim();
            const hk = String(card.dataset.homeAbbr || '').trim();
            if (ak && hk) g = mapByKey.get(normKey(`${ak} @ ${hk}`)) || null;
          }

          try {
            const cardStatus = gameStatusInfo(g && g.gameState ? g.gameState : card.dataset.cardStatus || '', {
              periodDisp: g && g.period_disp ? g.period_disp : '',
            });
            card.dataset.cardStatus = cardStatus.text;
            const badgeEl = card.querySelector('[data-role="status-badge"]');
            if (badgeEl) {
              badgeEl.className = `cards-status-badge ${cardStatus.className}`;
              badgeEl.textContent = cardStatus.text || 'Scheduled';
            }
            const detailEl = card.querySelector('[data-role="status-detail"]');
            if (detailEl) {
              const scheduledDetail = String(card.dataset.scheduledDetail || '').trim();
              const liveClockText = g ? formatLiveClockText(
                g.gameState,
                g.period !== undefined ? g.period : null,
                g.clock || '',
                g.period_disp || '',
                !!g.intermission
              ) : '';
              if (cardStatus.isLive) detailEl.textContent = liveClockText || cardStatus.text;
              else if (cardStatus.isFinal) detailEl.textContent = 'Completed';
              else detailEl.textContent = scheduledDetail;
            }
          } catch (e) {}

          // Compact per-card lens tag (BET/WATCH) in the title + NCAAB-like live-edge border.
          try {
            const tagEl = card.querySelector('[data-role="lens-card-tag"]');
            card.classList.remove('live-edge-ok', 'live-edge-warn');
            if (tagEl) {
              tagEl.classList.remove('bet', 'watch');
              tagEl.textContent = '';
            }
            if (g && Array.isArray(g.signals) && g.signals.length) {
              const gameSigs = _filterGameBetWatchSignals(g.signals);
              const cls = _signalClass(gameSigs);
              if (tagEl) {
                if (cls) tagEl.classList.add(cls);
                const sig = _pickSignalForTag(gameSigs);
                tagEl.textContent = _compactSignalText(sig);
              }
              try {
                const st0 = String(g && g.gameState ? g.gameState : '').trim();

                  else if (cls === 'watch') card.classList.add('live-edge-warn');

              } catch (e) {}
            }
          } catch (e) {}

          // FINAL score at top for historic slates.
          try {
            const fs = card.querySelector('[data-role="final-score"]');
            const st = String(g && g.gameState ? g.gameState : card.dataset.cardStatus || '').trim();
            const sc = scoreInfoFromGame(g);

            if (fs) {

              } else {

          // Time remaining in period (live games)

            const ls = card.querySelector('[data-role="live-score"]');
            const aBig = card.querySelector('[data-role="away-pts-big"]');
            const hBig = card.querySelector('[data-role="home-pts-big"]');
            const st = String(g && g.gameState ? g.gameState : card.dataset.cardStatus || '').trim();
            const per = (g && g.period !== undefined && g.period !== null) ? g.period : null;
            const perDisp = (g && (g.period_disp !== undefined && g.period_disp !== null)) ? String(g.period_disp).trim() : '';
            const intermission = !!(g && g.intermission);
            const clk = (g && g.clock) ? String(g.clock).trim() : '';
            if (lc) {

                lc.textContent = formatLiveClockText(st, per, clk, perDisp, intermission);
              } else {
                lc.textContent = '';
              }
            }
            if (ls) {
              try {
                // Score is shown next to each team name/logo.
                ls.textContent = '';
              } catch (e) {
                ls.textContent = '';
              }
            }

            try {
              const sc = scoreInfoFromGame(g);
              const ag = sc.away;
              const hg = sc.home;
              const show = (ag !== null && hg !== null) && (isLiveState(st) || isFinalLikeState(st));
              if (aBig) aBig.textContent = show ? String(ag) : '';
              if (hBig) hBig.textContent = show ? String(hg) : '';
            } catch (e) {
              if (aBig) aBig.textContent = '';
              if (hBig) hBig.textContent = '';
            }
          } catch (e) {}

          // Reconcile displayed recommendations for FINAL games.
          try {
            const st = String(g && g.gameState ? g.gameState : '').toUpperCase();
            if (g && isFinalLikeState(st) && g.score) {
              const ag = g.score.away;
              const hg = g.score.home;
              if (g && isFinalLikeState(st) && ag !== null && hg !== null) {
                fs.textContent = `FINAL ${ag}-${hg}`;
                const s = betEl.dataset.side;
                const line = (betEl.dataset.line !== undefined) ? betEl.dataset.line : null;
                const out = settleRecOutcome(m, s, line, ag, hg);

              }

            const pred = (window.__PREDS_BY_GAME__ && window.__PREDS_BY_GAME__.get) ? (window.__PREDS_BY_GAME__.get(displayKey) || null) : null;
            const awayNm = pred ? (pred.away || '') : (g ? (g.away || '') : '');
            const homeNm = pred ? (pred.home || '') : (g ? (g.home || '') : '');
            const simBoxEl = card.querySelector('.sim-box-body');
            if (simBoxEl) {

                ? renderSimBoxscoresOnly(pred || { away: awayNm, home: homeNm }, simRows)
                : `<div class="k">Projected box scores</div><div class="v muted">No sim boxscores available yet.</div>`;
            }

            if (liveBoxEl) {

                ? renderLiveBoxscoresOnly(g, pred || { away: awayNm, home: homeNm })
                : `<div class="k">Live box</div><div class="v muted">Live or final box is unavailable.</div>`;
            }

            renderCardPropSections(card, pred || { away: awayNm, home: homeNm }, simRows, g);
          } catch (e) {}

          // Show boxscore-derived stats for LIVE and FINAL games.
          // (Previously FINAL games were hidden, which made already-finished games look like they had no stats.)
          if (g && g.lens && (isLiveState(g.gameState) || isFinalLikeState(g.gameState))) {
            lensBody.innerHTML = renderLens(g);
            oddsBody.innerHTML = renderOdds(g.odds || null);
            guidanceBody.innerHTML = renderGuidance(g);

            lensBody.innerHTML = '';
            oddsBody.innerHTML = '';
            guidanceBody.innerHTML = '';
            box.style.display = 'none';
          }
        }

        applySlateFilter();

        return anyLiveNow;
      } catch (e) {
        // Best-effort; UI should still work without live lens.
        return false;
      }
    }

    function stopLivePolling() {
      if (livePollTimer) {
        clearInterval(livePollTimer);
        livePollTimer = null;
      }
      if (propsPollTimer) {
        clearInterval(propsPollTimer);
        propsPollTimer = null;
      }
    }

    function startLivePolling(date, preds, opts=null) {
      stopLivePolling();
      const o = opts || {};
      const inplay = (o.inplay !== undefined && o.inplay !== null) ? Number(o.inplay) : 1;
      const includeNonLive = (o.includeNonLive !== undefined && o.includeNonLive !== null) ? Number(o.includeNonLive) : 0;

      livePollTimer = setInterval(async () => {
        if (date !== currentDate) return;
        if (livePollInFlight) return;
        livePollInFlight = true;
        try {
          await maybeLoadLiveLens(date, preds, { inplay, includeNonLive });
        } finally {
          livePollInFlight = false;
        }
      }, LIVE_POLL_MS);
    }

    function startPropsStripPolling(date) {
      if (propsPollTimer) {
        clearInterval(propsPollTimer);
        propsPollTimer = null;
      }
      propsPollTimer = setInterval(async () => {
        if (date !== currentDate) return;
        if (propsPollInFlight) return;
        propsPollInFlight = true;
        try {
          await maybeRefreshPropsStrip(date);
        } finally {
          propsPollInFlight = false;
        }
      }, PROPS_POLL_MS);
    }

    async function fetchJson(url, opts=null) {
      const o = opts || {};
      const timeoutMs = (o.timeoutMs !== undefined && o.timeoutMs !== null) ? Number(o.timeoutMs) : 15000;
      const ctrl = (typeof AbortController !== 'undefined') ? new AbortController() : null;
      let t = null;
      try {
        if (ctrl && isFinite(timeoutMs) && timeoutMs > 0) {
          t = setTimeout(() => { try { ctrl.abort(); } catch (e) {} }, timeoutMs);
        }
        const r = await fetch(url, {
          cache: 'no-store',
          headers: { 'Accept': 'application/json' },
          signal: ctrl ? ctrl.signal : undefined,
        });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
      } catch (e) {
        if (e && (e.name === 'AbortError' || String(e).toLowerCase().includes('abort'))) {
          throw new Error('Request timed out');
        }
        throw e;
      } finally {
        if (t) clearTimeout(t);
      }
    }

    function todayYmdInTZ(tzName) {
      try {
        const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: tzName, year: 'numeric', month: '2-digit', day: '2-digit' });
        return String(fmt.format(new Date()));
      } catch (e) {
        // Fallback: browser-local date (avoid UTC rollovers).
        try {
          const fmt2 = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
          return String(fmt2.format(new Date()));
        } catch (e2) {
          return String(new Date().toISOString().slice(0, 10));
        }
      }
    }

    function addDaysYmd(ymd, days) {
      try {
        const parts = String(ymd || '').split('-').map(x => Number(x));
        if (parts.length !== 3 || parts.some(x => !Number.isFinite(x))) return '';
        const d = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2] + Number(days || 0)));
        return d.toISOString().slice(0, 10);
      } catch (e) {
        return '';
      }
    }

      let propsCards = null;
      try {
        [b, sim, simSummary, oddsMove, propsCards] = await Promise.all([
          fetchJson(`/v1/bundle/${encodeURIComponent(date)}`),
          (async () => {
            try {
              return await fetchJson(`/api/sim/boxscores?date=${encodeURIComponent(date)}`);
            } catch (e) {
              return null;
            }
          })(),
          (async () => {
            try {
              return await fetchJson(`/api/sim/summary?date=${encodeURIComponent(date)}`);
            } catch (e) {
              return null;
            }
          })(),
          (async () => {
            try {
              return await fetchJson(`/v1/odds-movement/${encodeURIComponent(date)}`);
            } catch (e) {
              return null;
            }
          })(),
          (async () => {
            try {
              return await fetchJson(`/v1/props-cards/${encodeURIComponent(date)}?top=12`);
            } catch (e) {
              return null;
            }
          })(),
        ]);
      } catch (e) {
        try { console.error('[cards] loadDate failed', e); } catch (e2) {}
        const msg = (e && e.message) ? e.message : String(e);
        setStatus(`Error loading ${date}`);
        setEmpty(msg);
        return;
      }
      if (!b || !b.ok) {
        const msg = (b && (b.error || b.message)) ? (b.error || b.message) : 'bundle_error';
        setStatus(`Error loading ${date}`);
        setEmpty(msg);
        return;
      }

      const preds = (((b.data||{}).games||{}).predictions||{}).rows || [];
      const recs = (((b.data||{}).games||{}).recommendations||{}).rows || [];
      const propsRecs = (((b.data||{}).props||{}).recommendations||{}).rows || [];

      const simRows = (sim && (sim.rows || sim.data)) ? (sim.rows || sim.data) : [];
      const nSims = (simSummary && simSummary.ok) ? simSummary.n_sims : null;
      const simByGame = new Map();
      if (Array.isArray(simRows)) {
        for (const r of simRows) {
          const k = keyForSimRow(r);
          if (!k.trim()) continue;
          if (!simByGame.has(k)) simByGame.set(k, []);
          simByGame.get(k).push(r);
        }
      }
      // Expose for live lens merging
      try { window.__SIM_BY_GAME__ = simByGame; } catch (e) {}
      try { window.__SIM_META__ = { nSims }; } catch (e) {}

      // Expose predictions for live lens merging (so merged sim/live uses team names consistently)
      try {
        const predsByGame = new Map();
        for (const p of (preds || [])) {
          const kk = keyForGame(p);
          predsByGame.set(kk, p);
        }
        window.__PREDS_BY_GAME__ = predsByGame;
      } catch (e) {}

      if (!preds.length) {
        setStatus(`No games found for ${date}.`);
        try { $('cardsDateBadge').textContent = date; } catch (e) {}
        setEmpty('No predictions rows available for this date yet.');
        return;
      }

      try { $('cardsDateBadge').textContent = date; } catch (e) {}
      try {
        const officialCount = recs.filter((row) => row && String(row.market || '').trim()).length;
        const metaBits = [`${preds.length} games on the slate`];
        if (officialCount > 0) metaBits.push(`${officialCount} with official plays`);
        else if (nSims !== null && nSims !== undefined && isFinite(Number(nSims))) metaBits.push(`${Number(nSims)} sims per game`);
        $('cardsHeaderMeta').textContent = metaBits.join(' | ');
      } catch (e) {}

      // Sort games by scheduled start time.
      const predsSorted = sortPredsByStart(preds);

      // Single unified view: always show the full slate.
      const predsToShow = predsSorted;

      // index recs by game key (away@home)
      const byGame = new Map();
      for (const r of recs) {
        const k = keyForGame(r);
        if (!byGame.has(k)) byGame.set(k, []);
        byGame.get(k).push(r);
      }

      // Index props recommendations by team abbreviation
      const propsByTeam = new Map();
      for (const r of (propsRecs || [])) {
        const tm = toUpper(r && r.team);
        if (!tm) continue;
        if (!propsByTeam.has(tm)) propsByTeam.set(tm, []);
        propsByTeam.get(tm).push(r);
      }

      const renderedGames = [];
      for (const p of predsToShow) {
        const k = keyForGame(p);
        const aAb = predTeamAbbr(p, 'away');
        const hAb = predTeamAbbr(p, 'home');
        const propsAwayAll = (aAb && propsByTeam.get(aAb)) ? propsByTeam.get(aAb) : [];
        const propsHomeAll = (hAb && propsByTeam.get(hAb)) ? propsByTeam.get(hAb) : [];
        const propsAway = (aAb && hAb) ? propsAwayAll.filter(r => {
          const opp = toUpper(r && r.opp);
          return !opp || opp === hAb;
        }) : propsAwayAll;
        const propsHome = (aAb && hAb) ? propsHomeAll.filter(r => {
          const opp = toUpper(r && r.opp);
          return !opp || opp === aAb;
        }) : propsHomeAll;
        const recsForGame = byGame.get(k) || [];
        renderedGames.push({
          pred: p,
          recsForGame,
          propsAway,
          propsHome,
          simForGame: simByGame.get(k) || [],
          key: k,
          status: String(p && p.game_state || '').trim(),
          hasOfficial: recsForGame.some((row) => {
            const ev = Number(row && row.ev);
            return String(row && row.market || '').trim() && isFinite(ev);
          }),
          hasProps: buildCardPropRows([].concat(propsAway || [], propsHome || [])).length > 0,
        });
      }

      currentSlateCards = renderedGames.map((entry) => ({
        key: entry.key,
        gamePk: entry.pred && (entry.pred.gamePk ?? entry.pred.game_pk ?? entry.pred.nhl_game_pk ?? entry.pred.game_id),
        status: gameStatusInfo(entry.status).text,
        hasOfficial: entry.hasOfficial,
        hasProps: entry.hasProps,
      }));
      currentSlateNSims = nSims;
      currentSlateInfoByKey = new Map(currentSlateCards.map((entry) => [normKey(entry.key), entry]));
      renderSlateSourceMeta(currentSlateCards, nSims);
      renderSlateFilters(currentSlateCards);

      // Render the compact top strip (updated during live polling).
      try { buildScoreboardStrip(predsToShow); } catch (e) {}

      const frag = document.createDocumentFragment();
      for (const entry of renderedGames) {
        frag.appendChild(renderCard(
          entry.pred,
          entry.recsForGame,
          entry.simForGame,
          entry.propsAway,
          entry.propsHome,
          { nSims }
        ));
      }
      $('cards').appendChild(frag);
      applySlateFilter();

      // Top-of-page props cards strip (best-effort).
      try {
        renderPropsCardsStrip(propsCards);
        lastPropsStripSignature = propsStripSignature(propsCards);
      } catch (e) {
        lastPropsStripSignature = '';
      }

      // Odds movement deltas (best-effort).
      try { applyOddsMovementToCards(oddsMove); } catch (e) {}

      // Overlay live lens:
      // - For today: poll live-only (inplay=1)
      // - For past/future slates: fetch non-live too (include_non_live=1) so FINAL results show next to sim
      // "Today" is computed in the viewer's local timezone to avoid UTC/ET rollover bugs.
      // Also allow ET equality since artifact dates are ET-based.
      let userTz = null;
      try { userTz = (Intl.DateTimeFormat().resolvedOptions() || {}).timeZone || null; } catch (e) { userTz = null; }
      const todayLocal = todayYmdInTZ(userTz || 'UTC');
      const todayEt = todayYmdInTZ('America/New_York');
      const tomorrowEt = addDaysYmd(todayEt, 1);
      const isToday = (String(date) === String(todayLocal)) || (String(date) === String(todayEt));
      const isTomorrowEt = (String(date) === String(tomorrowEt));
      const inplay = isToday ? 1 : 0;
      const includeNonLive = 1;
      await maybeLoadLiveLens(date, preds, { inplay, includeNonLive });
      if (isToday) startLivePolling(date, preds, { inplay, includeNonLive });
      if (isToday || isTomorrowEt) startPropsStripPolling(date);

      setStatus('');
    }

    async function init() {
      try {
        const titleEl = $('pageTitle');
        if (titleEl) titleEl.textContent = DEFAULT_PAGE_TITLE;
        document.title = DEFAULT_PAGE_TITLE;
      } catch (e) {}

      // Compact mode is always on by default.
      try { setCompactMode(true); } catch (e) {}

      try {
        const d = await fetchJson('/v1/dates');
        if (!d.ok) throw new Error(d.error || 'dates_error');
        const requested = getRequestedDate();
        const dateInput = $('datePicker');
        let initialDate = (requested || (Array.isArray(d.trio) ? d.trio[1] : null) || d.latest || '').trim();
        if (!initialDate) {
          // Last-resort fallback so the UI can still load even if server has no artifacts yet.
          // Use browser-local date to avoid UTC rollovers.
          try {
            const fmt = new Intl.DateTimeFormat('en-CA', { year: 'numeric', month: '2-digit', day: '2-digit' });
            initialDate = String(fmt.format(new Date()));
          } catch (e) {
            initialDate = String(new Date().toISOString().slice(0,10));
          }
        }

        const runDateLoad = async () => {
          const next = String(dateInput.value || '').trim();
          if (!next) return;
          try { setPrimaryNavHrefs(next); } catch (e) {}
          try { $('cardsDateBadge').textContent = next; } catch (e) {}
          setRequestedDateInUrl(next);
          try {
            await loadDate(next);
          } catch (e) {
            stopLivePolling();
            setStatus('Error loading bundle.');
            setEmpty(String(e && e.message ? e.message : e));
          }
        };
        dateInput.value = initialDate;
        try { setPrimaryNavHrefs(initialDate); } catch (e) {}
        dateInput.onchange = runDateLoad;
        try {
          const loadBtn = $('cardsDateLoadButton');
          if (loadBtn) loadBtn.onclick = runDateLoad;
        } catch (e) {}

        // Trigger initial load.
        setRequestedDateInUrl(initialDate);
        await loadDate(initialDate);
      } catch (e) {
        setStatus('Failed to load dates.');
        setEmpty(String(e && e.message ? e.message : e));
      }
    }

    init();
  </script>
</body>
</html>
